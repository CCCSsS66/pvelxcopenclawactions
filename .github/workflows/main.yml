name: Build OpenClaw LXC

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，auto 为自动生成"
        required: true
        default: "auto"
      openclaw_version:
        description: "OpenClaw 版本，例如 latest"
        required: true
        default: "latest"
      run_as_root:
        description: "是否 root 运行 OpenClaw"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      gateway_port:
        description: "OpenClaw Gateway 端口"
        required: true
        default: "18789"
      gateway_bind:
        description: "Gateway 绑定模式，不是网卡名"
        required: true
        default: "lan"
        type: choice
        options:
          - "lan"
          - "loopback"
          - "auto"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      INPUT_VERSION: ${{ inputs.version }}
      INPUT_OPENCLAW_VERSION: ${{ inputs.openclaw_version }}
      INPUT_RUN_AS_ROOT: ${{ inputs.run_as_root }}
      INPUT_GATEWAY_PORT: ${{ inputs.gateway_port }}
      INPUT_GATEWAY_BIND: ${{ inputs.gateway_bind }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            ca-certificates \
            curl \
            gnupg \
            xz-utils \
            gzip \
            tar \
            jq \
            file \
            openssl \
            coreutils \
            util-linux \
            gh

          gh --version

      - name: Build and publish OpenClaw LXC template
        shell: bash
        run: |
          cat > build-openclaw-lxc.sh <<'BUILD_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          export DEBIAN_FRONTEND=noninteractive

          VERSION="${INPUT_VERSION:-auto}"
          OPENCLAW_VERSION="${INPUT_OPENCLAW_VERSION:-latest}"
          RUN_AS_ROOT="${INPUT_RUN_AS_ROOT:-true}"
          GATEWAY_PORT="${INPUT_GATEWAY_PORT:-18789}"
          GATEWAY_BIND="${INPUT_GATEWAY_BIND:-lan}"

          if [ "$VERSION" = "auto" ]; then
            VERSION="$(date -u +'%Y.%m.%d-%H%M')"
          fi

          IMAGE_PREFIX="openclaw-lxc-debian12"
          IMAGE_NAME="${IMAGE_PREFIX}-${VERSION}.tar.gz"
          RUN_USER="openclaw"

          if [ "$RUN_AS_ROOT" = "true" ]; then
            RUN_USER="root"
          fi

          WORK_DIR="$PWD/work"
          ROOTFS="$WORK_DIR/rootfs"
          DIST_DIR="$PWD/dist"

          mkdir -p "$WORK_DIR" "$DIST_DIR"

          cleanup_mounts() {
            set +e
            sudo umount -lf "$ROOTFS/dev/pts" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/dev" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/proc" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/sys" 2>/dev/null || true
          }

          trap cleanup_mounts EXIT

          echo "=================================================="
          echo "[1/8] 创建 Debian 12 rootfs"
          echo "=================================================="

          sudo debootstrap \
            --arch=amd64 \
            --variant=minbase \
            bookworm \
            "$ROOTFS" \
            http://deb.debian.org/debian

          echo "=================================================="
          echo "[2/8] 挂载 chroot 环境"
          echo "=================================================="

          sudo mount -t proc proc "$ROOTFS/proc"
          sudo mount --rbind /sys "$ROOTFS/sys"
          sudo mount --make-rslave "$ROOTFS/sys"
          sudo mount --rbind /dev "$ROOTFS/dev"
          sudo mount --make-rslave "$ROOTFS/dev"
          sudo mount --rbind /dev/pts "$ROOTFS/dev/pts"
          sudo cp /etc/resolv.conf "$ROOTFS/etc/resolv.conf"

          echo "Openclaw" | sudo tee "$ROOTFS/etc/hostname" >/dev/null

          echo "=================================================="
          echo "[3/8] 写入容器内部安装脚本"
          echo "=================================================="

          sudo tee "$ROOTFS/tmp/install-inside.sh" >/dev/null <<'INSIDE_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          export DEBIAN_FRONTEND=noninteractive

          OPENCLAW_VERSION="${OPENCLAW_VERSION:-latest}"
          RUN_AS_ROOT="${RUN_AS_ROOT:-true}"
          GATEWAY_PORT="${GATEWAY_PORT:-18789}"
          GATEWAY_BIND="${GATEWAY_BIND:-lan}"

          NET_IFACE="eth0"

          if [ "$RUN_AS_ROOT" = "true" ]; then
            OPENCLAW_USER="root"
            OPENCLAW_GROUP="root"
            OPENCLAW_HOME="/root"
          else
            OPENCLAW_USER="openclaw"
            OPENCLAW_GROUP="openclaw"
            OPENCLAW_HOME="/home/openclaw"
          fi

          cat >/etc/apt/sources.list <<'APT_SOURCES'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          APT_SOURCES

          apt-get update

          apt-get install -y \
            systemd \
            systemd-sysv \
            dbus \
            openssh-server \
            ifupdown \
            isc-dhcp-client \
            iproute2 \
            iputils-ping \
            net-tools \
            procps \
            ca-certificates \
            curl \
            wget \
            gnupg \
            sudo \
            jq \
            openssl \
            coreutils \
            bash-completion \
            vim-tiny \
            nano \
            less \
            locales \
            git \
            build-essential \
            python3 \
            make \
            g++

          sed -i 's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen || true
          sed -i 's/^# *zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' /etc/locale.gen || true
          locale-gen || true

          cat >/etc/default/locale <<'LOCALE_CONF'
          LANG=en_US.UTF-8
          LC_ALL=en_US.UTF-8
          LOCALE_CONF

          echo "=================================================="
          echo "配置 LXC eth0 DHCP 网络"
          echo "=================================================="

          cat >/etc/network/interfaces <<'NET_CONF'
          auto lo
          iface lo inet loopback

          auto eth0
          allow-hotplug eth0

          iface eth0 inet dhcp

          iface eth0 inet6 auto
          NET_CONF

          systemctl unmask networking.service 2>/dev/null || true
          systemctl enable networking.service 2>/dev/null || true

          cat >/etc/systemd/system/lxc-eth0-up.service <<'ETH0_SERVICE'
          [Unit]
          Description=Bring up LXC eth0 network early
          DefaultDependencies=no
          After=local-fs.target
          Before=network-pre.target network.target networking.service network-online.target ssh.service openclaw-firstboot.service openclaw-gateway.service
          Wants=network.target

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'ip link set lo up 2>/dev/null || true; ip link set eth0 up 2>/dev/null || true; timeout 25s ifup --force eth0 2>/dev/null || true; timeout 20s dhclient -4 -1 eth0 2>/dev/null || true'
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          ETH0_SERVICE

          systemctl enable lxc-eth0-up.service

          echo "=================================================="
          echo "配置 SSH 密码登录"
          echo "=================================================="

          mkdir -p /var/run/sshd
          mkdir -p /etc/ssh/sshd_config.d

          cat >/etc/ssh/sshd_config.d/99-openclaw-lxc.conf <<'SSH_CONF'
          PasswordAuthentication yes
          PermitRootLogin yes
          KbdInteractiveAuthentication yes
          UsePAM yes
          SSH_CONF

          sed -ri 's/^#?PasswordAuthentication .*/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sed -ri 's/^#?PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config || true
          sed -ri 's/^#?KbdInteractiveAuthentication .*/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config || true
          sed -ri 's/^#?UsePAM .*/UsePAM yes/' /etc/ssh/sshd_config || true

          cat >/etc/systemd/system/regenerate-ssh-host-keys.service <<'SSH_KEY_SERVICE'
          [Unit]
          Description=Regenerate SSH host keys on first boot
          ConditionPathExistsGlob=!/etc/ssh/ssh_host_*_key
          Before=ssh.service

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/ssh-keygen -A

          [Install]
          WantedBy=multi-user.target
          SSH_KEY_SERVICE

          systemctl enable regenerate-ssh-host-keys.service
          systemctl enable ssh.service || systemctl enable ssh || true

          echo "=================================================="
          echo "安装 Node.js 24"
          echo "=================================================="

          curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
          apt-get install -y nodejs

          node --version
          npm --version

          npm config set fund false
          npm config set audit false
          npm config set update-notifier false

          echo "=================================================="
          echo "安装 OpenClaw"
          echo "=================================================="

          npm install -g "openclaw@${OPENCLAW_VERSION}"

          command -v openclaw
          openclaw --version || true

          if [ "$RUN_AS_ROOT" != "true" ]; then
            id openclaw >/dev/null 2>&1 || useradd -m -s /bin/bash openclaw
            usermod -aG sudo openclaw || true
          fi

          mkdir -p "$OPENCLAW_HOME/.openclaw/workspace"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/sessions"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/agent"

          chown -R "$OPENCLAW_USER:$OPENCLAW_GROUP" "$OPENCLAW_HOME/.openclaw" || true

          cat >/etc/openclaw-lxc.env <<ENV_CONF
          OPENCLAW_LXC=1
          OPENCLAW_USER=$OPENCLAW_USER
          OPENCLAW_GROUP=$OPENCLAW_GROUP
          OPENCLAW_HOME=$OPENCLAW_HOME
          OPENCLAW_NET_IFACE=$NET_IFACE
          OPENCLAW_GATEWAY_PORT=$GATEWAY_PORT
          OPENCLAW_GATEWAY_BIND=$GATEWAY_BIND
          OPENCLAW_HIDE_BANNER=1
          ENV_CONF

          chmod 644 /etc/openclaw-lxc.env

          echo "=================================================="
          echo "写入 OpenClaw 配置脚本"
          echo "=================================================="

          cat >/usr/local/sbin/openclaw-ensure-config <<'ENSURE_CONF'
          #!/usr/bin/env bash
          set -euo pipefail

          [ -f /etc/openclaw-lxc.env ] && . /etc/openclaw-lxc.env

          OPENCLAW_USER="${OPENCLAW_USER:-root}"
          OPENCLAW_GROUP="${OPENCLAW_GROUP:-root}"
          OPENCLAW_HOME="${OPENCLAW_HOME:-/root}"
          OPENCLAW_GATEWAY_PORT="${OPENCLAW_GATEWAY_PORT:-18789}"
          OPENCLAW_GATEWAY_BIND="${OPENCLAW_GATEWAY_BIND:-lan}"

          ENV_FILE="$OPENCLAW_HOME/.openclaw/.env"
          CONFIG_FILE="$OPENCLAW_HOME/.openclaw/openclaw.json"

          mkdir -p "$OPENCLAW_HOME/.openclaw/workspace"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/sessions"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/agent"

          if [ ! -s "$ENV_FILE" ]; then
            TOKEN="$(openssl rand -hex 32)"
            PASSWORD="$(openssl rand -base64 36 | tr -d '/+=' | head -c 28)"

            cat >"$ENV_FILE" <<TOKEN_ENV
          OPENCLAW_GATEWAY_TOKEN=$TOKEN
          OPENCLAW_GATEWAY_PASSWORD=$PASSWORD
          OPENCLAW_GATEWAY_PORT=$OPENCLAW_GATEWAY_PORT
          OPENCLAW_GATEWAY_BIND=$OPENCLAW_GATEWAY_BIND
          TOKEN_ENV
          fi

          cat >"$CONFIG_FILE" <<JSON_CONF
          {
            "gateway": {
              "mode": "local",
              "port": $OPENCLAW_GATEWAY_PORT,
              "bind": "$OPENCLAW_GATEWAY_BIND",
              "auth": {
                "mode": "token",
                "token": "\${OPENCLAW_GATEWAY_TOKEN}",
                "rateLimit": {
                  "maxAttempts": 20,
                  "windowMs": 60000,
                  "lockoutMs": 300000,
                  "exemptLoopback": true
                }
              },
              "controlUi": {
                "enabled": true,
                "allowInsecureAuth": true,
                "dangerouslyDisableDeviceAuth": true
              },
              "reload": {
                "mode": "hybrid"
              }
            },
            "agents": {
              "defaults": {
                "workspace": "~/.openclaw/workspace"
              }
            },
            "cli": {
              "banner": {
                "taglineMode": "off"
              }
            }
          }
          JSON_CONF

          chown -R "$OPENCLAW_USER:$OPENCLAW_GROUP" "$OPENCLAW_HOME/.openclaw" 2>/dev/null || true
          chmod 700 "$OPENCLAW_HOME/.openclaw" || true
          chmod 600 "$ENV_FILE" "$CONFIG_FILE" || true
          ENSURE_CONF

          chmod +x /usr/local/sbin/openclaw-ensure-config

          echo "=================================================="
          echo "写入信息刷新脚本"
          echo "=================================================="

          cat >/usr/local/sbin/openclaw-refresh-info <<'REFRESH_INFO'
          #!/usr/bin/env bash
          set -euo pipefail

          [ -f /etc/openclaw-lxc.env ] && . /etc/openclaw-lxc.env

          OPENCLAW_USER="${OPENCLAW_USER:-root}"
          OPENCLAW_HOME="${OPENCLAW_HOME:-/root}"
          OPENCLAW_NET_IFACE="${OPENCLAW_NET_IFACE:-eth0}"
          OPENCLAW_GATEWAY_PORT="${OPENCLAW_GATEWAY_PORT:-18789}"
          OPENCLAW_GATEWAY_BIND="${OPENCLAW_GATEWAY_BIND:-lan}"

          ENV_FILE="$OPENCLAW_HOME/.openclaw/.env"
          INFO_FILE="/root/openclaw-info.txt"

          ip link set lo up 2>/dev/null || true
          ip link set "$OPENCLAW_NET_IFACE" up 2>/dev/null || true

          if command -v ifup >/dev/null 2>&1; then
            timeout 25s ifup --force "$OPENCLAW_NET_IFACE" 2>/dev/null || true
          fi

          if command -v dhclient >/dev/null 2>&1; then
            timeout 20s dhclient -4 -1 "$OPENCLAW_NET_IFACE" 2>/dev/null || true
          fi

          /usr/local/sbin/openclaw-ensure-config || true

          TOKEN=""
          PASSWORD=""

          if [ -s "$ENV_FILE" ]; then
            TOKEN="$(grep '^OPENCLAW_GATEWAY_TOKEN=' "$ENV_FILE" | cut -d= -f2- || true)"
            PASSWORD="$(grep '^OPENCLAW_GATEWAY_PASSWORD=' "$ENV_FILE" | cut -d= -f2- || true)"
          fi

          IPV4_LIST="$(ip -o -4 addr show dev "$OPENCLAW_NET_IFACE" scope global 2>/dev/null | awk '{print $4}' | cut -d/ -f1 | paste -sd ' ' - || true)"
          IPV6_LIST="$(ip -o -6 addr show dev "$OPENCLAW_NET_IFACE" scope global 2>/dev/null | awk '{print $4}' | cut -d/ -f1 | grep -v '^fe80' | paste -sd ' ' - || true)"

          FIRST_IPV4="$(echo "$IPV4_LIST" | awk '{print $1}')"
          FIRST_IPV6="$(echo "$IPV6_LIST" | awk '{print $1}')"

          if systemctl is-active openclaw-gateway >/dev/null 2>&1; then
            GATEWAY_STATUS="running"
          else
            GATEWAY_STATUS="not-running"
          fi

          {
            echo "============================================================"
            echo "OpenClaw LXC Template"
            echo "============================================================"
            echo "OpenClaw 用户: $OPENCLAW_USER"
            echo "LXC 网卡: $OPENCLAW_NET_IFACE"
            echo "Gateway 端口: $OPENCLAW_GATEWAY_PORT"
            echo "Gateway 绑定: $OPENCLAW_GATEWAY_BIND"
            echo "Gateway 状态: $GATEWAY_STATUS"
            echo
            echo "IPv4 地址: ${IPV4_LIST:-未检测到}"
            echo "IPv6 地址: ${IPV6_LIST:-未检测到}"
            echo
            if [ -n "${FIRST_IPV4:-}" ]; then
              echo "访问地址 IPv4:"
              echo "  http://$FIRST_IPV4:$OPENCLAW_GATEWAY_PORT"
              echo "  ws://$FIRST_IPV4:$OPENCLAW_GATEWAY_PORT"
            else
              echo "访问地址 IPv4:"
              echo "  未检测到 IPv4，请检查 PVE net0 是否设置 ip=dhcp"
            fi
            echo
            if [ -n "${FIRST_IPV6:-}" ]; then
              echo "访问地址 IPv6:"
              echo "  http://[$FIRST_IPV6]:$OPENCLAW_GATEWAY_PORT"
              echo "  ws://[$FIRST_IPV6]:$OPENCLAW_GATEWAY_PORT"
            fi
            echo
            echo "Gateway Token:"
            echo "  ${TOKEN:-未生成}"
            echo
            echo "Gateway Password:"
            echo "  ${PASSWORD:-未生成}"
            echo
            echo "配置自定义 API:"
            echo "  openclaw-api-setup"
            echo
            echo "网络修复:"
            echo "  ip link set eth0 up"
            echo "  ifup --force eth0"
            echo "  dhclient -4 -1 eth0"
            echo
            echo "服务管理:"
            echo "  systemctl status openclaw-gateway --no-pager"
            echo "  systemctl restart openclaw-gateway"
            echo "  journalctl -u openclaw-gateway -f"
            echo "============================================================"
          } >"$INFO_FILE"

          chmod 600 "$INFO_FILE"
          cp "$INFO_FILE" /etc/motd || true
          REFRESH_INFO

          chmod +x /usr/local/sbin/openclaw-refresh-info

          echo "=================================================="
          echo "写入自定义 API 配置命令"
          echo "=================================================="

          cat >/usr/local/bin/openclaw-api-setup <<'API_SETUP'
          #!/usr/bin/env bash
          set -euo pipefail

          [ -f /etc/openclaw-lxc.env ] && . /etc/openclaw-lxc.env

          OPENCLAW_USER="${OPENCLAW_USER:-root}"
          OPENCLAW_HOME="${OPENCLAW_HOME:-/root}"
          OPENCLAW_GATEWAY_PORT="${OPENCLAW_GATEWAY_PORT:-18789}"
          OPENCLAW_GATEWAY_BIND="${OPENCLAW_GATEWAY_BIND:-lan}"

          /usr/local/sbin/openclaw-ensure-config

          ENV_FILE="$OPENCLAW_HOME/.openclaw/.env"
          . "$ENV_FILE"

          echo "============================================================"
          echo "OpenClaw 自定义 API 配置"
          echo "============================================================"
          echo "示例："
          echo "  Base URL: https://api.deepseek.com/v1"
          echo "  Model ID: deepseek-v4-flash"
          echo "  Provider ID: deepseek"
          echo
          read -r -p "Base URL: " BASE_URL
          read -r -p "Model ID: " MODEL_ID
          read -r -p "Provider ID，默认 custom: " PROVIDER_ID
          read -r -p "Compatibility，默认 openai: " COMPATIBILITY
          read -r -s -p "API Key: " CUSTOM_API_KEY
          echo

          PROVIDER_ID="${PROVIDER_ID:-custom}"
          COMPATIBILITY="${COMPATIBILITY:-openai}"

          if [ -z "$BASE_URL" ] || [ -z "$MODEL_ID" ] || [ -z "$CUSTOM_API_KEY" ]; then
            echo "错误：Base URL、Model ID、API Key 不能为空"
            exit 1
          fi

          if [ "$OPENCLAW_USER" = "root" ]; then
            env \
              HOME="$OPENCLAW_HOME" \
              OPENCLAW_HOME="$OPENCLAW_HOME" \
              OPENCLAW_GATEWAY_TOKEN="$OPENCLAW_GATEWAY_TOKEN" \
              CUSTOM_API_KEY="$CUSTOM_API_KEY" \
              OPENCLAW_HIDE_BANNER=1 \
              openclaw onboard \
                --non-interactive \
                --mode local \
                --auth-choice custom-api-key \
                --custom-base-url "$BASE_URL" \
                --custom-model-id "$MODEL_ID" \
                --custom-api-key "$CUSTOM_API_KEY" \
                --custom-provider-id "$PROVIDER_ID" \
                --custom-compatibility "$COMPATIBILITY" \
                --secret-input-mode plaintext \
                --gateway-port "$OPENCLAW_GATEWAY_PORT" \
                --gateway-bind "$OPENCLAW_GATEWAY_BIND" \
                --gateway-auth token \
                --gateway-token-ref-env OPENCLAW_GATEWAY_TOKEN \
                --skip-health \
                --skip-bootstrap \
                --skip-skills \
                --accept-risk
          else
            sudo -u "$OPENCLAW_USER" -H env \
              HOME="$OPENCLAW_HOME" \
              OPENCLAW_HOME="$OPENCLAW_HOME" \
              OPENCLAW_GATEWAY_TOKEN="$OPENCLAW_GATEWAY_TOKEN" \
              CUSTOM_API_KEY="$CUSTOM_API_KEY" \
              OPENCLAW_HIDE_BANNER=1 \
              openclaw onboard \
                --non-interactive \
                --mode local \
                --auth-choice custom-api-key \
                --custom-base-url "$BASE_URL" \
                --custom-model-id "$MODEL_ID" \
                --custom-api-key "$CUSTOM_API_KEY" \
                --custom-provider-id "$PROVIDER_ID" \
                --custom-compatibility "$COMPATIBILITY" \
                --secret-input-mode plaintext \
                --gateway-port "$OPENCLAW_GATEWAY_PORT" \
                --gateway-bind "$OPENCLAW_GATEWAY_BIND" \
                --gateway-auth token \
                --gateway-token-ref-env OPENCLAW_GATEWAY_TOKEN \
                --skip-health \
                --skip-bootstrap \
                --skip-skills \
                --accept-risk
          fi

          /usr/local/sbin/openclaw-ensure-config || true

          systemctl restart openclaw-gateway || true
          sleep 3

          /usr/local/sbin/openclaw-refresh-info || true

          echo
          echo "配置完成。"
          cat /root/openclaw-info.txt || true
          API_SETUP

          chmod +x /usr/local/bin/openclaw-api-setup

          echo "=================================================="
          echo "写入登录提示"
          echo "=================================================="

          cat >/etc/profile.d/openclaw-info.sh <<'LOGIN_INFO'
          #!/usr/bin/env bash

          if [ "$(id -u)" = "0" ]; then
            if [ -x /usr/local/sbin/openclaw-refresh-info ]; then
              /usr/local/sbin/openclaw-refresh-info >/dev/null 2>&1 || true
            fi

            if [ -f /root/openclaw-info.txt ]; then
              cat /root/openclaw-info.txt
            fi

            if [ ! -f /root/.openclaw/.openclaw-api-hint-shown ]; then
              mkdir -p /root/.openclaw 2>/dev/null || true
              touch /root/.openclaw/.openclaw-api-hint-shown 2>/dev/null || true
              echo
              echo "首次使用建议运行：openclaw-api-setup"
              echo
            fi
          fi
          LOGIN_INFO

          chmod +x /etc/profile.d/openclaw-info.sh

          echo "=================================================="
          echo "写入 systemd 服务"
          echo "=================================================="

          cat >/etc/systemd/system/openclaw-firstboot.service <<'FIRSTBOOT_SERVICE'
          [Unit]
          Description=OpenClaw LXC first boot setup
          After=lxc-eth0-up.service networking.service network-online.target
          Wants=lxc-eth0-up.service networking.service network-online.target

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/openclaw-lxc.env
          ExecStart=/usr/local/sbin/openclaw-refresh-info
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          FIRSTBOOT_SERVICE

          if [ "$OPENCLAW_USER" = "root" ]; then
            SERVICE_USER_LINES=""
          else
            SERVICE_USER_LINES="User=$OPENCLAW_USER
          Group=$OPENCLAW_GROUP"
          fi

          cat >/etc/systemd/system/openclaw-gateway.service <<GATEWAY_SERVICE
          [Unit]
          Description=OpenClaw Gateway
          After=lxc-eth0-up.service networking.service network-online.target openclaw-firstboot.service
          Wants=lxc-eth0-up.service networking.service network-online.target openclaw-firstboot.service

          [Service]
          Type=simple
          $SERVICE_USER_LINES
          WorkingDirectory=$OPENCLAW_HOME
          EnvironmentFile=-/etc/openclaw-lxc.env
          EnvironmentFile=-$OPENCLAW_HOME/.openclaw/.env
          Environment=HOME=$OPENCLAW_HOME
          Environment=OPENCLAW_HOME=$OPENCLAW_HOME
          Environment=OPENCLAW_CONFIG_PATH=$OPENCLAW_HOME/.openclaw/openclaw.json
          Environment=OPENCLAW_HIDE_BANNER=1
          ExecStartPre=/usr/local/sbin/openclaw-ensure-config
          ExecStart=/usr/bin/openclaw gateway
          Restart=always
          RestartSec=5
          TimeoutStartSec=120
          TimeoutStopSec=30
          SuccessExitStatus=0 143
          KillMode=control-group

          [Install]
          WantedBy=multi-user.target
          GATEWAY_SERVICE

          systemctl enable openclaw-firstboot.service
          systemctl enable openclaw-gateway.service

          echo "=================================================="
          echo "写入 README"
          echo "=================================================="

          cat >/root/README-OPENCLAW-LXC.txt <<README_FILE
          OpenClaw LXC Template

          重点：
          1. LXC 默认网卡是 eth0。
          2. lan 是 OpenClaw Gateway 绑定模式，不是网卡名。
          3. PVE 创建 CT 时必须使用：
             --net0 name=eth0,bridge=vmbr0,ip=dhcp,ip6=auto
          4. 已开启 SSH 密码登录和 root 登录。
          5. 不内置 root 密码，请在 PVE 创建 CT 时设置。
          6. 登录后运行 openclaw-api-setup 配置自定义 API。

          常用命令：
            ip a
            ifup --force eth0
            dhclient -4 -1 eth0
            systemctl status openclaw-gateway --no-pager
            systemctl restart openclaw-gateway
            journalctl -u openclaw-gateway -f
            openclaw-api-setup
          README_FILE

          chmod 600 /root/README-OPENCLAW-LXC.txt

          echo "=================================================="
          echo "清理模板"
          echo "=================================================="

          rm -f /etc/machine-id
          touch /etc/machine-id
          rm -f /var/lib/dbus/machine-id || true
          ln -sf /etc/machine-id /var/lib/dbus/machine-id || true

          rm -f /etc/ssh/ssh_host_* || true

          apt-get clean
          rm -rf /var/lib/apt/lists/*
          rm -rf /tmp/*
          rm -rf /var/tmp/*
          rm -f /root/.bash_history || true

          echo "OpenClaw LXC rootfs ready."
          INSIDE_SCRIPT

          sudo chmod +x "$ROOTFS/tmp/install-inside.sh"

          echo "=================================================="
          echo "[4/8] chroot 安装 OpenClaw"
          echo "=================================================="

          sudo env \
            OPENCLAW_VERSION="$OPENCLAW_VERSION" \
            RUN_AS_ROOT="$RUN_AS_ROOT" \
            GATEWAY_PORT="$GATEWAY_PORT" \
            GATEWAY_BIND="$GATEWAY_BIND" \
            chroot "$ROOTFS" /bin/bash /tmp/install-inside.sh

          echo "=================================================="
          echo "[5/8] 卸载 chroot 挂载点"
          echo "=================================================="

          cleanup_mounts
          trap - EXIT

          echo "=================================================="
          echo "[6/8] 自检"
          echo "=================================================="

          sudo test -x "$ROOTFS/usr/bin/openclaw"
          sudo test -x "$ROOTFS/usr/local/bin/openclaw-api-setup"
          sudo test -x "$ROOTFS/usr/local/sbin/openclaw-refresh-info"
          sudo test -x "$ROOTFS/usr/local/sbin/openclaw-ensure-config"

          sudo test -f "$ROOTFS/etc/network/interfaces"
          sudo grep -q "auto eth0" "$ROOTFS/etc/network/interfaces"
          sudo grep -q "iface eth0 inet dhcp" "$ROOTFS/etc/network/interfaces"

          sudo test -f "$ROOTFS/etc/systemd/system/lxc-eth0-up.service"
          sudo test -f "$ROOTFS/etc/systemd/system/openclaw-firstboot.service"
          sudo test -f "$ROOTFS/etc/systemd/system/openclaw-gateway.service"

          sudo grep -q "PasswordAuthentication yes" "$ROOTFS/etc/ssh/sshd_config.d/99-openclaw-lxc.conf"
          sudo grep -q "PermitRootLogin yes" "$ROOTFS/etc/ssh/sshd_config.d/99-openclaw-lxc.conf"

          echo "=================================================="
          echo "[7/8] 打包 LXC tar.gz"
          echo "=================================================="

          sudo tar \
            --numeric-owner \
            --xattrs \
            --acls \
            -czpf "$DIST_DIR/$IMAGE_NAME" \
            -C "$ROOTFS" .

          cd "$DIST_DIR"
          sha256sum "$IMAGE_NAME" > "$IMAGE_NAME.sha256"

          cat > RELEASE.md <<RELEASE_NOTES
          # OpenClaw LXC Template $VERSION

          ## 文件

          - $IMAGE_NAME
          - $IMAGE_NAME.sha256

          ## 特性

          - Debian 12 LXC
          - 不使用 Docker
          - 直接安装 OpenClaw
          - Node.js 24
          - SSH 密码登录开启
          - root SSH 登录开启
          - LXC eth0 DHCP 已修复
          - 开机自动拉起 eth0
          - 登录自动显示访问地址
          - 支持 openclaw-api-setup 配置自定义 API
          - Gateway 端口：$GATEWAY_PORT
          - Gateway 绑定：$GATEWAY_BIND
          - OpenClaw 运行用户：$RUN_USER

          ## PVE 创建示例

          下载到 PVE：

          \`\`\`bash
          cd /var/lib/vz/template/cache
          wget <Release 里的 $IMAGE_NAME 下载地址>
          \`\`\`

          创建 CT：

          \`\`\`bash
          pct create 101 local:vztmpl/$IMAGE_NAME \\
            --hostname Openclaw \\
            --ostype debian \\
            --cores 2 \\
            --memory 2048 \\
            --rootfs local-lvm:8 \\
            --net0 name=eth0,bridge=vmbr0,ip=dhcp,ip6=auto \\
            --features nesting=1 \\
            --unprivileged 0 \\
            --password '你的root密码' \\
            --start 1
          \`\`\`

          如果你的 PVE 网桥不是 vmbr0，请改成真实网桥。

          ## 首次登录

          \`\`\`bash
          openclaw-api-setup
          \`\`\`

          查看服务：

          \`\`\`bash
          systemctl status openclaw-gateway --no-pager
          journalctl -u openclaw-gateway -f
          \`\`\`

          网络修复：

          \`\`\`bash
          ip link set eth0 up
          ifup --force eth0
          dhclient -4 -1 eth0
          \`\`\`
          RELEASE_NOTES

          ls -lh "$IMAGE_NAME" "$IMAGE_NAME.sha256" RELEASE.md

          echo "=================================================="
          echo "[8/8] 强制发布 GitHub Release"
          echo "=================================================="

          TAG="openclaw-lxc-${VERSION}"
          TITLE="OpenClaw LXC ${VERSION}"

          echo "Repository: $GITHUB_REPOSITORY"
          echo "Tag: $TAG"
          echo "Image: $IMAGE_NAME"

          gh auth status --hostname github.com || true

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release 已存在，覆盖上传文件"
            gh release upload "$TAG" \
              "$IMAGE_NAME" \
              "$IMAGE_NAME.sha256" \
              RELEASE.md \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            echo "Release 不存在，创建 Release 并上传文件"
            gh release create "$TAG" \
              "$IMAGE_NAME" \
              "$IMAGE_NAME.sha256" \
              RELEASE.md \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file RELEASE.md
          fi

          echo "=================================================="
          echo "Release 上传完成"
          echo "=================================================="
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY"

          BUILD_SCRIPT

          chmod +x build-openclaw-lxc.sh
          ./build-openclaw-lxc.sh
