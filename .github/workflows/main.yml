name: Build OpenClaw LXC 2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，例如 v1.0.0；留空自动生成日期版本"
        required: false
        type: string

      openclaw_npm_spec:
        description: "OpenClaw npm 包，例如 openclaw 或 openclaw@1.2.3"
        required: false
        default: "openclaw"
        type: string

      openclaw_run_cmd:
        description: "OpenClaw 启动命令"
        required: false
        default: "openclaw onboard"
        type: string

      bind_host:
        description: "OpenClaw 监听地址"
        required: true
        default: "0.0.0.0"
        type: choice
        options:
          - "0.0.0.0"
          - "::"

      ipv6_policy:
        description: "IPv6 策略：ask=首次登录询问，0=关闭，1=开启"
        required: true
        default: "ask"
        type: choice
        options:
          - "ask"
          - "0"
          - "1"

      port_min:
        description: "随机端口最小值"
        required: false
        default: "20000"
        type: string

      port_max:
        description: "随机端口最大值"
        required: false
        default: "65000"
        type: string

      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release OpenClaw LXC
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare version
        id: vars
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -Eeuo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            if [[ -n "${INPUT_VERSION}" ]]; then
              VERSION="${INPUT_VERSION}"
            else
              VERSION="v$(date -u +'%Y.%m.%d-%H%M')"
            fi
          fi

          if ! [[ "$VERSION" =~ ^v?[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            echo "错误：版本号只能包含字母、数字、点、下划线、短横线，并且不能以特殊字符开头：$VERSION" >&2
            exit 1
          fi

          SAFE_VERSION="${VERSION#v}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "safe_version=${SAFE_VERSION}" >> "$GITHUB_OUTPUT"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SAFE_VERSION=${SAFE_VERSION}" >> "$GITHUB_ENV"

      - name: Build OpenClaw LXC template
        shell: bash
        env:
          TEMPLATE_NAME: openclaw-lxc
          VERSION: ${{ steps.vars.outputs.safe_version }}

          OPENCLAW_NPM_SPEC: ${{ inputs.openclaw_npm_spec || 'openclaw' }}
          OPENCLAW_RUN_CMD: ${{ inputs.openclaw_run_cmd || 'openclaw onboard' }}

          BIND_HOST: ${{ inputs.bind_host || '0.0.0.0' }}
          IPV6_POLICY: ${{ inputs.ipv6_policy || 'ask' }}

          PORT_MIN: ${{ inputs.port_min || '20000' }}
          PORT_MAX: ${{ inputs.port_max || '65000' }}

          DEBIAN_RELEASE: bookworm
          ARCH: amd64

          BUILD_MIRROR: http://deb.debian.org/debian

          CN_APT_MIRROR: https://mirrors.aliyun.com/debian
          CN_SECURITY_MIRROR: https://mirrors.aliyun.com/debian-security

          NPM_INSTALL_REGISTRY: https://registry.npmmirror.com
          NPM_FINAL_REGISTRY: https://registry.npmmirror.com
        run: |
          set -Eeuo pipefail

          chmod +x scripts/build-openclaw-lxc.sh
          sudo -E bash scripts/build-openclaw-lxc.sh

          sudo chown -R "$USER:$USER" dist

      - name: Verify dist
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "dist 文件："
          ls -lah dist

          IMAGE="$(ls -t dist/*.tar.gz | head -1)"
          echo "IMAGE=$IMAGE"

          gzip -t "$IMAGE"

          tar -tzf "$IMAGE" > /tmp/image-list.txt

          echo "检查 openclaw 命令..."
          grep -Eq '^\./usr/bin/openclaw$|^\./usr/local/bin/openclaw$' /tmp/image-list.txt
          grep -E '^\./usr/bin/openclaw$|^\./usr/local/bin/openclaw$' /tmp/image-list.txt

          echo
          echo "检查 openclaw node_modules..."
          grep -Eq '^\./usr/lib/node_modules/openclaw/|^\./usr/local/lib/node_modules/openclaw/' /tmp/image-list.txt
          grep -m 5 -E '^\./usr/lib/node_modules/openclaw/|^\./usr/local/lib/node_modules/openclaw/' /tmp/image-list.txt

          echo
          echo "检查 systemd 服务..."
          grep -Eq '^\./etc/systemd/system/openclaw.service$' /tmp/image-list.txt
          grep -E '^\./etc/systemd/system/openclaw.service$' /tmp/image-list.txt

          echo
          echo "检查 firstboot 脚本..."
          grep -Eq '^\./usr/local/bin/openclaw-firstboot$' /tmp/image-list.txt
          grep -E '^\./usr/local/bin/openclaw-firstboot$' /tmp/image-list.txt

          echo
          echo "验证通过。"
          echo
          cat dist/build-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-lxc-template-${{ steps.vars.outputs.safe_version }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
          retention-days: 30

      - name: Create release notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
          SAFE_VERSION: ${{ steps.vars.outputs.safe_version }}
        run: |
          set -Eeuo pipefail

          cat > release-notes.md <<EOF
          # OpenClaw LXC Template ${RELEASE_VERSION}

          ## 文件说明

          - \`openclaw-lxc-debian12-${SAFE_VERSION}.tar.gz\`：PVE LXC 模板
          - \`.sha256\`：SHA256 校验文件
          - \`.list\`：模板文件列表
          - \`build-info.txt\`：构建信息

          ## 上传到 PVE

          \`\`\`bash
          scp openclaw-lxc-debian12-${SAFE_VERSION}.tar.gz root@你的PVE:/var/lib/vz/template/cache/
          \`\`\`

          ## 创建 LXC

          \`\`\`bash
          pct create 200 local:vztmpl/openclaw-lxc-debian12-${SAFE_VERSION}.tar.gz \\
            --hostname openclaw-200 \\
            --cores 2 \\
            --memory 4096 \\
            --swap 1024 \\
            --rootfs local-lvm:20 \\
            --net0 name=eth0,bridge=vmbr0,ip=dhcp,ip6=auto \\
            --features nesting=1,keyctl=1 \\
            --unprivileged 1 \\
            --start 1
          \`\`\`

          国内环境如需在 PVE 层直接禁用 IPv6：

          \`\`\`bash
          pct create 200 local:vztmpl/openclaw-lxc-debian12-${SAFE_VERSION}.tar.gz \\
            --hostname openclaw-200 \\
            --cores 2 \\
            --memory 4096 \\
            --swap 1024 \\
            --rootfs local-lvm:20 \\
            --net0 name=eth0,bridge=vmbr0,ip=dhcp,ip6=none \\
            --features nesting=1,keyctl=1 \\
            --unprivileged 1 \\
            --start 1
          \`\`\`

          ## 进入容器

          \`\`\`bash
          pct enter 200
          cat /root/openclaw-info.txt
          openclaw-set-api
          systemctl status openclaw --no-pager -l
          \`\`\`
          EOF

          echo "" >> release-notes.md
          echo "## 构建信息" >> release-notes.md
          echo '```text' >> release-notes.md
          cat dist/build-info.txt >> release-notes.md
          echo '```' >> release-notes.md

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.vars.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        run: |
          set -Eeuo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release 已存在，更新说明并覆盖上传资产"
            gh release edit "$TAG_NAME" \
              --title "OpenClaw LXC Template $TAG_NAME" \
              --notes-file release-notes.md
          else
            if [[ "$PRERELEASE" == "true" ]]; then
              gh release create "$TAG_NAME" \
                --target "$GITHUB_SHA" \
                --title "OpenClaw LXC Template $TAG_NAME" \
                --notes-file release-notes.md \
                --prerelease
            else
              gh release create "$TAG_NAME" \
                --target "$GITHUB_SHA" \
                --title "OpenClaw LXC Template $TAG_NAME" \
                --notes-file release-notes.md
            fi
          fi

          gh release upload "$TAG_NAME" \
            dist/*.tar.gz \
            dist/*.sha256 \
            dist/*.list \
            dist/build-info.txt \
            --clobber

