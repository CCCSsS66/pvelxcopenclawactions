name: Build Hermes Agent PVE LXC Template

on:
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: "Hermes Agent branch/tag/commit"
        required: false
        default: "main"
      image_prefix:
        description: "Output image prefix"
        required: false
        default: "hermes-agent-lxc-debian12-amd64"
      publish_release:
        description: "Publish GitHub Release"
        required: true
        type: boolean
        default: true
      disable_ipv6_default:
        description: "Disable IPv6 on first boot by default"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build LXC tar.gz
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive
      DISTRO: bookworm
      ARCH: amd64
      HERMES_REPO: https://github.com/NousResearch/hermes-agent.git

    steps:
      - name: Prepare metadata
        shell: bash
        run: |
          set -Eeuo pipefail
          DATE_TAG="$(date -u +'%Y.%m.%d-%H%M')"
          IMAGE_PREFIX="${{ inputs.image_prefix }}"
          IMAGE_NAME="${IMAGE_PREFIX}-${DATE_TAG}.tar.gz"
          RELEASE_TAG="hermes-lxc-${DATE_TAG}"
          echo "DATE_TAG=${DATE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_PREFIX=${IMAGE_PREFIX}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "Image: ${IMAGE_NAME}"
          echo "Release: ${RELEASE_TAG}"

      - name: Install build dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            ca-certificates \
            curl \
            wget \
            git \
            gnupg \
            tar \
            gzip \
            xz-utils \
            zstd \
            rsync \
            openssl \
            jq \
            coreutils \
            util-linux

      - name: Build Hermes Agent LXC image
        shell: bash
        run: |
          set -Eeuo pipefail

          WORK_DIR="$GITHUB_WORKSPACE/work"
          ROOTFS="$WORK_DIR/rootfs"
          DIST_DIR="$GITHUB_WORKSPACE/dist"
          IMAGE_PATH="$DIST_DIR/$IMAGE_NAME"
          LIST_PATH="$IMAGE_PATH.list"
          SHA_PATH="$IMAGE_PATH.sha256"
          INFO_PATH="$DIST_DIR/build-info.txt"
          README_PATH="$DIST_DIR/README.md"
          HERMES_REF="${{ inputs.hermes_ref }}"
          DISABLE_IPV6_DEFAULT="${{ inputs.disable_ipv6_default }}"

          sudo rm -rf "$WORK_DIR" "$DIST_DIR"
          mkdir -p "$DIST_DIR"
          sudo mkdir -p "$ROOTFS"

          cleanup_mounts() {
            set +e
            sudo umount -lf "$ROOTFS/proc" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/sys" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/dev/pts" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/dev" 2>/dev/null || true
          }
          trap cleanup_mounts EXIT

          echo "=================================================="
          echo "[1/10] debootstrap Debian 12"
          echo "=================================================="
          sudo debootstrap --variant=minbase --arch="$ARCH" "$DISTRO" "$ROOTFS" http://deb.debian.org/debian
          sudo cp /etc/resolv.conf "$ROOTFS/etc/resolv.conf"

          sudo mount -t proc proc "$ROOTFS/proc"
          sudo mount --rbind /sys "$ROOTFS/sys"
          sudo mount --make-rslave "$ROOTFS/sys"
          sudo mount --rbind /dev "$ROOTFS/dev"
          sudo mount --make-rslave "$ROOTFS/dev"

          echo "=================================================="
          echo "[2/10] Write installer into rootfs"
          echo "=================================================="
          sudo tee "$ROOTFS/root/install-hermes-lxc.sh" >/dev/null <<'INSTALL_SCRIPT'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          export DEBIAN_FRONTEND=noninteractive
          export HERMES_REF="${HERMES_REF:-main}"
          export DISABLE_IPV6_DEFAULT="${DISABLE_IPV6_DEFAULT:-false}"

          log() {
            echo
            echo "=================================================="
            echo "$*"
            echo "=================================================="
          }

          log "[inside 1/9] Install base system packages"
          cat > /etc/apt/sources.list <<'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          apt-get update
          apt-get install -y \
            apt-transport-https \
            ca-certificates \
            curl \
            wget \
            gnupg \
            git \
            bash \
            sudo \
            locales \
            tzdata \
            dbus \
            systemd \
            systemd-sysv \
            openssh-server \
            nginx \
            apache2-utils \
            openssl \
            python3 \
            python3.11 \
            python3.11-venv \
            python3-pip \
            python3-dev \
            build-essential \
            pkg-config \
            libffi-dev \
            libssl-dev \
            ripgrep \
            ffmpeg \
            jq \
            nano \
            vim-tiny \
            iproute2 \
            iputils-ping \
            net-tools \
            procps \
            lsof \
            htop \
            less \
            unzip \
            xz-utils \
            tar \
            cron \
            logrotate \
            bash-completion

          sed -i 's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen || true
          sed -i 's/^# *zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' /etc/locale.gen || true
          locale-gen || true
          cat > /etc/default/locale <<'EOF'
          LANG=en_US.UTF-8
          LC_ALL=en_US.UTF-8
          EOF
          ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo "Asia/Shanghai" > /etc/timezone

          log "[inside 2/9] Install Node.js 22"
          curl -fsSL https://deb.nodesource.com/setup_22.x -o /tmp/nodesource_setup.sh
          bash /tmp/nodesource_setup.sh
          apt-get install -y nodejs
          node -v
          npm -v

          log "[inside 3/9] Create hermes user"
          if ! id hermes >/dev/null 2>&1; then
            useradd -m -s /bin/bash hermes
          fi
          usermod -aG sudo hermes || true
          passwd -l hermes || true
          mkdir -p /home/hermes/workspace /home/hermes/.hermes
          chown -R hermes:hermes /home/hermes

          log "[inside 4/9] Clone Hermes Agent"
          rm -rf /opt/hermes-agent
          mkdir -p /opt
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /opt/hermes-agent
          cd /opt/hermes-agent
          if [ "$HERMES_REF" != "main" ]; then
            git fetch --depth 1 origin "$HERMES_REF" || true
            git checkout FETCH_HEAD 2>/dev/null || git checkout "$HERMES_REF" 2>/dev/null || true
          fi
          git rev-parse --short HEAD > /etc/hermes-commit.txt
          chown -R hermes:hermes /opt/hermes-agent

          log "[inside 5/9] Install Hermes Agent into venv"
          runuser -u hermes -- bash -lc '
            set -Eeuo pipefail
            cd /opt/hermes-agent
            python3.11 -m venv venv
            ./venv/bin/python -m pip install --upgrade pip setuptools wheel
            ./venv/bin/python -m pip install -e .
            mkdir -p /home/hermes/.local/bin
          '

          ln -sf /opt/hermes-agent/venv/bin/hermes /usr/local/bin/hermes
          if [ -x /opt/hermes-agent/venv/bin/hermes-agent ]; then
            ln -sf /opt/hermes-agent/venv/bin/hermes-agent /usr/local/bin/hermes-agent
          fi

          log "[inside 6/9] Build Hermes Web Dashboard"
          runuser -u hermes -- bash -lc '
            set -Eeuo pipefail
            cd /opt/hermes-agent
            if [ -d web ]; then
              cd web
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
              npm run build
            fi
            test -f /opt/hermes-agent/hermes_cli/web_dist/index.html
          '

          log "[inside 7/9] Write management scripts"
          mkdir -p /etc/hermes-lxc

          cat > /usr/local/bin/hermes-info <<'EOF'
          #!/usr/bin/env bash
          set -e
          INFO="/etc/hermes-lxc/info.env"
          if [ -f "$INFO" ]; then
            source "$INFO"
          fi
          IPV4="$(hostname -I 2>/dev/null | tr ' ' '\n' | grep -E '^[0-9]+\.' | head -n1 || true)"
          IPV6="$(hostname -I 2>/dev/null | tr ' ' '\n' | grep ':' | head -n1 || true)"
          echo
          echo "=================================================="
          echo " Hermes Agent PVE LXC"
          echo "=================================================="
          echo "Web 用户名 : ${WEB_USER:-admin}"
          echo "Web 密码   : ${WEB_PASS:-未初始化}"
          echo "Web 端口   : ${WEB_PORT:-未初始化}"
          echo
          if [ -n "${IPV4:-}" ] && [ -n "${WEB_PORT:-}" ]; then
            echo "IPv4 访问  : http://${IPV4}:${WEB_PORT}"
          fi
          if [ -n "${IPV6:-}" ] && [ -n "${WEB_PORT:-}" ]; then
            echo "IPv6 访问  : http://[${IPV6}]:${WEB_PORT}"
          fi
          echo
          echo "内部 Dashboard : http://127.0.0.1:9119"
          echo "Hermes 用户    : hermes"
          echo "Hermes 目录    : /opt/hermes-agent"
          echo "配置目录       : /home/hermes/.hermes"
          echo
          echo "常用命令:"
          echo "  hermes-menu       管理菜单"
          echo "  hermes-status     状态检查"
          echo "  hermes-logs       查看日志"
          echo "  hermes-set-model  配置模型 API"
          echo "  hermes-reset-web  重置 Web 端口和密码"
          echo "  hermes-ipv6-off   关闭 IPv6"
          echo "  hermes-ipv6-on    开启 IPv6"
          echo "=================================================="
          echo
          EOF
          chmod +x /usr/local/bin/hermes-info

          cat > /usr/local/bin/hermes-ipv6-off <<'EOF'
          #!/usr/bin/env bash
          set -e
          cat > /etc/sysctl.d/99-disable-ipv6.conf <<'SYSCTL'
          net.ipv6.conf.all.disable_ipv6 = 1
          net.ipv6.conf.default.disable_ipv6 = 1
          net.ipv6.conf.lo.disable_ipv6 = 1
          SYSCTL
          sysctl --system >/dev/null 2>&1 || true
          for f in /proc/sys/net/ipv6/conf/*/disable_ipv6; do
            echo 1 > "$f" 2>/dev/null || true
          done
          echo "IPv6 关闭命令已执行。非特权 LXC 如无效，需要在 PVE 宿主机侧关闭。"
          EOF
          chmod +x /usr/local/bin/hermes-ipv6-off

          cat > /usr/local/bin/hermes-ipv6-on <<'EOF'
          #!/usr/bin/env bash
          set -e
          rm -f /etc/sysctl.d/99-disable-ipv6.conf
          for f in /proc/sys/net/ipv6/conf/*/disable_ipv6; do
            echo 0 > "$f" 2>/dev/null || true
          done
          sysctl --system >/dev/null 2>&1 || true
          echo "IPv6 开启命令已执行。"
          EOF
          chmod +x /usr/local/bin/hermes-ipv6-on

          cat > /usr/local/bin/hermes-set-model <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          HERMES_HOME="/home/hermes/.hermes"
          CONFIG="$HERMES_HOME/config.yaml"
          ENV_FILE="$HERMES_HOME/.env"
          mkdir -p "$HERMES_HOME"
          touch "$ENV_FILE"
          chmod 600 "$ENV_FILE"
          chown -R hermes:hermes "$HERMES_HOME"
          echo
          echo "=================================================="
          echo " Hermes 模型 API 配置"
          echo "=================================================="
          read -rp "Provider [custom]: " PROVIDER
          PROVIDER="${PROVIDER:-custom}"
          read -rp "Base URL [https://api.deepseek.com/v1]: " BASE_URL
          BASE_URL="${BASE_URL:-https://api.deepseek.com/v1}"
          read -rp "Model [deepseek-chat]: " MODEL_NAME
          MODEL_NAME="${MODEL_NAME:-deepseek-chat}"
          read -rsp "API Key: " API_KEY
          echo
          if [ -z "$API_KEY" ]; then
            echo "API Key 不能为空。"
            exit 1
          fi
          export HERMES_PROVIDER="$PROVIDER"
          export HERMES_BASE_URL="$BASE_URL"
          export HERMES_MODEL_NAME="$MODEL_NAME"
          export HERMES_API_KEY_VALUE="$API_KEY"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          home = Path('/home/hermes/.hermes')
          config = home / 'config.yaml'
          env_file = home / '.env'
          provider = os.environ['HERMES_PROVIDER']
          base_url = os.environ['HERMES_BASE_URL']
          model = os.environ['HERMES_MODEL_NAME']
          api_key = os.environ['HERMES_API_KEY_VALUE']
          def q(v):
              return json.dumps(v, ensure_ascii=False)
          config.write_text(f'''# Generated by hermes-set-model
          model:
            provider: {q(provider)}
            default: {q(model)}
            base_url: {q(base_url)}
            api_key: {q(api_key)}

          terminal:
            backend: "local"
            cwd: "/home/hermes/workspace"
            timeout: 180
            lifetime_seconds: 300
          ''', encoding='utf-8')
          old = env_file.read_text(encoding='utf-8', errors='ignore').splitlines() if env_file.exists() else []
          remove = ('OPENAI_API_KEY=', 'OPENAI_BASE_URL=', 'OPENROUTER_API_KEY=', 'HERMES_API_KEY=')
          kept = [x for x in old if not x.startswith(remove)]
          add = [f'OPENAI_API_KEY={api_key}', f'OPENAI_BASE_URL={base_url}', f'HERMES_API_KEY={api_key}']
          if provider == 'openrouter':
              add.append(f'OPENROUTER_API_KEY={api_key}')
          env_file.write_text('\n'.join(kept + add) + '\n', encoding='utf-8')
          PY
          chown -R hermes:hermes "$HERMES_HOME"
          chmod 600 "$ENV_FILE"
          systemctl restart hermes-dashboard.service || true
          echo "模型配置完成：$PROVIDER / $BASE_URL / $MODEL_NAME"
          EOF
          chmod +x /usr/local/bin/hermes-set-model

          cat > /usr/local/bin/hermes-firstboot <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          INFO_DIR="/etc/hermes-lxc"
          INFO_FILE="$INFO_DIR/info.env"
          DONE_FILE="$INFO_DIR/firstboot.done"
          MODE="${1:-}"
          mkdir -p "$INFO_DIR"
          random_port() { shuf -i 20000-50000 -n 1; }
          random_pass() { openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | head -c 18; }
          if [ -f "$INFO_FILE" ]; then
            source "$INFO_FILE"
          fi
          if [ "$MODE" = "--reset-web" ] || [ ! -f "$DONE_FILE" ]; then
            WEB_PORT="${HERMES_WEB_PORT:-$(random_port)}"
            WEB_USER="${HERMES_WEB_USER:-admin}"
            WEB_PASS="${HERMES_WEB_PASS:-$(random_pass)}"
            API_KEY="${API_KEY:-$(openssl rand -hex 32)}"
            htpasswd -bc /etc/nginx/.htpasswd-hermes "$WEB_USER" "$WEB_PASS" >/dev/null
            cat > /etc/nginx/sites-available/hermes <<NGINX
          server {
              listen ${WEB_PORT} default_server;
              listen [::]:${WEB_PORT} default_server;
              server_name _;
              client_max_body_size 100m;
              auth_basic "Hermes Agent";
              auth_basic_user_file /etc/nginx/.htpasswd-hermes;
              location / {
                  proxy_pass http://127.0.0.1:9119;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 3600;
                  proxy_send_timeout 3600;
              }
          }
          NGINX
            rm -f /etc/nginx/sites-enabled/default
            ln -sf /etc/nginx/sites-available/hermes /etc/nginx/sites-enabled/hermes
            cat > "$INFO_FILE" <<INFO
          WEB_PORT="$WEB_PORT"
          WEB_USER="$WEB_USER"
          WEB_PASS="$WEB_PASS"
          API_KEY="$API_KEY"
          INFO
            chmod 600 "$INFO_FILE"
          fi
          mkdir -p /home/hermes/.hermes /home/hermes/workspace
          touch /home/hermes/.hermes/.env
          chmod 600 /home/hermes/.hermes/.env
          chown -R hermes:hermes /home/hermes/.hermes /home/hermes/workspace
          if [ "${DISABLE_IPV6_DEFAULT:-false}" = "true" ] && [ ! -f "$DONE_FILE" ]; then
            /usr/local/bin/hermes-ipv6-off || true
          fi
          nginx -t
          systemctl enable nginx >/dev/null 2>&1 || true
          systemctl restart nginx || true
          systemctl enable hermes-dashboard.service >/dev/null 2>&1 || true
          systemctl restart hermes-dashboard.service || true
          touch "$DONE_FILE"
          EOF
          chmod +x /usr/local/bin/hermes-firstboot

          cat > /usr/local/bin/hermes-reset-web <<'EOF'
          #!/usr/bin/env bash
          set -e
          unset HERMES_WEB_PORT HERMES_WEB_USER HERMES_WEB_PASS
          /usr/local/bin/hermes-firstboot --reset-web
          hermes-info
          EOF
          chmod +x /usr/local/bin/hermes-reset-web

          cat > /usr/local/bin/hermes-status <<'EOF'
          #!/usr/bin/env bash
          set +e
          echo "=================================================="
          echo " Hermes Agent 状态"
          echo "=================================================="
          systemctl --no-pager --full status hermes-dashboard.service 2>/dev/null | sed -n '1,18p'
          echo
          systemctl --no-pager --full status nginx.service 2>/dev/null | sed -n '1,18p'
          echo
          ss -tulnp | grep -E '(:9119|nginx|hermes)' || true
          echo
          runuser -u hermes -- bash -lc 'export PATH=/opt/hermes-agent/venv/bin:$PATH; hermes --help >/dev/null && echo "hermes 命令正常" || echo "hermes 命令异常"'
          echo
          hermes-info
          EOF
          chmod +x /usr/local/bin/hermes-status

          cat > /usr/local/bin/hermes-logs <<'EOF'
          #!/usr/bin/env bash
          set -e
          journalctl -u hermes-dashboard.service -u hermes-firstboot.service -u nginx.service -n 200 --no-pager
          EOF
          chmod +x /usr/local/bin/hermes-logs

          cat > /usr/local/bin/hermes-menu <<'EOF'
          #!/usr/bin/env bash
          set -e
          while true; do
            clear
            echo "=================================================="
            echo " Hermes Agent PVE LXC 管理菜单"
            echo "=================================================="
            echo "1. 查看访问信息"
            echo "2. 查看服务状态"
            echo "3. 配置模型 API"
            echo "4. 重置 Web 端口/账号密码"
            echo "5. 重启 Hermes Dashboard"
            echo "6. 查看日志"
            echo "7. 关闭 IPv6"
            echo "8. 开启 IPv6"
            echo "9. 进入 hermes 用户 shell"
            echo "0. 退出"
            echo "=================================================="
            read -rp "请选择: " CHOICE
            case "$CHOICE" in
              1) hermes-info; read -rp "按回车继续..." _ ;;
              2) hermes-status; read -rp "按回车继续..." _ ;;
              3) hermes-set-model; read -rp "按回车继续..." _ ;;
              4) hermes-reset-web; read -rp "按回车继续..." _ ;;
              5) systemctl restart hermes-dashboard.service nginx; echo "已重启"; read -rp "按回车继续..." _ ;;
              6) hermes-logs; read -rp "按回车继续..." _ ;;
              7) hermes-ipv6-off; read -rp "按回车继续..." _ ;;
              8) hermes-ipv6-on; read -rp "按回车继续..." _ ;;
              9) su - hermes ;;
              0) exit 0 ;;
              *) echo "无效选择"; sleep 1 ;;
            esac
          done
          EOF
          chmod +x /usr/local/bin/hermes-menu

          cat > /etc/profile.d/hermes-info.sh <<'EOF'
          #!/usr/bin/env bash
          if [ -t 1 ]; then
            echo
            echo "Hermes Agent LXC 已安装。输入 hermes-info 查看访问地址，输入 hermes-menu 打开管理菜单。"
            echo
          fi
          EOF
          chmod +x /etc/profile.d/hermes-info.sh

          log "[inside 8/9] Write systemd services"
          cat > /etc/systemd/system/hermes-firstboot.service <<'EOF'
          [Unit]
          Description=Hermes Agent First Boot Initializer
          DefaultDependencies=no
          After=local-fs.target
          Before=multi-user.target nginx.service hermes-dashboard.service

          [Service]
          Type=oneshot
          Environment=DISABLE_IPV6_DEFAULT=false
          ExecStart=/usr/local/bin/hermes-firstboot
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          EOF
          if [ "$DISABLE_IPV6_DEFAULT" = "true" ]; then
            sed -i 's/Environment=DISABLE_IPV6_DEFAULT=false/Environment=DISABLE_IPV6_DEFAULT=true/' /etc/systemd/system/hermes-firstboot.service
          fi

          cat > /etc/systemd/system/hermes-dashboard.service <<'EOF'
          [Unit]
          Description=Hermes Agent Web Dashboard
          Wants=network-online.target
          After=network-online.target hermes-firstboot.service
          Requires=hermes-firstboot.service

          [Service]
          Type=simple
          User=hermes
          Group=hermes
          WorkingDirectory=/opt/hermes-agent
          Environment=HOME=/home/hermes
          Environment=HERMES_HOME=/home/hermes/.hermes
          Environment=PATH=/opt/hermes-agent/venv/bin:/home/hermes/.local/bin:/usr/local/bin:/usr/bin:/bin
          ExecStart=/opt/hermes-agent/venv/bin/hermes dashboard --host 127.0.0.1 --port 9119 --no-open --skip-build
          Restart=always
          RestartSec=5
          KillSignal=SIGTERM
          TimeoutStopSec=20

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl enable hermes-firstboot.service
          systemctl enable hermes-dashboard.service

          log "[inside 9/9] Switch apt source to China mirror and clean image"
          cat > /etc/apt/sources.list <<'EOF'
          deb https://mirrors.ustc.edu.cn/debian/ bookworm main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian/ bookworm-updates main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian-security/ bookworm-security main contrib non-free non-free-firmware
          EOF
          apt-get clean
          rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
          rm -f /etc/ssh/ssh_host_*
          truncate -s 0 /etc/machine-id || true
          rm -f /var/lib/dbus/machine-id || true
          find /var/log -type f -exec truncate -s 0 {} \; 2>/dev/null || true
          chown -R hermes:hermes /opt/hermes-agent /home/hermes
          echo "Hermes internal install completed. Commit: $(cat /etc/hermes-commit.txt 2>/dev/null || echo unknown)"
          INSTALL_SCRIPT

          sudo chmod +x "$ROOTFS/root/install-hermes-lxc.sh"

          echo "=================================================="
          echo "[3/10] Run installer inside rootfs"
          echo "=================================================="
          sudo chroot "$ROOTFS" /usr/bin/env \
            HERMES_REF="$HERMES_REF" \
            DISABLE_IPV6_DEFAULT="$DISABLE_IPV6_DEFAULT" \
            DEBIAN_FRONTEND=noninteractive \
            /bin/bash /root/install-hermes-lxc.sh

          echo "=================================================="
          echo "[4/10] Verify Hermes in rootfs"
          echo "=================================================="
          sudo chroot "$ROOTFS" /bin/bash -lc '
            set -Eeuo pipefail
            test -x /opt/hermes-agent/venv/bin/hermes
            test -L /usr/local/bin/hermes
            test -f /opt/hermes-agent/hermes_cli/web_dist/index.html
            test -f /etc/systemd/system/hermes-firstboot.service
            test -f /etc/systemd/system/hermes-dashboard.service
            test -x /usr/local/bin/hermes-menu
            test -x /usr/local/bin/hermes-set-model
            test -x /usr/local/bin/hermes-ipv6-off
            /opt/hermes-agent/venv/bin/hermes --help >/dev/null
            echo "Hermes verify OK"
          '

          echo "=================================================="
          echo "[5/10] Build info"
          echo "=================================================="
          sudo tee "$ROOTFS/etc/hermes-lxc/build-info.txt" >/dev/null <<EOF
          Image: $IMAGE_NAME
          Build date UTC: $(date -u +'%Y-%m-%d %H:%M:%S')
          Debian: 12 bookworm
          Arch: amd64
          Hermes repo: $HERMES_REPO
          Hermes ref: $HERMES_REF
          GitHub repository: $GITHUB_REPOSITORY
          GitHub run id: $GITHUB_RUN_ID
          GitHub run number: $GITHUB_RUN_NUMBER
          IPv6 disabled by default: $DISABLE_IPV6_DEFAULT
          EOF
          sudo cp "$ROOTFS/etc/hermes-lxc/build-info.txt" "$INFO_PATH"

          echo "=================================================="
          echo "[6/10] Cleanup mounts"
          echo "=================================================="
          cleanup_mounts
          trap - EXIT

          echo "=================================================="
          echo "[7/10] Package tar.gz"
          echo "=================================================="
          sudo tar --numeric-owner --xattrs --acls -C "$ROOTFS" -czf "$IMAGE_PATH" .
          sudo chown -R "$USER:$USER" "$DIST_DIR"

          echo "=================================================="
          echo "[8/10] Generate list and sha256"
          echo "=================================================="
          tar -tzf "$IMAGE_PATH" | tee "$LIST_PATH" >/dev/null
          (cd "$DIST_DIR" && sha256sum "$IMAGE_NAME" > "$IMAGE_NAME.sha256")

          echo "=================================================="
          echo "[9/10] Verify archive content"
          echo "=================================================="
          grep -q './opt/hermes-agent/venv/bin/hermes' "$LIST_PATH"
          grep -q './usr/local/bin/hermes-menu' "$LIST_PATH"
          grep -q './usr/local/bin/hermes-set-model' "$LIST_PATH"
          grep -q './etc/systemd/system/hermes-dashboard.service' "$LIST_PATH"
          grep -q './opt/hermes-agent/hermes_cli/web_dist/index.html' "$LIST_PATH"

          echo "=================================================="
          echo "[10/10] Generate README"
          echo "=================================================="
          cat > "$README_PATH" <<EOF
          # Hermes Agent PVE LXC Template

          ## 文件

          - $IMAGE_NAME
          - $IMAGE_NAME.sha256
          - $IMAGE_NAME.list
          - build-info.txt

          ## PVE 导入路径

          上传到：

          \`\`\`bash
          /var/lib/vz/template/cache/$IMAGE_NAME
          \`\`\`

          ## 创建 LXC

          \`\`\`bash
          pct create 101 local:vztmpl/$IMAGE_NAME \\
            --hostname hermes-agent \\
            --cores 2 \\
            --memory 2048 \\
            --swap 1024 \\
            --rootfs local-lvm:16 \\
            --net0 name=eth0,bridge=vmbr0,ip=dhcp \\
            --unprivileged 1 \\
            --features nesting=1 \\
            --start 1
          \`\`\`

          ## 常用命令

          \`\`\`bash
          hermes-info       # 查看访问地址、账号、密码
          hermes-menu       # 管理菜单
          hermes-status     # 状态检查
          hermes-logs       # 查看日志
          hermes-set-model  # 配置自定义模型 API
          hermes-reset-web  # 重置 Web 端口和密码
          hermes-ipv6-off   # 关闭 IPv6
          hermes-ipv6-on    # 开启 IPv6
          \`\`\`

          ## 说明

          - Dashboard 内部监听 127.0.0.1:9119
          - 外部通过 Nginx 随机端口访问
          - Web 用户名默认 admin
          - Web 密码首次启动随机生成
          - 不内置任何模型 API Key
          - 启动后运行 hermes-set-model 配置 DeepSeek、OpenAI 兼容接口或其他接口
          EOF

          ls -lh "$DIST_DIR"
          echo "SHA256:"
          cat "$SHA_PATH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-lxc-template
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
            dist/README.md
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Hermes Agent LXC ${{ env.RELEASE_TAG }}
          body_path: dist/README.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
            dist/README.md
