name: Build Hermes Agent LXC

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，例如 v1.0.0；留空自动生成日期版本"
        required: false
        type: string

      hermes_ref:
        description: "Hermes Agent 分支/标签/commit"
        required: false
        default: "main"
        type: string

      bind_host:
        description: "Hermes Dashboard 监听地址"
        required: true
        default: "0.0.0.0"
        type: choice
        options:
          - "0.0.0.0"
          - "::"

      ipv6_policy:
        description: "IPv6 策略：ask=首次登录询问，0=关闭，1=开启"
        required: true
        default: "ask"
        type: choice
        options:
          - "ask"
          - "0"
          - "1"

      port_min:
        description: "随机端口最小值"
        required: false
        default: "20000"
        type: string

      port_max:
        description: "随机端口最大值"
        required: false
        default: "65000"
        type: string

      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release Hermes Agent LXC
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare version
        id: vars
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -Eeuo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            if [[ -n "${INPUT_VERSION}" ]]; then
              VERSION="${INPUT_VERSION}"
            else
              VERSION="v$(date -u +'%Y.%m.%d-%H%M')"
            fi
          fi

          if ! [[ "$VERSION" =~ ^v?[A-Za-z0-9][A-Za-z0-9._-]*$ ]]; then
            echo "错误：版本号只能包含字母、数字、点、下划线、短横线，并且不能以特殊字符开头：$VERSION" >&2
            exit 1
          fi

          SAFE_VERSION="${VERSION#v}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "safe_version=${SAFE_VERSION}" >> "$GITHUB_OUTPUT"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "SAFE_VERSION=${SAFE_VERSION}" >> "$GITHUB_ENV"

      - name: Build Hermes Agent LXC template
        shell: bash
        env:
          TEMPLATE_NAME: hermes-agent-root-lxc
          VERSION: ${{ steps.vars.outputs.safe_version }}

          HERMES_REF: ${{ inputs.hermes_ref || 'main' }}
          BIND_HOST: ${{ inputs.bind_host || '0.0.0.0' }}
          IPV6_POLICY: ${{ inputs.ipv6_policy || 'ask' }}

          PORT_MIN: ${{ inputs.port_min || '20000' }}
          PORT_MAX: ${{ inputs.port_max || '65000' }}

          DEBIAN_RELEASE: bookworm
          ARCH: amd64

          BUILD_MIRROR: http://deb.debian.org/debian
          CN_APT_MIRROR: https://mirrors.aliyun.com/debian
          CN_SECURITY_MIRROR: https://mirrors.aliyun.com/debian-security
        run: |
          set -Eeuo pipefail

          chmod +x scripts/build-hermes-lxc.sh
          sudo -E bash scripts/build-hermes-lxc.sh

          sudo chown -R "$USER:$USER" dist

      - name: Verify dist
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "dist 文件："
          ls -lah dist

          IMAGE="$(ls -t dist/*.tar.gz | head -1)"
          echo "IMAGE=$IMAGE"

          gzip -t "$IMAGE"

          tar -tzf "$IMAGE" > /tmp/image-list.txt

          echo "检查 hermes 命令..."
          grep -Eq '^\./opt/hermes-agent/venv/bin/hermes$|^\./usr/local/bin/hermes$' /tmp/image-list.txt
          grep -E '^\./opt/hermes-agent/venv/bin/hermes$|^\./usr/local/bin/hermes$' /tmp/image-list.txt

          echo
          echo "检查 Hermes Web Dashboard..."
          grep -Eq '^\./opt/hermes-agent/hermes_cli/web_dist/index.html$' /tmp/image-list.txt
          grep -E '^\./opt/hermes-agent/hermes_cli/web_dist/index.html$' /tmp/image-list.txt

          echo
          echo "检查 systemd 服务..."
          grep -Eq '^\./etc/systemd/system/hermes-dashboard.service$' /tmp/image-list.txt
          grep -Eq '^\./etc/systemd/system/hermes-firstboot.service$' /tmp/image-list.txt
          grep -E '^\./etc/systemd/system/hermes-(dashboard|firstboot)\.service$' /tmp/image-list.txt

          echo
          echo "检查 firstboot / 管理脚本..."
          grep -Eq '^\./usr/local/bin/hermes-firstboot$' /tmp/image-list.txt
          grep -Eq '^\./usr/local/bin/hermes-menu$' /tmp/image-list.txt
          grep -Eq '^\./usr/local/bin/hermes-set-model$' /tmp/image-list.txt
          grep -Eq '^\./usr/local/bin/hermes-api-on$' /tmp/image-list.txt
          grep -Eq '^\./usr/local/bin/hermes-backup$' /tmp/image-list.txt

          echo
          echo "确认没有 nginx / hermes 用户目录..."
          if grep -q '^\./etc/nginx' /tmp/image-list.txt; then
            echo "错误：镜像里不应该包含 nginx" >&2
            exit 1
          fi
          if grep -q '^\./home/hermes' /tmp/image-list.txt; then
            echo "错误：镜像里不应该包含 /home/hermes" >&2
            exit 1
          fi

          echo
          echo "验证通过。"
          echo
          cat dist/build-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: hermes-agent-lxc-template-${{ steps.vars.outputs.safe_version }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
          retention-days: 30

      - name: Create release notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
          SAFE_VERSION: ${{ steps.vars.outputs.safe_version }}
        run: |
          set -Eeuo pipefail

          cat > release-notes.md <<EOF
          # Hermes Agent LXC Template ${RELEASE_VERSION}

          ## 文件说明

          - \`hermes-agent-root-lxc-debian12-${SAFE_VERSION}.tar.gz\`：PVE LXC 模板
          - \`.sha256\`：SHA256 校验文件
          - \`.list\`：模板文件列表
          - \`build-info.txt\`：构建信息

          ## 特性

          - 不使用 Docker
          - 不使用 Nginx
          - 不创建 hermes 用户
          - root 用户运行 Hermes
          - 默认开启 SSH root 密码登录
          - 首次启动随机 root 密码
          - Dashboard 随机端口
          - Dashboard 内置 Basic Auth 随机账号密码
          - 支持 Web Chat 对话面板
          - 支持自定义模型 API
          - 支持 API Server 开关
          - 支持备份 / 恢复
          - 支持 MCP / Profile / Gateway 菜单
          - 支持 IPv6 ask / 关闭 / 开启

          ## 上传到 PVE

          \`\`\`bash
          scp hermes-agent-root-lxc-debian12-${SAFE_VERSION}.tar.gz root@你的PVE:/var/lib/vz/template/cache/
          \`\`\`

          ## 创建 LXC

          \`\`\`bash
          pct create 200 local:vztmpl/hermes-agent-root-lxc-debian12-${SAFE_VERSION}.tar.gz \\
            --hostname hermes-agent-200 \\
            --cores 2 \\
            --memory 4096 \\
            --swap 1024 \\
            --rootfs local-lvm:20 \\
            --net0 name=eth0,bridge=vmbr0,ip=dhcp,ip6=auto \\
            --features nesting=1,keyctl=1 \\
            --unprivileged 1 \\
            --start 1
          \`\`\`

          国内环境如需在 PVE 层直接禁用 IPv6：

          \`\`\`bash
          pct create 200 local:vztmpl/hermes-agent-root-lxc-debian12-${SAFE_VERSION}.tar.gz \\
            --hostname hermes-agent-200 \\
            --cores 2 \\
            --memory 4096 \\
            --swap 1024 \\
            --rootfs local-lvm:20 \\
            --net0 name=eth0,bridge=vmbr0,ip=dhcp,ip6=none \\
            --features nesting=1,keyctl=1 \\
            --unprivileged 1 \\
            --start 1
          \`\`\`

          ## 进入容器

          \`\`\`bash
          pct enter 200
          hermes-info
          hermes-menu
          hermes-set-model
          systemctl status hermes-dashboard --no-pager -l
          \`\`\`
          EOF

          echo "" >> release-notes.md
          echo "## 构建信息" >> release-notes.md
          echo '```text' >> release-notes.md
          cat dist/build-info.txt >> release-notes.md
          echo '```' >> release-notes.md

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.vars.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        run: |
          set -Eeuo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release 已存在，更新说明并覆盖上传资产"
            gh release edit "$TAG_NAME" \
              --title "Hermes Agent LXC Template $TAG_NAME" \
              --notes-file release-notes.md
          else
            if [[ "$PRERELEASE" == "true" ]]; then
              gh release create "$TAG_NAME" \
                --target "$GITHUB_SHA" \
                --title "Hermes Agent LXC Template $TAG_NAME" \
                --notes-file release-notes.md \
                --prerelease
            else
              gh release create "$TAG_NAME" \
                --target "$GITHUB_SHA" \
                --title "Hermes Agent LXC Template $TAG_NAME" \
                --notes-file release-notes.md
            fi
          fi

          gh release upload "$TAG_NAME" \
            dist/*.tar.gz \
            dist/*.sha256 \
            dist/*.list \
            dist/build-info.txt \
            --clobber
