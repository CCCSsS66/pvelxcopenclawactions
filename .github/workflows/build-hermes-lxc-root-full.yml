          hermes-backup || true
          systemctl stop hermes-dashboard.service 2>/dev/null || true
          systemctl stop hermes-gateway.service 2>/dev/null || true
          cd /opt/hermes-agent
          BRANCH="$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo main)"
          git fetch origin "$BRANCH" --depth 1
          if git diff --quiet && git diff --cached --quiet; then
            git pull --ff-only origin "$BRANCH" || git reset --hard "origin/${BRANCH}"
          else
            echo "检测到本地源码有改动，保存 patch 后强制同步。"
            git diff > "/root/hermes-backups/local-changes-$(date +'%Y%m%d-%H%M%S').patch" || true
            git reset --hard "origin/${BRANCH}"
          fi
          chmod +x ./setup-hermes.sh
          printf 'n\n' | ./setup-hermes.sh
