name: Build Hermes Agent Root Full LXC

on:
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: "Hermes Agent ref / branch / tag / commit"
        required: false
        default: "main"
      image_prefix:
        description: "Image prefix"
        required: false
        default: "hermes-agent-root-full-lxc-debian12-amd64"
      release_tag:
        description: "Release tag, empty = auto"
        required: false
        default: ""
      publish_release:
        description: "Publish GitHub Release"
        required: true
        type: boolean
        default: true
      disable_ipv6_default:
        description: "Disable IPv6 on first boot"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    env:
      DEBIAN_FRONTEND: noninteractive
      DISTRO: bookworm
      ARCH: amd64
      HERMES_REPO: https://github.com/NousResearch/hermes-agent.git

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare metadata
        shell: bash
        run: |
          set -Eeuo pipefail
          DATE_TAG="$(date -u +'%Y.%m.%d-%H%M')"
          if [ -n "${{ inputs.release_tag }}" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="hermes-root-full-lxc-${DATE_TAG}"
          fi
          IMAGE_NAME="${{ inputs.image_prefix }}-${DATE_TAG}.tar.gz"
          echo "DATE_TAG=${DATE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME}"
          echo "RELEASE_TAG=${RELEASE_TAG}"

      - name: Install build tools
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap ca-certificates curl wget git gnupg tar gzip xz-utils zstd \
            rsync openssl jq qemu-user-static binutils coreutils util-linux python3-yaml

      - name: Build PVE LXC template
        shell: bash
        run: |
          set -Eeuo pipefail

          WORK="${GITHUB_WORKSPACE}/work"
          ROOTFS="${WORK}/rootfs"
          DIST="${GITHUB_WORKSPACE}/dist"
          IMAGE="${DIST}/${IMAGE_NAME}"
          HERMES_REF="${{ inputs.hermes_ref }}"
          DISABLE_IPV6_DEFAULT="${{ inputs.disable_ipv6_default }}"

          sudo rm -rf "$WORK"
          mkdir -p "$DIST"
          sudo mkdir -p "$ROOTFS"

          cleanup() {
            set +e
            sudo umount -lf "$ROOTFS/proc" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/sys" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/dev/pts" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/dev" 2>/dev/null || true
          }
          trap cleanup EXIT

          echo "[1/10] debootstrap Debian 12"
          sudo debootstrap --variant=minbase --arch="$ARCH" "$DISTRO" "$ROOTFS" http://deb.debian.org/debian
          sudo cp /etc/resolv.conf "$ROOTFS/etc/resolv.conf"

          sudo mount -t proc proc "$ROOTFS/proc"
          sudo mount --rbind /sys "$ROOTFS/sys"
          sudo mount --make-rslave "$ROOTFS/sys"
          sudo mount --rbind /dev "$ROOTFS/dev"
          sudo mount --make-rslave "$ROOTFS/dev"

          echo "[2/10] write install script"
          sudo tee "$ROOTFS/root/install-inside.sh" >/dev/null <<'INSIDE'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          
          export DEBIAN_FRONTEND=noninteractive
          export HOME=/root
          export HERMES_HOME=/root/.hermes
          export PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
          
          HERMES_REF="${HERMES_REF:-main}"
          DISABLE_IPV6_DEFAULT="${DISABLE_IPV6_DEFAULT:-false}"
          
          log() {
            echo
            echo "=================================================="
            echo "$*"
            echo "=================================================="
          }
          
          log "[inside 1/12] apt packages"
          
          cat > /etc/apt/sources.list <<'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF
          
          apt-get update
          apt-get install -y \
            apt-transport-https ca-certificates curl wget gnupg git bash sudo locales tzdata dbus \
            systemd systemd-sysv openssh-server openssl python3 python3.11 python3.11-venv \
            python3-pip python3-dev build-essential pkg-config libffi-dev libssl-dev ripgrep \
            ffmpeg jq nftables nano vim-tiny iproute2 iputils-ping net-tools procps lsof \
            htop less unzip xz-utils tar cron logrotate bash-completion dnsutils pciutils usbutils
          
          sed -i 's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen || true
          sed -i 's/^# *zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' /etc/locale.gen || true
          locale-gen || true
          echo 'LANG=en_US.UTF-8' > /etc/default/locale
          ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo Asia/Shanghai > /etc/timezone
          
          log "[inside 2/12] SSH root password login"
          
          mkdir -p /etc/ssh/sshd_config.d
          cat > /etc/ssh/sshd_config.d/99-hermes-root-password.conf <<'EOF'
          PermitRootLogin yes
          PasswordAuthentication yes
          KbdInteractiveAuthentication yes
          ChallengeResponseAuthentication yes
          UsePAM yes
          PubkeyAuthentication yes
          EOF
          systemctl enable ssh.service >/dev/null 2>&1 || systemctl enable ssh >/dev/null 2>&1 || true
          
          log "[inside 3/12] Node.js 22"
          
          curl -fsSL https://deb.nodesource.com/setup_22.x -o /tmp/nodesource.sh
          bash /tmp/nodesource.sh
          apt-get install -y nodejs
          node -v
          npm -v
          
          log "[inside 4/12] clone Hermes Agent"
          
          rm -rf /opt/hermes-agent
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /opt/hermes-agent
          cd /opt/hermes-agent
          
          if [ "$HERMES_REF" != "main" ]; then
            git fetch --depth 1 origin "$HERMES_REF" || true
            git checkout FETCH_HEAD 2>/dev/null || git checkout "$HERMES_REF" 2>/dev/null || true
          fi
          git rev-parse --short HEAD > /etc/hermes-commit.txt
          
          log "[inside 5/12] install Hermes as root"
          
          chmod +x ./setup-hermes.sh
          printf 'n\n' | ./setup-hermes.sh
          ln -sf /opt/hermes-agent/venv/bin/hermes /usr/local/bin/hermes
          ln -sf /opt/hermes-agent/venv/bin/hermes-agent /usr/local/bin/hermes-agent || true
          
          log "[inside 6/12] build Web Dashboard"
          
          npm install --workspace web --silent || (cd web && npm install --silent)
          npm run build -w web || (cd web && npm run build)
          test -f /opt/hermes-agent/hermes_cli/web_dist/index.html
          
          log "[inside 7/12] directories"
          
          mkdir -p /etc/hermes-lxc /root/.hermes /root/hermes-workspace /root/hermes-backups
          chmod 700 /root/.hermes /root/hermes-backups
          
          log "[inside 8/12] helper scripts"
          
          cat > /usr/local/bin/hermes-env-set <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          ENV_FILE="/root/.hermes/.env"
          mkdir -p /root/.hermes
          touch "$ENV_FILE"
          chmod 600 "$ENV_FILE"
          KEY="$1"
          VALUE="$2"
          tmp="$(mktemp)"
          grep -v -E "^${KEY}=" "$ENV_FILE" > "$tmp" 2>/dev/null || true
          printf '%s=%s\n' "$KEY" "$VALUE" >> "$tmp"
          mv "$tmp" "$ENV_FILE"
          chmod 600 "$ENV_FILE"
          EOF
          chmod +x /usr/local/bin/hermes-env-set
          
          cat > /usr/local/bin/hermes-env-del <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          ENV_FILE="/root/.hermes/.env"
          KEY="$1"
          [ -f "$ENV_FILE" ] || exit 0
          tmp="$(mktemp)"
          grep -v -E "^${KEY}=" "$ENV_FILE" > "$tmp" 2>/dev/null || true
          mv "$tmp" "$ENV_FILE"
          chmod 600 "$ENV_FILE"
          EOF
          chmod +x /usr/local/bin/hermes-env-del
          
          cat > /usr/local/bin/hermes-start-dashboard <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          export HOME=/root
          export HERMES_HOME=/root/.hermes
          export PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
          [ -f /etc/hermes-lxc/info.env ] && source /etc/hermes-lxc/info.env
          [ -f /root/.hermes/.env ] && set -a && source /root/.hermes/.env && set +a
          WEB_PORT="${WEB_PORT:-9119}"
          cd /opt/hermes-agent
          exec hermes dashboard --host 0.0.0.0 --port "$WEB_PORT" --no-open --skip-build
          EOF
          chmod +x /usr/local/bin/hermes-start-dashboard
          
          cat > /usr/local/bin/hermes-start-gateway <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          export HOME=/root
          export HERMES_HOME=/root/.hermes
          export PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
          [ -f /root/.hermes/.env ] && set -a && source /root/.hermes/.env && set +a
          cd /opt/hermes-agent
          if hermes gateway run --help >/dev/null 2>&1; then
            exec hermes gateway run
          else
            exec hermes gateway
          fi
          EOF
          chmod +x /usr/local/bin/hermes-start-gateway
          
          cat > /usr/local/bin/hermes-firstboot <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          
          mkdir -p /etc/hermes-lxc /root/.hermes /root/hermes-workspace /root/hermes-backups
          chmod 700 /root/.hermes /root/hermes-backups
          
          INFO="/etc/hermes-lxc/info.env"
          DONE="/etc/hermes-lxc/firstboot.done"
          ENV_FILE="/root/.hermes/.env"
          
          rand_port() { shuf -i 20000-50000 -n 1; }
          rand_alnum() { openssl rand -base64 64 | tr -dc 'A-Za-z0-9' | head -c "${1:-24}"; }
          rand_hex() { openssl rand -hex "${1:-32}"; }
          
          [ -f "$INFO" ] && source "$INFO"
          
          if [ "${1:-}" = "--reset-all" ] || [ ! -f "$DONE" ]; then
            WEB_PORT="${HERMES_WEB_PORT:-${WEB_PORT:-$(rand_port)}}"
            WEB_USER="${HERMES_WEB_USER:-${WEB_USER:-admin}}"
            WEB_PASS="${HERMES_WEB_PASS:-$(rand_alnum 24)}"
            DASHBOARD_SECRET="${DASHBOARD_SECRET:-$(rand_hex 32)}"
            API_PORT="${API_PORT:-8642}"
            API_KEY="${API_KEY:-$(rand_hex 32)}"
            ROOT_PASS="${ROOT_PASS:-$(rand_alnum 24)}"
          
            DASHBOARD_PASS_HASH=""
            if [ -x /opt/hermes-agent/venv/bin/python ]; then
              DASHBOARD_PASS_HASH="$(cd /opt/hermes-agent && /opt/hermes-agent/venv/bin/python - <<PY 2>/dev/null || true
          from plugins.dashboard_auth.basic import hash_password
          print(hash_password(${WEB_PASS@Q}))
          PY
          )"
            fi
          
            cat > "$INFO" <<INFO
          WEB_PORT="$WEB_PORT"
          WEB_USER="$WEB_USER"
          WEB_PASS="$WEB_PASS"
          DASHBOARD_SECRET="$DASHBOARD_SECRET"
          API_PORT="$API_PORT"
          API_KEY="$API_KEY"
          ROOT_PASS="$ROOT_PASS"
          INFO
            chmod 600 "$INFO"
            echo "root:${ROOT_PASS}" | chpasswd
          fi
          
          touch "$ENV_FILE"
          chmod 600 "$ENV_FILE"
          
          for k in \
            HERMES_DASHBOARD_BASIC_AUTH_USERNAME \
            HERMES_DASHBOARD_BASIC_AUTH_PASSWORD \
            HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH \
            HERMES_DASHBOARD_BASIC_AUTH_SECRET \
            HERMES_DASHBOARD_BASIC_AUTH_TTL_SECONDS \
            HERMES_API_KEY API_SERVER_KEY API_SERVER_PORT API_SERVER_HOST API_SERVER_CORS_ORIGINS; do
            /usr/local/bin/hermes-env-del "$k" || true
          done
          
          /usr/local/bin/hermes-env-set HERMES_DASHBOARD_BASIC_AUTH_USERNAME "${WEB_USER:-admin}"
          if [ -n "${DASHBOARD_PASS_HASH:-}" ]; then
            /usr/local/bin/hermes-env-set HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH "$DASHBOARD_PASS_HASH"
          else
            /usr/local/bin/hermes-env-set HERMES_DASHBOARD_BASIC_AUTH_PASSWORD "${WEB_PASS}"
          fi
          /usr/local/bin/hermes-env-set HERMES_DASHBOARD_BASIC_AUTH_SECRET "${DASHBOARD_SECRET}"
          /usr/local/bin/hermes-env-set HERMES_DASHBOARD_BASIC_AUTH_TTL_SECONDS "43200"
          /usr/local/bin/hermes-env-set HERMES_API_KEY "${API_KEY}"
          /usr/local/bin/hermes-env-set API_SERVER_KEY "${API_KEY}"
          /usr/local/bin/hermes-env-set API_SERVER_PORT "${API_PORT:-8642}"
          
          if [ ! -f /root/.hermes/config.yaml ]; then
            cat > /root/.hermes/config.yaml <<'CFG'
          terminal:
            backend: "local"
            cwd: "/root/hermes-workspace"
            timeout: 180
            lifetime_seconds: 300
          
          browser:
            inactivity_timeout: 120
          
          compression:
            enabled: true
            threshold: 0.50
            target_ratio: 0.20
          
          approvals:
            mode: "ask"
          CFG
          fi
          
          if [ "${DISABLE_IPV6_DEFAULT:-false}" = "true" ] && [ ! -f "$DONE" ]; then
            /usr/local/bin/hermes-ipv6-off || true
          fi
          
          systemctl enable ssh.service >/dev/null 2>&1 || systemctl enable ssh >/dev/null 2>&1 || true
          systemctl restart ssh.service >/dev/null 2>&1 || systemctl restart ssh >/dev/null 2>&1 || true
          systemctl enable hermes-dashboard.service >/dev/null 2>&1 || true
          systemctl restart hermes-dashboard.service || true
          
          touch "$DONE"
          
          cat > /root/HERMES-INFO.txt <<TXT
          Hermes Agent 初始化完成。
          
          查看全部信息:
            hermes-info
          
          管理菜单:
            hermes-menu
          
          SSH:
            用户名: root
            密码: ${ROOT_PASS:-见 /etc/hermes-lxc/info.env}
          
          Dashboard:
            用户名: ${WEB_USER:-admin}
            密码: ${WEB_PASS:-见 /etc/hermes-lxc/info.env}
          
          API Server:
            API Key: ${API_KEY:-见 /etc/hermes-lxc/info.env}
          TXT
          EOF
          chmod +x /usr/local/bin/hermes-firstboot
          
          cat > /usr/local/bin/hermes-info <<'EOF'
          #!/usr/bin/env bash
          set -e
          [ -f /etc/hermes-lxc/info.env ] && source /etc/hermes-lxc/info.env
          IPV4="$(hostname -I 2>/dev/null | tr ' ' '\n' | grep -E '^[0-9]+\.' | head -n1 || true)"
          IPV6="$(hostname -I 2>/dev/null | tr ' ' '\n' | grep ':' | head -n1 || true)"
          API_ENABLED="$(grep -E '^API_SERVER_ENABLED=true$' /root/.hermes/.env >/dev/null 2>&1 && echo true || echo false)"
          echo
          echo "=================================================="
          echo "Hermes Agent Root Full LXC"
          echo "=================================================="
          echo "运行用户       : root"
          echo "Nginx          : 不安装 / 不使用"
          echo "SSH            : 默认开启 root 密码登录"
          echo "SSH 用户名     : root"
          echo "SSH 密码       : ${ROOT_PASS:-未初始化}"
          echo
          echo "Web Dashboard  : Hermes 内置 Basic Auth"
          echo "Web 端口       : ${WEB_PORT:-未初始化}"
          echo "Web 用户名     : ${WEB_USER:-admin}"
          echo "Web 密码       : ${WEB_PASS:-未初始化}"
          echo
          echo "API Server     : ${API_ENABLED}"
          echo "API 端口       : ${API_PORT:-8642}"
          echo "API Key        : ${API_KEY:-未初始化}"
          echo
          [ -n "${IPV4:-}" ] && [ -n "${WEB_PORT:-}" ] && echo "IPv4 Web       : http://${IPV4}:${WEB_PORT}"
          [ -n "${IPV6:-}" ] && [ -n "${WEB_PORT:-}" ] && echo "IPv6 Web       : http://[${IPV6}]:${WEB_PORT}"
          [ -n "${IPV4:-}" ] && echo "IPv4 SSH       : ssh root@${IPV4}"
          [ -n "${IPV6:-}" ] && echo "IPv6 SSH       : ssh root@${IPV6}"
          [ "$API_ENABLED" = "true" ] && [ -n "${IPV4:-}" ] && echo "API Base URL   : http://${IPV4}:${API_PORT:-8642}/v1"
          [ "$API_ENABLED" = "true" ] && [ -n "${IPV6:-}" ] && echo "API Base URL6  : http://[${IPV6}]:${API_PORT:-8642}/v1"
          echo
          echo "Hermes 目录    : /opt/hermes-agent"
          echo "配置目录       : /root/.hermes"
          echo "工作目录       : /root/hermes-workspace"
          echo "备份目录       : /root/hermes-backups"
          echo "=================================================="
          EOF
          chmod +x /usr/local/bin/hermes-info
          
          cat > /usr/local/bin/hermes-platform <<'EOF'
          #!/usr/bin/env bash
          set +e
          echo
          echo "=================================================="
          echo "平台信息 / Platform Info"
          echo "=================================================="
          echo "Hostname       : $(hostname)"
          echo "OS             : $(grep PRETTY_NAME /etc/os-release 2>/dev/null | cut -d= -f2- | tr -d '"')"
          echo "Kernel         : $(uname -r)"
          echo "Arch           : $(uname -m)"
          echo "Uptime         : $(uptime -p 2>/dev/null)"
          echo "Load           : $(awk '{print $1, $2, $3}' /proc/loadavg 2>/dev/null)"
          echo "CPU            : $(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2- | sed 's/^ //')"
          echo "CPU Cores      : $(nproc 2>/dev/null)"
          echo
          echo "[Memory]"
          free -h 2>/dev/null || true
          echo
          echo "[Disk]"
          df -hT / /root /opt 2>/dev/null || df -hT
          echo
          echo "[Network]"
          ip -br addr 2>/dev/null || ip addr
          echo
          echo "[Routes]"
          ip route 2>/dev/null || true
          ip -6 route 2>/dev/null || true
          echo
          echo "[Ports]"
          ss -tulnp 2>/dev/null || true
          echo
          echo "[Versions]"
          python3 --version 2>/dev/null || true
          node -v 2>/dev/null || true
          npm -v 2>/dev/null || true
          hermes version 2>/dev/null || hermes --version 2>/dev/null || true
          echo "Hermes commit  : $(cat /etc/hermes-commit.txt 2>/dev/null || echo unknown)"
          echo "=================================================="
          EOF
          chmod +x /usr/local/bin/hermes-platform
          
          cat > /usr/local/bin/hermes-status <<'EOF'
          #!/usr/bin/env bash
          set +e
          echo
          echo "=================================================="
          echo "Hermes 服务状态"
          echo "=================================================="
          systemctl --no-pager --full status ssh.service 2>/dev/null | sed -n '1,12p' || systemctl --no-pager --full status ssh 2>/dev/null | sed -n '1,12p'
          echo
          systemctl --no-pager --full status hermes-firstboot.service 2>/dev/null | sed -n '1,14p'
          echo
          systemctl --no-pager --full status hermes-dashboard.service 2>/dev/null | sed -n '1,20p'
          echo
          systemctl --no-pager --full status hermes-gateway.service 2>/dev/null | sed -n '1,20p'
          echo
          echo "[端口]"
          ss -tulnp | grep -E '(:22|:9119|:8642|hermes|python|node)' || true
          echo
          echo "[Hermes]"
          hermes version 2>/dev/null || hermes --version 2>/dev/null || true
          hermes status 2>/dev/null || true
          echo
          hermes-info
          EOF
          chmod +x /usr/local/bin/hermes-status
          
          cat > /usr/local/bin/hermes-logs <<'EOF'
          #!/usr/bin/env bash
          journalctl -u ssh.service -u hermes-dashboard.service -u hermes-gateway.service -u hermes-firstboot.service -n 400 --no-pager
          EOF
          chmod +x /usr/local/bin/hermes-logs
          
          cat > /usr/local/bin/hermes-health <<'EOF'
          #!/usr/bin/env bash
          set +e
          FAIL=0
          ok(){ echo "[OK] $*"; }
          bad(){ echo "[FAIL] $*"; FAIL=$((FAIL+1)); }
          warn(){ echo "[WARN] $*"; }
          check_file(){ [ -e "$1" ] && ok "$1 exists" || bad "$1 missing"; }
          echo
          echo "=================================================="
          echo "Hermes 健康检查"
          echo "=================================================="
          check_file /opt/hermes-agent/venv/bin/hermes
          check_file /usr/local/bin/hermes
          check_file /opt/hermes-agent/hermes_cli/web_dist/index.html
          check_file /root/.hermes/.env
          check_file /root/.hermes/config.yaml
          check_file /etc/hermes-lxc/info.env
          check_file /etc/systemd/system/hermes-dashboard.service
          check_file /etc/systemd/system/hermes-gateway.service
          check_file /etc/ssh/sshd_config.d/99-hermes-root-password.conf
          (systemctl is-active --quiet ssh.service || systemctl is-active --quiet ssh) && ok "ssh active" || bad "ssh not active"
          systemctl is-active --quiet hermes-dashboard.service && ok "dashboard active" || bad "dashboard not active"
          grep -q '^HERMES_DASHBOARD_BASIC_AUTH_USERNAME=' /root/.hermes/.env && ok "dashboard username configured" || bad "dashboard username missing"
          grep -Eq '^(HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH|HERMES_DASHBOARD_BASIC_AUTH_PASSWORD)=' /root/.hermes/.env && ok "dashboard password configured" || bad "dashboard password missing"
          grep -q '^HERMES_DASHBOARD_BASIC_AUTH_SECRET=' /root/.hermes/.env && ok "dashboard secret configured" || bad "dashboard secret missing"
          [ -f /etc/hermes-lxc/info.env ] && source /etc/hermes-lxc/info.env
          [ -n "${WEB_PORT:-}" ] && ss -tuln | grep -q ":${WEB_PORT} " && ok "dashboard port ${WEB_PORT} listening" || warn "dashboard port not detected yet"
          hermes version >/dev/null 2>&1 && ok "hermes command works" || bad "hermes command failed"
          python3 --version >/dev/null 2>&1 && ok "python installed" || bad "python missing"
          node -v >/dev/null 2>&1 && ok "node installed" || bad "node missing"
          npm -v >/dev/null 2>&1 && ok "npm installed" || bad "npm missing"
          getent hosts github.com >/dev/null 2>&1 && ok "DNS works" || warn "DNS check failed"
          echo
          if [ "$FAIL" -eq 0 ]; then
            echo "健康检查完成：没有严重错误。"
          else
            echo "健康检查完成：发现 $FAIL 个严重问题。"
          fi
          exit "$FAIL"
          EOF
          chmod +x /usr/local/bin/hermes-health
          
          cat > /usr/local/bin/hermes-set-model <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          mkdir -p /root/.hermes /root/hermes-workspace
          touch /root/.hermes/.env
          chmod 600 /root/.hermes/.env
          echo
          echo "=================================================="
          echo "Hermes 模型 API 配置"
          echo "=================================================="
          echo "1. DeepSeek"
          echo "2. OpenAI"
          echo "3. OpenRouter"
          echo "4. Gemini OpenAI-compatible"
          echo "5. 本地 OpenAI-compatible"
          echo "6. 自定义"
          read -rp "请选择 [1]: " choice
          choice="${choice:-1}"
          case "$choice" in
            1) PROVIDER="custom"; BASE_URL="https://api.deepseek.com/v1"; MODEL_NAME="deepseek-chat" ;;
            2) PROVIDER="openai"; BASE_URL="https://api.openai.com/v1"; MODEL_NAME="gpt-4.1-mini" ;;
