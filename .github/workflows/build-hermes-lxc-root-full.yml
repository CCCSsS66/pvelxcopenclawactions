          ALLOW6="$(grep ':' "$ALLOW_FILE" | tr '\n' ',' | sed 's/,$//')"
          cat > /etc/nftables.conf <<NFT
          #!/usr/sbin/nft -f
          flush ruleset
          table inet hermes_guard {
            set allow4 {
              type ipv4_addr
              flags interval
              elements = { ${ALLOW4:-127.0.0.1} }
            }
            set allow6 {
              type ipv6_addr
              flags interval
              elements = { ${ALLOW6:-::1} }
            }
            chain input {
              type filter hook input priority -100; policy accept;
              ct state established,related accept
              iif "lo" accept
              tcp dport { ${WEB_PORT}, ${API_PORT} } ip saddr @allow4 accept
              tcp dport { ${WEB_PORT}, ${API_PORT} } ip6 saddr @allow6 accept
              tcp dport { ${WEB_PORT}, ${API_PORT} } drop
            }
          }
          NFT
          systemctl enable nftables >/dev/null 2>&1 || true
          systemctl restart nftables
          echo "防火墙已应用。当前只限制 Web/API 端口，不限制 SSH。"
          echo "允许列表:"
          cat "$ALLOW_FILE" || true
          EOF
