          DefaultDependencies=no
          After=local-fs.target
          Before=multi-user.target ssh.service hermes-dashboard.service
          
          [Service]
          Type=oneshot
          Environment=DISABLE_IPV6_DEFAULT=false
          ExecStart=/usr/local/bin/hermes-firstboot
          RemainAfterExit=yes
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          if [ "$DISABLE_IPV6_DEFAULT" = "true" ]; then
            sed -i 's/Environment=DISABLE_IPV6_DEFAULT=false/Environment=DISABLE_IPV6_DEFAULT=true/' /etc/systemd/system/hermes-firstboot.service
          fi
          
          cat > /etc/systemd/system/hermes-dashboard.service <<'EOF'
          [Unit]
          Description=Hermes Agent Dashboard Root Full LXC
          Wants=network-online.target
          After=network-online.target hermes-firstboot.service
          Requires=hermes-firstboot.service
          
          [Service]
          Type=simple
          User=root
          Group=root
          WorkingDirectory=/opt/hermes-agent
          Environment=HOME=/root
          Environment=HERMES_HOME=/root/.hermes
          Environment=PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
          EnvironmentFile=-/root/.hermes/.env
          ExecStart=/usr/local/bin/hermes-start-dashboard
          Restart=always
          RestartSec=5
          KillSignal=SIGTERM
          TimeoutStopSec=20
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          cat > /etc/systemd/system/hermes-gateway.service <<'EOF'
          [Unit]
          Description=Hermes Agent Gateway and API Server Root Full LXC
          Wants=network-online.target
          After=network-online.target hermes-firstboot.service
          Requires=hermes-firstboot.service
          
          [Service]
          Type=simple
          User=root
          Group=root
          WorkingDirectory=/opt/hermes-agent
          Environment=HOME=/root
          Environment=HERMES_HOME=/root/.hermes
          Environment=PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
          EnvironmentFile=-/root/.hermes/.env
          ExecStart=/usr/local/bin/hermes-start-gateway
          Restart=always
          RestartSec=5
          KillSignal=SIGTERM
          TimeoutStopSec=20
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          systemctl enable hermes-firstboot.service
          systemctl enable hermes-dashboard.service
          systemctl enable ssh.service >/dev/null 2>&1 || systemctl enable ssh >/dev/null 2>&1 || true
          systemctl disable hermes-gateway.service >/dev/null 2>&1 || true
          
          log "[inside 10/12] verify systemd units"
          systemd-analyze verify /etc/systemd/system/hermes-firstboot.service /etc/systemd/system/hermes-dashboard.service /etc/systemd/system/hermes-gateway.service || true
          
          log "[inside 11/12] switch apt sources to China mirror"
          
          cat > /etc/apt/sources.list <<'EOF'
          deb https://mirrors.ustc.edu.cn/debian/ bookworm main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian/ bookworm-updates main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian-security/ bookworm-security main contrib non-free non-free-firmware
          EOF
          
          log "[inside 12/12] clean"
          
          apt-get clean
          rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
          rm -f /etc/ssh/ssh_host_*
          truncate -s 0 /etc/machine-id || true
          rm -f /var/lib/dbus/machine-id || true
          find /var/log -type f -exec truncate -s 0 {} \; 2>/dev/null || true
          
          echo "Hermes root full install finished."
          INSIDE

          sudo chmod +x "$ROOTFS/root/install-inside.sh"

          echo "[3/10] chroot install"
          sudo chroot "$ROOTFS" /usr/bin/env \
            HERMES_REF="$HERMES_REF" \
            DISABLE_IPV6_DEFAULT="$DISABLE_IPV6_DEFAULT" \
            DEBIAN_FRONTEND=noninteractive \
            HOME=/root \
            /bin/bash /root/install-inside.sh

          echo "[4/10] self check"
          sudo chroot "$ROOTFS" /bin/bash -lc '
            set -Eeuo pipefail
            test -x /opt/hermes-agent/venv/bin/hermes
            test -L /usr/local/bin/hermes
            test -f /opt/hermes-agent/hermes_cli/web_dist/index.html
            test -f /etc/systemd/system/hermes-firstboot.service
            test -f /etc/systemd/system/hermes-dashboard.service
            test -f /etc/systemd/system/hermes-gateway.service
            test -f /etc/ssh/sshd_config.d/99-hermes-root-password.conf
            test -x /usr/local/bin/hermes-menu
            test -x /usr/local/bin/hermes-set-model
            test -x /usr/local/bin/hermes-start-dashboard
            test -x /usr/local/bin/hermes-start-gateway
            test -x /usr/local/bin/hermes-api-on
            test -x /usr/local/bin/hermes-firewall-menu
            test -x /usr/local/bin/hermes-onekey-update
            test -x /usr/local/bin/hermes-platform
            test -x /usr/local/bin/hermes-health
            test -x /usr/local/bin/hermes-backup
            test -x /usr/local/bin/hermes-restore
            test ! -e /etc/nginx
            ! id hermes >/dev/null 2>&1
            grep -q "PermitRootLogin yes" /etc/ssh/sshd_config.d/99-hermes-root-password.conf
            grep -q "PasswordAuthentication yes" /etc/ssh/sshd_config.d/99-hermes-root-password.conf
            /opt/hermes-agent/venv/bin/hermes version || true
            echo "self check passed"
          '

          echo "[5/10] build info"
          sudo mkdir -p "$ROOTFS/etc/hermes-lxc"
          sudo tee "$ROOTFS/etc/hermes-lxc/build-info.txt" >/dev/null <<EOF
          Image: ${IMAGE_NAME}
          Build date UTC: $(date -u +'%Y-%m-%d %H:%M:%S')
          Debian: 12 bookworm
          Arch: amd64
          Hermes repo: ${HERMES_REPO}
          Hermes ref: ${HERMES_REF}
          GitHub repository: ${GITHUB_REPOSITORY}
          GitHub run id: ${GITHUB_RUN_ID}
          Run user: root
          Nginx: disabled / not installed
          SSH password login: enabled
          Dashboard: 0.0.0.0 random port with Hermes Basic Auth
          API Server: optional, menu controlled, port 8642
          Firewall: nftables whitelist menu for Web/API ports
          IPv6 disabled by default: ${DISABLE_IPV6_DEFAULT}
          EOF
          sudo cp "$ROOTFS/etc/hermes-lxc/build-info.txt" "$DIST/build-info.txt"

          echo "[6/10] cleanup mounts"
          cleanup
          trap - EXIT

          echo "[7/10] package tar.gz"
          sudo tar --numeric-owner --xattrs --acls -C "$ROOTFS" -czf "$IMAGE" .
          sudo chown -R "$USER:$USER" "$DIST"

          echo "[8/10] sha256 and list"
          tar -tzf "$IMAGE" > "${IMAGE}.list"
          (cd "$DIST" && sha256sum "$IMAGE_NAME" > "${IMAGE_NAME}.sha256")

          echo "[9/10] verify packaged file list"
          grep -q './opt/hermes-agent/venv/bin/hermes' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-menu' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-set-model' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-start-dashboard' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-start-gateway' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-api-on' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-firewall-menu' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-onekey-update' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-platform' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-health' "${IMAGE}.list"
          grep -q './etc/systemd/system/hermes-dashboard.service' "${IMAGE}.list"
          grep -q './etc/systemd/system/hermes-gateway.service' "${IMAGE}.list"
          grep -q './etc/ssh/sshd_config.d/99-hermes-root-password.conf' "${IMAGE}.list"
          grep -q './opt/hermes-agent/hermes_cli/web_dist/index.html' "${IMAGE}.list"
          if grep -q './etc/nginx' "${IMAGE}.list"; then echo 'nginx should not exist'; exit 1; fi
          if grep -q './home/hermes' "${IMAGE}.list"; then echo 'hermes user home should not exist'; exit 1; fi
          echo "package list check passed"

          echo "[10/10] README"
          cat > "$DIST/README.md" <<EOF
          # Hermes Agent Root Full PVE LXC Template

          ## 特性

          - 不使用 Docker
          - 不安装 Nginx
          - 不创建 hermes 用户
          - root 用户运行 Hermes Agent
          - 默认开启 SSH root 密码登录
          - 首次启动随机生成 root SSH 密码
          - Dashboard 直接监听随机端口
          - Dashboard 使用 Hermes 内置 Basic Auth
          - 随机生成 Web 用户名/密码/Session Secret
          - 随机生成 API_SERVER_KEY / HERMES_API_KEY
          - 支持自定义模型 API
          - 支持 OpenAI-compatible API Server 开关
          - 支持 nftables 防火墙白名单
          - 支持平台信息、健康检查、一键更新、备份恢复
          - 支持 MCP / Profile / Gateway 菜单
          - 支持一键关闭 / 开启 IPv6
          - 自动生成 SHA256 和镜像文件列表

          ## PVE 创建

          \`\`\`bash
          pct create 101 local:vztmpl/${IMAGE_NAME} \\
            --hostname hermes-agent \\
            --cores 2 \\
            --memory 2048 \\
            --swap 1024 \\
            --rootfs local-lvm:16 \\
            --net0 name=eth0,bridge=vmbr0,ip=dhcp \\
            --unprivileged 1 \\
            --features nesting=1 \\
            --start 1
          \`\`\`

          ## 首次登录

          推荐先用 PVE Console 登录，然后执行：

          \`\`\`bash
          hermes-info
          \`\`\`

          ## 管理菜单

          \`\`\`bash
          hermes-menu
          \`\`\`

          ## 常用命令

          \`\`\`bash
          hermes-info
          hermes-status
          hermes-platform
          hermes-health
          hermes-set-model
          hermes-api-on
          hermes-api-off
          hermes-api-info
          hermes-firewall-menu
          hermes-onekey-update
          hermes-check-update
          hermes-backup
          hermes-restore
          hermes-reset-web
          hermes-reset-ssh-password
          hermes-ipv6-off
          hermes-ipv6-on
          \`\`\`

          ## 安全提醒

          这个版本没有 Nginx。Dashboard 使用 Hermes 内置 Basic Auth，但仍建议只在内网/VPN/PVE 防火墙白名单内访问。

          SSH 默认允许 root 密码登录，密码是首次启动随机生成的。公网机器建议进入系统后用 \`hermes-firewall-menu\` 限制 Web/API 端口访问来源。
          EOF

          ls -lh "$DIST"
          cat "${IMAGE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-root-full-lxc-template
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
            dist/README.md
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Hermes Agent Root Full LXC ${{ env.RELEASE_TAG }}
          body_path: dist/README.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
            dist/README.md
