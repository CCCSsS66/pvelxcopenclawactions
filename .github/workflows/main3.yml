name: Build OpenClaw KVM

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，例如 v1.0.0；留空自动生成日期版本"
        required: false
        type: string

      openclaw_npm_spec:
        description: "OpenClaw npm 包，例如 openclaw 或 openclaw@1.2.3"
        required: false
        default: "openclaw"
        type: string

      openclaw_run_cmd:
        description: "OpenClaw 启动命令"
        required: false
        default: "openclaw onboard"
        type: string

      bind_host:
        description: "监听地址"
        required: true
        default: "0.0.0"
        type: choice
        options:
          - "0.0.0.0"
          - "::"

      ipv6_policy:
        description: "IPv6 策略：ask=首次登录询问，0=关闭，1=开启"
        required: true
        default: "ask"
        type: choice
        options:
          - "ask"
          - "0"
          - "1"

      disk_size:
        description: "KVM 镜像虚拟磁盘大小，例如 20G；也兼容 20GB"
        required: false
        default: "20G"
        type: string

      port_min:
        description: "随机端口最小值"
        required: false
        default: "20000"
        type: string

      port_max:
        description: "随机端口最大值"
        required: false
        default: "65000"
        type: string

      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release OpenClaw KVM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -Eeuo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            if [[ -n "${INPUT_VERSION}" ]; then
              VERSION="${INPUT_VERSION}"
            else
              VERSION="v$(date -u +'%Y.%m.%d-%H%M')"
            fi
          fi

          if [[ ! "$VERSION" =~ ^v?[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "错误：version 只能包含字母、数字、点、下划线、短横线，且不能包含斜杠、空格或特殊 shell 字符"
            exit 1
          fi

          SAFE_VERSION="${VERSION#v}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "safe_version=${SAFE_VERSION}" > "$GITHUB_OUTPUT"

      - name: Free up disk space
        run: |
          set -Eeuo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h

      - name: Build KVM qcow2
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SAFE_VERSION: ${{ steps.version.outputs.safe_version }}
          OPENCLAW_NPM_SPEC: ${ inputs.openclaw_npm_spec || 'openclaw' }}
          OPENCLAW_RUN_CMD: ${{ inputs.openclaw_run_cmd || 'openclaw onboard' }}
          BIND_HOST: ${{ inputs.bind_host || '0.0.0' }}
          IPV6_POLICY: ${{ inputs.ipv6_policy || 'ask' }}
          DISK_SIZE: ${{ inputs.disk_size || '20G' }}
          PORT_MIN: ${{ inputs.port_min || '20000' }}
          PORT_MAX: ${{ inputs.port_max || '65000' }}
          NPM_INSTAL_REGISTRY: "https://registry.npmjs.org/"
          NPM_FINAL_REGISTRY: "https://registry.npmjs.org/"
          DIST_DIR: ${{ github.workspace }}/dist
          WORK_DIR: ${{ runner.temp }}/openclaw-build
        run: |
          set -Eeuo pipefail
          chmod +x scripts/build-openclaw-kvm.sh
          sudo -E bash scripts/build-openclaw-kvm.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-kvm-${{ steps.version.outputs.safe_version }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -Eeuo pipefail

          PRE_FLAG=""
          if [[ "${PRERELEASE}" == "true" ]; then
            PRE_FLAG="--prerelease"
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" \
              --title "OpenClaw KVM ${TAG_NAME}" \
              --notes "OpenClaw KVM Cloud-Init 镜像自动构建。详见附件 buildinfo。" \
              ${PRE_FLAG} \
              dist/*
          fi

