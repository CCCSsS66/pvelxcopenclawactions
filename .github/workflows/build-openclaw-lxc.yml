name: Build OpenClaw LXC 2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: true
        default: "auto"
      openclaw_version:
        description: "OpenClaw 版本"
        required: true
        default: "latest"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      INPUT_VERSION: ${{ inputs.version }}
      INPUT_OPENCLAW_VERSION: ${{ inputs.openclaw_version }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            ca-certificates \
            curl \
            wget \
            gnupg \
            xz-utils \
            gzip \
            tar \
            jq \
            file \
            openssl \
            coreutils \
            util-linux \
            gh

          gh --version

      - name: Build and publish OpenClaw LXC template
        shell: bash
        run: |
          cat > build-openclaw-lxc.sh <<'BUILD_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          export DEBIAN_FRONTEND=noninteractive

          VERSION="${INPUT_VERSION:-auto}"
          OPENCLAW_VERSION="${INPUT_OPENCLAW_VERSION:-latest}"

          OPENCLAW_USER="root"
          OPENCLAW_GROUP="root"
          OPENCLAW_HOME="/root"
          OPENCLAW_GATEWAY_PORT="18789"
          OPENCLAW_GATEWAY_BIND="lan"
          OPENCLAW_NET_IFACE="eth0"

          if [ "$VERSION" = "auto" ]; then
            VERSION="$(date -u +'%Y.%m.%d-%H%M')"
          fi

          if ! echo "$VERSION" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "错误：version 只能包含字母、数字、点、下划线、横线"
            exit 1
          fi

          IMAGE_PREFIX="openclaw-lxc-ubuntu2404"
          IMAGE_NAME="${IMAGE_PREFIX}-${VERSION}.tar.gz"

          WORK_DIR="$PWD/work"
          ROOTFS="$WORK_DIR/rootfs"
          DIST_DIR="$PWD/dist"

          mkdir -p "$WORK_DIR"
          mkdir -p "$DIST_DIR"

          cleanup_mounts() {
            set +e
            sudo umount -lf "$ROOTFS/dev/pts" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/dev" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/proc" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/sys" 2>/dev/null || true
          }

          trap cleanup_mounts EXIT

          echo "=================================================="
          echo "[1/8] 创建 Ubuntu 24.04 rootfs"
          echo "=================================================="

          sudo rm -rf "$ROOTFS"
          sudo mkdir -p "$ROOTFS"

          sudo debootstrap \
            --arch=amd64 \
            noble \
            "$ROOTFS" \
            http://archive.ubuntu.com/ubuntu

          echo "=================================================="
          echo "[2/8] 挂载 chroot 环境"
          echo "=================================================="

          sudo mount -t proc proc "$ROOTFS/proc"
          sudo mount --rbind /sys "$ROOTFS/sys"
          sudo mount --make-rslave "$ROOTFS/sys"
          sudo mount --rbind /dev "$ROOTFS/dev"
          sudo mount --make-rslave "$ROOTFS/dev"
          sudo mount --rbind /dev/pts "$ROOTFS/dev/pts"
          sudo cp /etc/resolv.conf "$ROOTFS/etc/resolv.conf"

          echo "OpenClaw" | sudo tee "$ROOTFS/etc/hostname" >/dev/null

          sudo tee "$ROOTFS/etc/hosts" >/dev/null <<'HOSTS_FILE'
          127.0.0.1 localhost
          127.0.1.1 OpenClaw

          ::1 localhost ip6-localhost ip6-loopback
          ff02::1 ip6-allnodes
          ff02::2 ip6-allrouters
          HOSTS_FILE

          echo "=================================================="
          echo "[3/8] 写入安装脚本"
          echo "=================================================="

          sudo tee "$ROOTFS/tmp/install-inside.sh" >/dev/null <<'INSIDE_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          export DEBIAN_FRONTEND=noninteractive

          OPENCLAW_VERSION="${OPENCLAW_VERSION:-latest}"

          OPENCLAW_USER="root"
          OPENCLAW_GROUP="root"
          OPENCLAW_HOME="/root"
          OPENCLAW_GATEWAY_PORT="18789"
          OPENCLAW_GATEWAY_BIND="lan"
          OPENCLAW_NET_IFACE="eth0"

          echo "=================================================="
          echo "设置 Ubuntu 24.04 官方源"
          echo "=================================================="

          cat >/etc/apt/sources.list <<'APT_SOURCES'
          deb http://archive.ubuntu.com/ubuntu noble main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu noble-backports main restricted universe multiverse
          deb http://security.ubuntu.com/ubuntu noble-security main restricted universe multiverse
          APT_SOURCES

          apt-get update

          echo "=================================================="
          echo "安装小白常用系统环境"
          echo "=================================================="

          apt-get install -y \
            systemd \
            systemd-sysv \
            libpam-systemd \
            dbus \
            dbus-user-session \
            openssh-server \
            openssh-client \
            sudo \
            ifupdown \
            iproute2 \
            iputils-ping \
            iputils-tracepath \
            net-tools \
            procps \
            psmisc \
            lsof \
            htop \
            sysstat \
            iotop \
            time \
            tmux \
            screen \
            nano \
            vim \
            less \
            bash-completion \
            command-not-found \
            man-db \
            manpages \
            ca-certificates \
            curl \
            wget \
            git \
            git-lfs \
            rsync \
            unzip \
            zip \
            tar \
            gzip \
            bzip2 \
            xz-utils \
            zstd \
            jq \
            yq \
            file \
            openssl \
            gnupg \
            gpg-agent \
            dirmngr \
            apt-transport-https \
            software-properties-common \
            lsb-release \
            locales \
            tzdata \
            cron \
            logrotate \
            acl \
            attr \
            tree \
            ncdu \
            dnsutils \
            bind9-dnsutils \
            traceroute \
            mtr-tiny \
            tcpdump \
            nmap \
            iperf3 \
            whois \
            telnet \
            netcat-openbsd \
            socat \
            ethtool \
            iptables \
            nftables \
            python3 \
            python3-full \
            python3-venv \
            python3-pip \
            pipx \
            build-essential \
            make \
            cmake \
            ninja-build \
            gcc \
            g++ \
            pkg-config \
            autoconf \
            automake \
            libtool \
            patch \
            gettext \
            strace \
            gdb \
            sqlite3 \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            libbz2-dev \
            libreadline-dev \
            liblzma-dev \
            zlib1g-dev \
            libncurses-dev \
            libgdbm-dev \
            libnss3-dev \
            uuid-dev \
            ripgrep \
            fd-find \
            bat \
            dos2unix \
            moreutils

          ln -sf /usr/bin/fdfind /usr/local/bin/fd 2>/dev/null || true
          ln -sf /usr/bin/batcat /usr/local/bin/bat 2>/dev/null || true

          echo "=================================================="
          echo "删除 DHCP / NetworkManager"
          echo "=================================================="

          apt-get purge -y \
            isc-dhcp-client \
            isc-dhcp-common \
            dhcpcd5 \
            dhcpcd-base \
            udhcpc \
            network-manager \
            2>/dev/null || true

          apt-get autoremove -y || true

          echo "=================================================="
          echo "配置 locale / timezone"
          echo "=================================================="

          sed -i 's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen || true
          sed -i 's/^# *zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' /etc/locale.gen || true
          locale-gen || true

          cat >/etc/default/locale <<'LOCALE_CONF'
          LANG=en_US.UTF-8
          LC_ALL=en_US.UTF-8
          LOCALE_CONF

          ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime || true
          echo "Asia/Shanghai" >/etc/timezone || true

          echo "=================================================="
          echo "配置静态网络框架，不写 DHCP"
          echo "=================================================="

          cat >/etc/network/interfaces <<'NET_CONF'
          auto lo
          iface lo inet loopback

          source /etc/network/interfaces.d/*
          NET_CONF

          mkdir -p /etc/network/interfaces.d

          cat >/etc/network/interfaces.d/00-openclaw-note <<'NET_NOTE'
          # Configure network from Proxmox VE panel.
          # IPv4: Static
          # IPv4/CIDR: 192.168.1.50/24
          # Gateway: 192.168.1.1
          # IPv6: Manual / Disabled
          NET_NOTE

          systemctl unmask networking.service 2>/dev/null || true
          systemctl enable networking.service 2>/dev/null || true

          echo "=================================================="
          echo "禁用 IPv6"
          echo "=================================================="

          cat >/etc/sysctl.d/99-openclaw-disable-ipv6.conf <<'IPV6_SYSCTL'
          net.ipv6.conf.all.disable_ipv6 = 1
          net.ipv6.conf.default.disable_ipv6 = 1
          net.ipv6.conf.lo.disable_ipv6 = 1
          net.ipv6.conf.eth0.disable_ipv6 = 1
          net.ipv6.conf.all.accept_ra = 0
          net.ipv6.conf.default.accept_ra = 0
          net.ipv6.conf.eth0.accept_ra = 0
          net.ipv6.conf.all.autoconf = 0
          net.ipv6.conf.default.autoconf = 0
          net.ipv6.conf.eth0.autoconf = 0
          IPV6_SYSCTL

          cat >/etc/systemd/system/openclaw-disable-ipv6.service <<'IPV6_SERVICE'
          [Unit]
          Description=Disable IPv6 inside OpenClaw LXC
          DefaultDependencies=no
          After=local-fs.target
          Before=network-pre.target network.target networking.service openclaw-net-up.service openclaw-gateway.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'sysctl -w net.ipv6.conf.all.disable_ipv6=1 || true; sysctl -w net.ipv6.conf.default.disable_ipv6=1 || true; sysctl -w net.ipv6.conf.lo.disable_ipv6=1 || true; sysctl -w net.ipv6.conf.eth0.disable_ipv6=1 || true; sysctl -w net.ipv6.conf.all.accept_ra=0 || true; sysctl -w net.ipv6.conf.default.accept_ra=0 || true; sysctl -w net.ipv6.conf.eth0.accept_ra=0 || true; sysctl -w net.ipv6.conf.all.autoconf=0 || true; sysctl -w net.ipv6.conf.default.autoconf=0 || true; sysctl -w net.ipv6.conf.eth0.autoconf=0 || true; ip -6 addr flush dev eth0 2>/dev/null || true'
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          IPV6_SERVICE

          systemctl enable openclaw-disable-ipv6.service

          cat >/etc/systemd/system/openclaw-net-up.service <<'NET_UP_SERVICE'
          [Unit]
          Description=Bring up LXC eth0 without DHCP
          DefaultDependencies=no
          After=local-fs.target openclaw-disable-ipv6.service
          Before=network-pre.target network.target networking.service network-online.target ssh.service openclaw-firstboot.service openclaw-gateway.service
          Wants=openclaw-disable-ipv6.service network.target

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'ip link set lo up 2>/dev/null || true; ip link set eth0 up 2>/dev/null || true; ifup -a 2>/dev/null || true; ip -6 addr flush dev eth0 2>/dev/null || true'
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          NET_UP_SERVICE

          systemctl enable openclaw-net-up.service

          echo "=================================================="
          echo "开启 SSH 密码登录和 root 登录"
          echo "=================================================="

          mkdir -p /var/run/sshd
          mkdir -p /etc/ssh/sshd_config.d

          cat >/etc/ssh/sshd_config.d/99-openclaw-lxc.conf <<'SSH_CONF'
          PasswordAuthentication yes
          PermitRootLogin yes
          KbdInteractiveAuthentication yes
          UsePAM yes
          SSH_CONF

          sed -ri 's/^#?PasswordAuthentication .*/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sed -ri 's/^#?PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config || true
          sed -ri 's/^#?KbdInteractiveAuthentication .*/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config || true
          sed -ri 's/^#?UsePAM .*/UsePAM yes/' /etc/ssh/sshd_config || true

          cat >/etc/systemd/system/regenerate-ssh-host-keys.service <<'SSH_KEY_SERVICE'
          [Unit]
          Description=Regenerate SSH host keys on first boot
          ConditionPathExistsGlob=!/etc/ssh/ssh_host_*_key
          Before=ssh.service

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/ssh-keygen -A

          [Install]
          WantedBy=multi-user.target
          SSH_KEY_SERVICE

          systemctl enable regenerate-ssh-host-keys.service
          systemctl enable ssh.service || systemctl enable ssh || true
          systemctl enable cron.service || true

          echo "=================================================="
          echo "安装 Node.js 24"
          echo "=================================================="

          curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
          apt-get install -y nodejs

          node --version
          npm --version

          npm config set fund false
          npm config set audit false
          npm config set update-notifier false

          echo "=================================================="
          echo "安装 OpenClaw"
          echo "=================================================="

          npm install -g "openclaw@${OPENCLAW_VERSION}"

          command -v openclaw
          openclaw --version || true

          echo "=================================================="
          echo "安装完成后切换中国 apt / npm 源"
          echo "=================================================="

          cat >/etc/apt/sources.list <<'CHINA_APT_SOURCES'
          deb https://mirrors.tuna.tsinghua.edu.cn/ubuntu noble main restricted universe multiverse
          deb https://mirrors.tuna.tsinghua.edu.cn/ubuntu noble-updates main restricted universe multiverse
          deb https://mirrors.tuna.tsinghua.edu.cn/ubuntu noble-backports main restricted universe multiverse
          deb https://mirrors.tuna.tsinghua.edu.cn/ubuntu noble-security main restricted universe multiverse
          CHINA_APT_SOURCES

          rm -f /etc/apt/sources.list.d/nodesource*.list 2>/dev/null || true
          rm -f /etc/apt/sources.list.d/*node*.list 2>/dev/null || true

          apt-get update || {
            cat >/etc/apt/sources.list <<'USTC_APT_SOURCES'
          deb https://mirrors.ustc.edu.cn/ubuntu noble main restricted universe multiverse
          deb https://mirrors.ustc.edu.cn/ubuntu noble-updates main restricted universe multiverse
          deb https://mirrors.ustc.edu.cn/ubuntu noble-backports main restricted universe multiverse
          deb https://mirrors.ustc.edu.cn/ubuntu noble-security main restricted universe multiverse
          USTC_APT_SOURCES
            apt-get update || true
          }

          npm config set registry https://registry.npmmirror.com
          npm config set fund false
          npm config set audit false
          npm config set update-notifier false

          npm cache add @upstash/context7-mcp@latest >/dev/null 2>&1 || true
          npm cache add @modelcontextprotocol/server-filesystem@latest >/dev/null 2>&1 || true
          npm cache add @modelcontextprotocol/server-memory@latest >/dev/null 2>&1 || true

          echo "=================================================="
          echo "准备 OpenClaw 目录"
          echo "=================================================="

          mkdir -p "$OPENCLAW_HOME/.openclaw/workspace"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/sessions"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/agent"

          chown -R "$OPENCLAW_USER:$OPENCLAW_GROUP" "$OPENCLAW_HOME/.openclaw" || true

          cat >/etc/openclaw-lxc.env <<ENV_CONF
          OPENCLAW_LXC=1
          OPENCLAW_USER=$OPENCLAW_USER
          OPENCLAW_GROUP=$OPENCLAW_GROUP
          OPENCLAW_HOME=$OPENCLAW_HOME
          OPENCLAW_NET_IFACE=$OPENCLAW_NET_IFACE
          OPENCLAW_GATEWAY_PORT=$OPENCLAW_GATEWAY_PORT
          OPENCLAW_GATEWAY_BIND=$OPENCLAW_GATEWAY_BIND
          OPENCLAW_HIDE_BANNER=1
          ENV_CONF

          chmod 644 /etc/openclaw-lxc.env

          echo "=================================================="
          echo "写入 OpenClaw 配置维护脚本"
          echo "=================================================="

          cat >/usr/local/sbin/openclaw-ensure-config <<'ENSURE_CONF'
          #!/usr/bin/env bash
          set -euo pipefail

          [ -f /etc/openclaw-lxc.env ] && . /etc/openclaw-lxc.env

          OPENCLAW_USER="${OPENCLAW_USER:-root}"
          OPENCLAW_GROUP="${OPENCLAW_GROUP:-root}"
          OPENCLAW_HOME="${OPENCLAW_HOME:-/root}"
          OPENCLAW_GATEWAY_PORT="${OPENCLAW_GATEWAY_PORT:-18789}"
          OPENCLAW_GATEWAY_BIND="${OPENCLAW_GATEWAY_BIND:-lan}"

          ENV_FILE="$OPENCLAW_HOME/.openclaw/.env"
          CONFIG_FILE="$OPENCLAW_HOME/.openclaw/openclaw.json"

          mkdir -p "$OPENCLAW_HOME/.openclaw/workspace"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/sessions"
          mkdir -p "$OPENCLAW_HOME/.openclaw/agents/main/agent"

          touch "$ENV_FILE"

          if ! grep -q '^OPENCLAW_GATEWAY_TOKEN=' "$ENV_FILE"; then
            printf 'OPENCLAW_GATEWAY_TOKEN=%s\n' "$(openssl rand -hex 32)" >>"$ENV_FILE"
          fi

          if ! grep -q '^OPENCLAW_GATEWAY_PORT=' "$ENV_FILE"; then
            printf 'OPENCLAW_GATEWAY_PORT=%s\n' "$OPENCLAW_GATEWAY_PORT" >>"$ENV_FILE"
          fi

          if ! grep -q '^OPENCLAW_GATEWAY_BIND=' "$ENV_FILE"; then
            printf 'OPENCLAW_GATEWAY_BIND=%s\n' "$OPENCLAW_GATEWAY_BIND" >>"$ENV_FILE"
          fi

          if [ ! -s "$CONFIG_FILE" ] || ! jq empty "$CONFIG_FILE" >/dev/null 2>&1; then
            echo '{}' >"$CONFIG_FILE"
          fi

          TMP_FILE="$(mktemp)"

          jq \
            --arg bind "$OPENCLAW_GATEWAY_BIND" \
            --arg tokenRef '${OPENCLAW_GATEWAY_TOKEN}' \
            --argjson port "$OPENCLAW_GATEWAY_PORT" \
            '
            .gateway = (.gateway // {}) |
            .gateway.mode = "local" |
            .gateway.port = $port |
            .gateway.bind = $bind |
            .gateway.auth = (.gateway.auth // {}) |
            .gateway.auth.mode = "token" |
            .gateway.auth.token = $tokenRef |
            .gateway.auth.rateLimit = (.gateway.auth.rateLimit // {}) |
            .gateway.auth.rateLimit.maxAttempts = 20 |
            .gateway.auth.rateLimit.windowMs = 60000 |
            .gateway.auth.rateLimit.lockoutMs = 300000 |
            .gateway.auth.rateLimit.exemptLoopback = true |
            .gateway.controlUi = (.gateway.controlUi // {}) |
            .gateway.controlUi.enabled = true |
            .gateway.controlUi.allowInsecureAuth = true |
            .gateway.controlUi.dangerouslyDisableDeviceAuth = true |
            .gateway.reload = (.gateway.reload // {}) |
            .gateway.reload.mode = "hybrid" |
            .agents = (.agents // {}) |
            .agents.defaults = (.agents.defaults // {}) |
            .agents.defaults.workspace = (.agents.defaults.workspace // "~/.openclaw/workspace") |
            .cli = (.cli // {}) |
            .cli.banner = (.cli.banner // {}) |
            .cli.banner.taglineMode = "off" |
            .tools = (.tools // {}) |
            .tools.profile = "full" |
            .tools.allow = (((.tools.allow // []) | if type == "array" then . else [] end) + ["group:plugins"] | unique) |
            .mcp = (.mcp // {}) |
            .mcp.servers = (.mcp.servers // {}) |
            .mcp.servers.context7 = {
              command: "npx",
              args: ["-y", "@upstash/context7-mcp@latest"]
            } |
            .mcp.servers.workspace = {
              command: "npx",
              args: ["-y", "@modelcontextprotocol/server-filesystem@latest", "/root/.openclaw/workspace"]
            } |
            .mcp.servers.memory = {
              command: "npx",
              args: ["-y", "@modelcontextprotocol/server-memory@latest"]
            }
            ' "$CONFIG_FILE" >"$TMP_FILE"

          mv "$TMP_FILE" "$CONFIG_FILE"

          chown -R "$OPENCLAW_USER:$OPENCLAW_GROUP" "$OPENCLAW_HOME/.openclaw" 2>/dev/null || true
          chmod 700 "$OPENCLAW_HOME/.openclaw" || true
          chmod 600 "$ENV_FILE" "$CONFIG_FILE" || true
          ENSURE_CONF

          chmod +x /usr/local/sbin/openclaw-ensure-config

          echo "=================================================="
          echo "写入 API 配置脚本"
          echo "=================================================="

          cat >/usr/local/bin/openclaw-api-setup <<'API_SETUP'
          #!/usr/bin/env bash
          set -euo pipefail

          [ -f /etc/openclaw-lxc.env ] && . /etc/openclaw-lxc.env

          OPENCLAW_USER="${OPENCLAW_USER:-root}"
          OPENCLAW_GROUP="${OPENCLAW_GROUP:-root}"
          OPENCLAW_HOME="${OPENCLAW_HOME:-/root}"

          CONFIG_FILE="$OPENCLAW_HOME/.openclaw/openclaw.json"
          ENV_FILE="$OPENCLAW_HOME/.openclaw/.env"

          trim() {
            printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          mask_secret() {
            local value="${1:-}"
            local len=${#value}
            if [ "$len" -le 8 ]; then
              printf '********'
            else
              printf '%s****%s' "${value:0:4}" "${value: -4}"
            fi
          }

          get_env_value() {
            local key="$1"
            if [ -s "$ENV_FILE" ]; then
              grep -m1 "^${key}=" "$ENV_FILE" 2>/dev/null | cut -d= -f2- || true
            fi
          }

          write_env_value() {
            local key="$1"
            local value="$2"
            local tmp_file

            mkdir -p "$(dirname "$ENV_FILE")"
            touch "$ENV_FILE"

            tmp_file="$(mktemp)"
            grep -v "^${key}=" "$ENV_FILE" 2>/dev/null >"$tmp_file" || true
            printf '%s=%s\n' "$key" "$value" >>"$tmp_file"
            mv "$tmp_file" "$ENV_FILE"
          }

          normalize_base_url() {
            local input
            input="$(trim "$1")"
            input="${input%/}"

            case "$input" in
              */chat/completions)
                input="${input%/chat/completions}"
                ;;
            esac

            printf '%s' "${input%/}"
          }

          mkdir -p "$OPENCLAW_HOME/.openclaw"
          /usr/local/sbin/openclaw-ensure-config

          if [ ! -s "$CONFIG_FILE" ] || ! jq empty "$CONFIG_FILE" >/dev/null 2>&1; then
            echo '{}' >"$CONFIG_FILE"
          fi

          clear 2>/dev/null || true
          echo "============================================================"
          echo "OpenClaw API 配置"
          echo "============================================================"
          echo "只支持自定义 OpenAI-Compatible 接口。"
          echo
          echo "示例："
          echo "  https://api.deepseek.com"
          echo "  https://dashscope.aliyuncs.com/compatible-mode/v1"
          echo "  https://api.moonshot.cn/v1"
          echo "  https://your-domain.example.com/v1"
          echo
          echo "如果你有完整地址，也可以填："
          echo "  https://example.com/v1/chat/completions"
          echo "脚本会自动去掉末尾的 /chat/completions。"
          echo "============================================================"
          echo

          OLD_BASE_URL="$(get_env_value OPENCLAW_PROVIDER_BASE_URL || true)"
          OLD_MODEL="$(get_env_value OPENCLAW_PROVIDER_MODEL || true)"
          OLD_REASONING="$(get_env_value OPENCLAW_PROVIDER_REASONING || true)"
          OLD_KEY="$(get_env_value OPENCLAW_PROVIDER_API_KEY || true)"

          read -r -p "Base URL${OLD_BASE_URL:+ [$OLD_BASE_URL]}: " BASE_URL
          BASE_URL="$(trim "${BASE_URL:-}")"
          if [ -z "$BASE_URL" ] && [ -n "$OLD_BASE_URL" ]; then
            BASE_URL="$OLD_BASE_URL"
          fi
          BASE_URL="$(normalize_base_url "$BASE_URL")"

          read -r -p "模型名称${OLD_MODEL:+ [$OLD_MODEL]}: " MODEL_ID
          MODEL_ID="$(trim "${MODEL_ID:-}")"
          if [ -z "$MODEL_ID" ] && [ -n "$OLD_MODEL" ]; then
            MODEL_ID="$OLD_MODEL"
          fi

          DEFAULT_REASONING="${OLD_REASONING:-false}"
          read -r -p "是否支持思考 / reasoning？[$DEFAULT_REASONING]，y/N/true/false: " REASONING_INPUT
          REASONING_INPUT="$(trim "${REASONING_INPUT:-}")"
          if [ -z "$REASONING_INPUT" ]; then
            MODEL_REASONING="$DEFAULT_REASONING"
          else
            case "$REASONING_INPUT" in
              y|Y|yes|YES|Yes|true|TRUE|1)
                MODEL_REASONING="true"
                ;;
              n|N|no|NO|No|false|FALSE|0)
                MODEL_REASONING="false"
                ;;
              *)
                echo "错误：reasoning 只能填 y 或 n。"
                exit 1
                ;;
            esac
          fi

          if [ -n "$OLD_KEY" ]; then
            echo
            echo "检测到已有 API Key: $(mask_secret "$OLD_KEY")"
            read -r -s -p "新的 API Key，直接回车沿用旧 Key: " API_KEY
            echo
            API_KEY="$(trim "${API_KEY:-}")"
            if [ -z "$API_KEY" ]; then
              API_KEY="$OLD_KEY"
            fi
          else
            echo
            read -r -s -p "API Key: " API_KEY
            echo
            API_KEY="$(trim "${API_KEY:-}")"
          fi

          if [ -z "$BASE_URL" ] || [ -z "$MODEL_ID" ] || [ -z "$API_KEY" ]; then
            echo "错误：Base URL、模型名称、API Key 不能为空。"
            exit 1
          fi

          case "$BASE_URL" in
            http://*|https://*)
              ;;
            *)
              echo "错误：Base URL 必须以 http:// 或 https:// 开头。"
              exit 1
              ;;
          esac

          CHAT_COMPLETIONS_URL="$BASE_URL/chat/completions"

          echo
          echo "============================================================"
          echo "即将测试 API"
          echo "============================================================"
          echo "Base URL: $BASE_URL"
          echo "Chat URL: $CHAT_COMPLETIONS_URL"
          echo "模型: $MODEL_ID"
          echo "Reasoning: $MODEL_REASONING"
          echo "API Key: $(mask_secret "$API_KEY")"
          echo "============================================================"
          echo

          TEST_BODY="$(jq -nc --arg model "$MODEL_ID" '{model:$model,messages:[{role:"user",content:"请只回复 OK"}],max_tokens:32,stream:false}')"

          HTTP_CODE="$({
            curl -sS \
              --connect-timeout 10 \
              --max-time 45 \
              -o /tmp/openclaw-api-test-response.json \
              -w '%{http_code}' \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" \
              -d "$TEST_BODY" \
              "$CHAT_COMPLETIONS_URL"
          } 2>/tmp/openclaw-api-test-error.log || true)"

          case "$HTTP_CODE" in
            200|201)
              echo "API 测试成功，HTTP 状态码: $HTTP_CODE"
              ;;
            *)
              echo "API 测试未成功，HTTP 状态码: ${HTTP_CODE:-无}"
              if [ -s /tmp/openclaw-api-test-error.log ]; then
                echo
                echo "curl 错误："
                cat /tmp/openclaw-api-test-error.log
              fi
              if [ -s /tmp/openclaw-api-test-response.json ]; then
                echo
                echo "接口返回："
                cat /tmp/openclaw-api-test-response.json
                echo
              fi
              echo
              read -r -p "测试失败，仍然保存配置吗？y/N: " SAVE_ANYWAY
              case "${SAVE_ANYWAY:-N}" in
                y|Y|yes|YES|Yes|true|TRUE|1)
                  ;;
                *)
                  echo "已取消，没有修改 OpenClaw API 配置。"
                  exit 1
                  ;;
              esac
              ;;
          esac

          BACKUP_SUFFIX="$(date +'%Y%m%d-%H%M%S')"
          cp -a "$CONFIG_FILE" "$CONFIG_FILE.bak.$BACKUP_SUFFIX" 2>/dev/null || true
          cp -a "$ENV_FILE" "$ENV_FILE.bak.$BACKUP_SUFFIX" 2>/dev/null || true

          write_env_value OPENCLAW_PROVIDER_API_KEY "$API_KEY"
          write_env_value OPENCLAW_PROVIDER_BASE_URL "$BASE_URL"
          write_env_value OPENCLAW_PROVIDER_MODEL "$MODEL_ID"
          write_env_value OPENCLAW_PROVIDER_REASONING "$MODEL_REASONING"

          PRIMARY_MODEL="custom/$MODEL_ID"
          TMP_FILE="$(mktemp)"

          jq \
            --arg baseUrl "$BASE_URL" \
            --arg modelId "$MODEL_ID" \
            --arg primaryModel "$PRIMARY_MODEL" \
            --argjson reasoning "$MODEL_REASONING" \
            '
            .models = (.models // {}) |
            .models.mode = "merge" |
            .models.providers = (.models.providers // {}) |
            .models.providers.custom = {
              baseUrl: $baseUrl,
              apiKey: "${OPENCLAW_PROVIDER_API_KEY}",
              auth: "api-key",
              api: "openai-completions",
              models: [
                {
                  id: $modelId,
                  name: $modelId,
                  input: ["text"],
                  reasoning: $reasoning
                }
              ]
            } |
            .agents = (.agents // {}) |
            .agents.defaults = (.agents.defaults // {}) |
            .agents.defaults.model = {
              primary: $primaryModel,
              fallbacks: []
            }
            ' "$CONFIG_FILE" >"$TMP_FILE"

          mv "$TMP_FILE" "$CONFIG_FILE"

          chown -R "$OPENCLAW_USER:$OPENCLAW_GROUP" "$OPENCLAW_HOME/.openclaw" 2>/dev/null || true
          chmod 700 "$OPENCLAW_HOME/.openclaw" || true
          chmod 600 "$ENV_FILE" "$CONFIG_FILE" || true

          echo
          echo "============================================================"
          echo "API 配置已保存"
          echo "============================================================"
          echo "Base URL: $BASE_URL"
          echo "Chat URL: $CHAT_COMPLETIONS_URL"
          echo "默认模型: $PRIMARY_MODEL"
          echo "Reasoning: $MODEL_REASONING"
          echo "配置备份:"
          echo "  $CONFIG_FILE.bak.$BACKUP_SUFFIX"
          echo "  $ENV_FILE.bak.$BACKUP_SUFFIX"
          echo "============================================================"

          echo
          echo "重启 OpenClaw Gateway..."
          systemctl restart openclaw-gateway || true
          sleep 3

          /usr/local/sbin/openclaw-refresh-info || true

          echo
          echo "当前 OpenClaw 模型配置："
          jq '{models: .models.providers.custom, default: .agents.defaults.model}' "$CONFIG_FILE" || true

          echo
          echo "服务状态："
          systemctl status openclaw-gateway --no-pager || true
          API_SETUP

          chmod +x /usr/local/bin/openclaw-api-setup

          echo "=================================================="
          echo "写入信息生成脚本和小白命令"
          echo "=================================================="

          cat >/usr/local/sbin/openclaw-refresh-info <<'REFRESH_INFO'
          #!/usr/bin/env bash
          set -euo pipefail

          [ -f /etc/openclaw-lxc.env ] && . /etc/openclaw-lxc.env

          OPENCLAW_HOME="${OPENCLAW_HOME:-/root}"
          OPENCLAW_NET_IFACE="${OPENCLAW_NET_IFACE:-eth0}"
          OPENCLAW_GATEWAY_PORT="${OPENCLAW_GATEWAY_PORT:-18789}"

          ENV_FILE="$OPENCLAW_HOME/.openclaw/.env"
          INFO_FILE="/root/openclaw-info.txt"

          sysctl -w net.ipv6.conf.all.disable_ipv6=1 >/dev/null 2>&1 || true
          sysctl -w net.ipv6.conf.default.disable_ipv6=1 >/dev/null 2>&1 || true
          sysctl -w net.ipv6.conf.eth0.disable_ipv6=1 >/dev/null 2>&1 || true
          ip -6 addr flush dev "$OPENCLAW_NET_IFACE" 2>/dev/null || true

          ip link set lo up 2>/dev/null || true
          ip link set "$OPENCLAW_NET_IFACE" up 2>/dev/null || true

          if command -v ifup >/dev/null 2>&1; then
            ifup -a 2>/dev/null || true
          fi

          /usr/local/sbin/openclaw-ensure-config || true

          IPV4_LIST="$(ip -o -4 addr show dev "$OPENCLAW_NET_IFACE" scope global 2>/dev/null | awk '{print $4}' | cut -d/ -f1 | paste -sd ' ' - || true)"
          FIRST_IPV4="$(echo "$IPV4_LIST" | awk '{print $1}')"

          TOKEN=""
          if [ -s "$ENV_FILE" ]; then
            TOKEN="$(grep '^OPENCLAW_GATEWAY_TOKEN=' "$ENV_FILE" | cut -d= -f2- || true)"
          fi

          {
            echo "============================================================"
            echo "OpenClaw LXC"
            echo "============================================================"
            if [ -n "${FIRST_IPV4:-}" ]; then
              echo "访问地址:"
              echo "  http://$FIRST_IPV4:$OPENCLAW_GATEWAY_PORT"
              echo "  ws://$FIRST_IPV4:$OPENCLAW_GATEWAY_PORT"
            else
              echo "访问地址:"
              echo "  未检测到 IPv4，请确认 Proxmox 已设置静态 IP"
            fi
            echo
            echo "Gateway Token:"
            echo "  ${TOKEN:-未生成}"
            echo
            echo "第一次使用:"
            echo "  1. 运行 openclaw-api-setup"
            echo "  2. 填写 Base URL、模型名称、API Key"
            echo "  3. 浏览器打开上面的访问地址"
            echo "  4. 输入 Gateway Token"
            echo
            echo "常用命令:"
            echo "  openclaw-api-setup   配置 API"
            echo "  openclaw-info        显示访问地址和 Token"
            echo "  openclaw-status      查看服务状态"
            echo "  openclaw-logs        查看实时日志"
            echo "  openclaw-restart     重启 Gateway"
            echo "  openclaw-plugins     查看插件"
            echo "  openclaw-update      更新 OpenClaw"
            echo
            echo "工作目录:"
            echo "  /root/.openclaw/workspace"
            echo "============================================================"
          } >"$INFO_FILE"

          chmod 600 "$INFO_FILE"
          : > /etc/motd || true
          REFRESH_INFO

          chmod +x /usr/local/sbin/openclaw-refresh-info

          cat >/usr/local/bin/openclaw-info <<'INFO_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          /usr/local/sbin/openclaw-refresh-info >/dev/null 2>&1 || true
          cat /root/openclaw-info.txt 2>/dev/null || true
          INFO_SCRIPT

          cat >/usr/local/bin/openclaw-status <<'STATUS_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          systemctl status openclaw-gateway --no-pager || true
          echo
          openclaw status 2>/dev/null || true
          openclaw gateway status 2>/dev/null || true
          STATUS_SCRIPT

          cat >/usr/local/bin/openclaw-logs <<'LOGS_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          journalctl -u openclaw-gateway -f
          LOGS_SCRIPT

          cat >/usr/local/bin/openclaw-restart <<'RESTART_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          /usr/local/sbin/openclaw-ensure-config || true
          systemctl restart openclaw-gateway || true
          sleep 3
          openclaw-info || true
          systemctl status openclaw-gateway --no-pager || true
          RESTART_SCRIPT

          cat >/usr/local/bin/openclaw-plugins <<'PLUGINS_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          echo "============================================================"
          echo "OpenClaw 插件"
          echo "============================================================"
          openclaw mcp list || true
          echo
          echo "当前 MCP / 工具配置："
          jq '.mcp, .tools' /root/.openclaw/openclaw.json 2>/dev/null || true
          echo "============================================================"
          PLUGINS_SCRIPT

          cat >/usr/local/bin/openclaw-update <<'UPDATE_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          echo "更新 OpenClaw 到最新版本..."
          npm config set registry https://registry.npmmirror.com
          npm install -g openclaw@latest
          /usr/local/sbin/openclaw-ensure-config || true
          echo "重启 OpenClaw Gateway..."
          systemctl restart openclaw-gateway || true
          sleep 3
          echo "当前版本："
          openclaw --version || true
          echo
          echo "服务状态："
          systemctl status openclaw-gateway --no-pager || true
          UPDATE_SCRIPT

          chmod +x \
            /usr/local/bin/openclaw-info \
            /usr/local/bin/openclaw-status \
            /usr/local/bin/openclaw-logs \
            /usr/local/bin/openclaw-restart \
            /usr/local/bin/openclaw-plugins \
            /usr/local/bin/openclaw-update

          echo "=================================================="
          echo "写入登录提示"
          echo "=================================================="

          cat >/etc/profile.d/openclaw-info.sh <<'LOGIN_INFO'
          #!/usr/bin/env bash

          if [ "$(id -u)" = "0" ] && [ -z "${OPENCLAW_INFO_SHOWN:-}" ]; then
            export OPENCLAW_INFO_SHOWN=1
            if [ -x /usr/local/bin/openclaw-info ]; then
              /usr/local/bin/openclaw-info 2>/dev/null || true
            fi
          fi
          LOGIN_INFO

          chmod +x /etc/profile.d/openclaw-info.sh

          cat >>/root/.bashrc <<'BASHRC_OPENCLAW'

          # OpenClaw login information
          if [ "$(id -u)" = "0" ] && [ -z "${OPENCLAW_INFO_SHOWN:-}" ]; then
            export OPENCLAW_INFO_SHOWN=1
            if [ -x /usr/local/bin/openclaw-info ]; then
              /usr/local/bin/openclaw-info 2>/dev/null || true
            fi
          fi
          BASHRC_OPENCLAW

          echo "=================================================="
          echo "写入 systemd 服务"
          echo "=================================================="

          cat >/etc/systemd/system/openclaw-firstboot.service <<'FIRSTBOOT_SERVICE'
          [Unit]
          Description=OpenClaw first boot setup
          After=openclaw-disable-ipv6.service openclaw-net-up.service networking.service network-online.target
          Wants=openclaw-disable-ipv6.service openclaw-net-up.service networking.service network-online.target

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/openclaw-lxc.env
          ExecStart=/usr/local/sbin/openclaw-refresh-info
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          FIRSTBOOT_SERVICE

          cat >/etc/systemd/system/openclaw-gateway.service <<'GATEWAY_SERVICE'
          [Unit]
          Description=OpenClaw Gateway
          After=openclaw-disable-ipv6.service openclaw-net-up.service networking.service network-online.target openclaw-firstboot.service
          Wants=openclaw-disable-ipv6.service openclaw-net-up.service networking.service network-online.target openclaw-firstboot.service

          [Service]
          Type=simple
          WorkingDirectory=/root
          EnvironmentFile=-/etc/openclaw-lxc.env
          EnvironmentFile=-/root/.openclaw/.env
          Environment=HOME=/root
          Environment=OPENCLAW_HOME=/root
          Environment=OPENCLAW_CONFIG_PATH=/root/.openclaw/openclaw.json
          Environment=OPENCLAW_HIDE_BANNER=1
          Environment=PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          ExecStartPre=/usr/local/sbin/openclaw-ensure-config
          ExecStart=/usr/bin/env openclaw gateway
          Restart=always
          RestartSec=5
          TimeoutStartSec=120
          TimeoutStopSec=30
          SuccessExitStatus=0 143
          KillMode=control-group

          [Install]
          WantedBy=multi-user.target
          GATEWAY_SERVICE

          systemctl enable openclaw-firstboot.service
          systemctl enable openclaw-gateway.service

          echo "=================================================="
          echo "清理模板"
          echo "=================================================="

          rm -f /etc/machine-id
          touch /etc/machine-id
          rm -f /var/lib/dbus/machine-id || true
          ln -sf /etc/machine-id /var/lib/dbus/machine-id || true

          rm -f /etc/ssh/ssh_host_* || true
          : > /etc/motd || true

          apt-get clean
          rm -rf /var/lib/apt/lists/*
          rm -rf /tmp/*
          rm -rf /var/tmp/*
          rm -f /root/.bash_history || true

          echo "OpenClaw LXC rootfs ready."
          INSIDE_SCRIPT

          sudo chmod +x "$ROOTFS/tmp/install-inside.sh"

          echo "=================================================="
          echo "[4/8] chroot 安装 OpenClaw"
          echo "=================================================="

          sudo env \
            OPENCLAW_VERSION="$OPENCLAW_VERSION" \
            chroot "$ROOTFS" /bin/bash /tmp/install-inside.sh

          echo "=================================================="
          echo "[5/8] chroot 内自检"
          echo "=================================================="

          sudo chroot "$ROOTFS" sh -c 'command -v openclaw'
          sudo chroot "$ROOTFS" openclaw --version || true
          sudo chroot "$ROOTFS" npm config get registry | grep -q "registry.npmmirror.com"
          sudo chroot "$ROOTFS" /usr/local/sbin/openclaw-ensure-config
          sudo chroot "$ROOTFS" jq empty /root/.openclaw/openclaw.json
          sudo chroot "$ROOTFS" openclaw mcp list || true

          sudo rm -f "$ROOTFS/root/.openclaw/.env"
          sudo rm -f "$ROOTFS/root/.openclaw/.env.bak."* 2>/dev/null || true
          sudo rm -f "$ROOTFS/root/openclaw-info.txt" 2>/dev/null || true

          echo "=================================================="
          echo "[6/8] 卸载 chroot 挂载点并整理模板"
          echo "=================================================="

          cleanup_mounts
          trap - EXIT

          if sudo findmnt -R "$ROOTFS" >/dev/null 2>&1; then
            echo "错误：rootfs 下仍有挂载点未卸载"
            sudo findmnt -R "$ROOTFS"
            exit 1
          fi

          sudo tee "$ROOTFS/etc/resolv.conf" >/dev/null <<'DNS_CONF'
          nameserver 223.5.5.5
          nameserver 119.29.29.29
          DNS_CONF

          echo "=================================================="
          echo "[7/8] 自检和打包 LXC tar.gz"
          echo "=================================================="

          sudo chroot "$ROOTFS" sh -c 'test ! -e /root/.openclaw/.env'

          sudo chroot "$ROOTFS" sh -c 'command -v openclaw'
          sudo test -x "$ROOTFS/usr/local/bin/openclaw-api-setup"
          sudo test -x "$ROOTFS/usr/local/bin/openclaw-info"
          sudo test -x "$ROOTFS/usr/local/bin/openclaw-status"
          sudo test -x "$ROOTFS/usr/local/bin/openclaw-logs"
          sudo test -x "$ROOTFS/usr/local/bin/openclaw-restart"
          sudo test -x "$ROOTFS/usr/local/bin/openclaw-plugins"
          sudo test -x "$ROOTFS/usr/local/bin/openclaw-update"
          sudo test -x "$ROOTFS/usr/local/sbin/openclaw-refresh-info"
          sudo test -x "$ROOTFS/usr/local/sbin/openclaw-ensure-config"

          sudo test -f "$ROOTFS/etc/network/interfaces"
          sudo grep -Fq "source /etc/network/interfaces.d/*" "$ROOTFS/etc/network/interfaces"

          if sudo grep -R "iface eth0 inet dhcp" "$ROOTFS/etc/network/interfaces" "$ROOTFS/etc/network/interfaces.d" >/dev/null 2>&1; then
            echo "错误：网络配置里发现 DHCP"
            exit 1
          fi

          if sudo chroot "$ROOTFS" sh -c 'command -v dhclient' >/dev/null 2>&1; then
            echo "错误：dhclient 不应该存在"
            exit 1
          fi

          sudo test -f "$ROOTFS/etc/sysctl.d/99-openclaw-disable-ipv6.conf"
          sudo grep -q "net.ipv6.conf.all.disable_ipv6 = 1" "$ROOTFS/etc/sysctl.d/99-openclaw-disable-ipv6.conf"

          sudo test -f "$ROOTFS/etc/systemd/system/openclaw-disable-ipv6.service"
          sudo test -f "$ROOTFS/etc/systemd/system/openclaw-net-up.service"
          sudo test -f "$ROOTFS/etc/systemd/system/openclaw-firstboot.service"
          sudo test -f "$ROOTFS/etc/systemd/system/openclaw-gateway.service"

          sudo grep -q "PasswordAuthentication yes" "$ROOTFS/etc/ssh/sshd_config.d/99-openclaw-lxc.conf"
          sudo grep -q "PermitRootLogin yes" "$ROOTFS/etc/ssh/sshd_config.d/99-openclaw-lxc.conf"

          sudo grep -q "mirrors.tuna.tsinghua.edu.cn" "$ROOTFS/etc/apt/sources.list" || sudo grep -q "mirrors.ustc.edu.cn" "$ROOTFS/etc/apt/sources.list"
          sudo grep -q "nameserver 223.5.5.5" "$ROOTFS/etc/resolv.conf"
          sudo jq empty "$ROOTFS/root/.openclaw/openclaw.json"

          if sudo grep -R "Gateway Password" "$ROOTFS/etc/profile.d" "$ROOTFS/usr/local/bin" "$ROOTFS/usr/local/sbin" >/dev/null 2>&1; then
            echo "错误：登录信息或脚本不应该显示 Gateway Password"
            exit 1
          fi

          if sudo find "$ROOTFS/root/.openclaw" -type f -name ".env" -print 2>/dev/null | grep -q .; then
            echo "错误：模板里不应该预置 .env，避免所有容器共用同一个 Token"
            exit 1
          fi

          sudo tar \
            --one-file-system \
            --numeric-owner \
            --xattrs \
            --acls \
            -czpf "$DIST_DIR/$IMAGE_NAME" \
            -C "$ROOTFS" .

          cd "$DIST_DIR"
          sha256sum "$IMAGE_NAME" > "$IMAGE_NAME.sha256"

          ls -lh "$IMAGE_NAME" "$IMAGE_NAME.sha256"

          echo "=================================================="
          echo "[8/8] 上传 GitHub Release"
          echo "=================================================="

          TAG="openclaw-lxc-${VERSION}"
          TITLE="OpenClaw LXC ${VERSION}"

          echo "Repository: $GITHUB_REPOSITORY"
          echo "Tag: $TAG"
          echo "Image: $IMAGE_NAME"

          gh auth status --hostname github.com || true

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "$IMAGE_NAME" \
              "$IMAGE_NAME.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" \
              "$IMAGE_NAME" \
              "$IMAGE_NAME.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes "OpenClaw LXC template"
          fi

          gh release view "$TAG" --repo "$GITHUB_REPOSITORY"

          BUILD_SCRIPT

          chmod +x build-openclaw-lxc.sh
          ./build-openclaw-lxc.sh
