name: Build Hermes Agent Root LXC No Nginx

on:
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: "Hermes Agent ref"
        required: false
        default: "main"
      image_prefix:
        description: "Image prefix"
        required: false
        default: "hermes-agent-root-lxc-debian12-amd64"
      release_tag:
        description: "Release tag, empty = auto"
        required: false
        default: ""
      publish_release:
        description: "Publish Release"
        required: true
        type: boolean
        default: true
      disable_ipv6_default:
        description: "Disable IPv6 on first boot"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      DEBIAN_FRONTEND: noninteractive
      DISTRO: bookworm
      ARCH: amd64
      HERMES_REPO: https://github.com/NousResearch/hermes-agent.git

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        shell: bash
        run: |
          set -Eeuo pipefail
          DATE_TAG="$(date -u +'%Y.%m.%d-%H%M')"
          if [ -n "${{ inputs.release_tag }}" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="hermes-root-lxc-${DATE_TAG}"
          fi
          IMAGE_NAME="${{ inputs.image_prefix }}-${DATE_TAG}.tar.gz"
          echo "DATE_TAG=${DATE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${IMAGE_NAME}"
          echo "RELEASE_TAG=${RELEASE_TAG}"

      - name: Install build tools
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap ca-certificates curl wget git gnupg tar gzip xz-utils zstd \
            rsync openssl jq qemu-user-static binutils coreutils util-linux

      - name: Build LXC template
        shell: bash
        run: |
          set -Eeuo pipefail

          WORK="${GITHUB_WORKSPACE}/work"
          ROOTFS="${WORK}/rootfs"
          DIST="${GITHUB_WORKSPACE}/dist"
          IMAGE="${DIST}/${IMAGE_NAME}"
          HERMES_REF="${{ inputs.hermes_ref }}"
          DISABLE_IPV6_DEFAULT="${{ inputs.disable_ipv6_default }}"

          sudo rm -rf "$WORK"
          mkdir -p "$DIST"
          sudo mkdir -p "$ROOTFS"

          cleanup() {
            set +e
            sudo umount -lf "$ROOTFS/proc" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/sys" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/dev/pts" 2>/dev/null || true
            sudo umount -lf "$ROOTFS/dev" 2>/dev/null || true
          }
          trap cleanup EXIT

          echo "[1/9] debootstrap"
          sudo debootstrap --variant=minbase --arch="$ARCH" "$DISTRO" "$ROOTFS" http://deb.debian.org/debian
          sudo cp /etc/resolv.conf "$ROOTFS/etc/resolv.conf"
          sudo mount -t proc proc "$ROOTFS/proc"
          sudo mount --rbind /sys "$ROOTFS/sys"
          sudo mount --make-rslave "$ROOTFS/sys"
          sudo mount --rbind /dev "$ROOTFS/dev"
          sudo mount --make-rslave "$ROOTFS/dev"

          echo "[2/9] write install script"
          sudo tee "$ROOTFS/root/install-inside.sh" >/dev/null <<'INSIDE'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export HOME=/root
          export HERMES_HOME=/root/.hermes
          export PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

          HERMES_REF="${HERMES_REF:-main}"
          DISABLE_IPV6_DEFAULT="${DISABLE_IPV6_DEFAULT:-false}"

          echo "[inside 1/8] apt packages"
          cat > /etc/apt/sources.list <<'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          apt-get update
          apt-get install -y \
            apt-transport-https ca-certificates curl wget gnupg git bash sudo locales tzdata dbus \
            systemd systemd-sysv openssh-server openssl python3 python3.11 python3.11-venv \
            python3-pip python3-dev build-essential pkg-config libffi-dev libssl-dev ripgrep \
            ffmpeg jq nano vim-tiny iproute2 iputils-ping net-tools procps lsof htop less \
            unzip xz-utils tar cron logrotate bash-completion

          sed -i 's/^# *en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen || true
          sed -i 's/^# *zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' /etc/locale.gen || true
          locale-gen || true
          echo 'LANG=en_US.UTF-8' > /etc/default/locale
          ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo Asia/Shanghai > /etc/timezone

          echo "[inside 2/8] nodejs"
          curl -fsSL https://deb.nodesource.com/setup_22.x -o /tmp/nodesource.sh
          bash /tmp/nodesource.sh
          apt-get install -y nodejs
          node -v
          npm -v

          echo "[inside 3/8] clone hermes-agent"
          rm -rf /opt/hermes-agent
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /opt/hermes-agent
          cd /opt/hermes-agent

          if [ "$HERMES_REF" != "main" ]; then
            git fetch --depth 1 origin "$HERMES_REF" || true
            git checkout FETCH_HEAD 2>/dev/null || git checkout "$HERMES_REF" 2>/dev/null || true
          fi

          git rev-parse --short HEAD > /etc/hermes-commit.txt

          echo "[inside 4/8] install hermes as root"
          chmod +x ./setup-hermes.sh
          printf 'n\n' | ./setup-hermes.sh
          ln -sf /opt/hermes-agent/venv/bin/hermes /usr/local/bin/hermes
          ln -sf /opt/hermes-agent/venv/bin/hermes-agent /usr/local/bin/hermes-agent || true

          echo "[inside 5/8] build web dashboard"
          npm install --workspace web --silent || (cd web && npm install --silent)
          npm run build -w web || (cd web && npm run build)
          test -f /opt/hermes-agent/hermes_cli/web_dist/index.html

          echo "[inside 6/8] management scripts"
          mkdir -p /etc/hermes-lxc /root/.hermes /root/hermes-workspace
          chmod 700 /root/.hermes

          cat > /usr/local/bin/hermes-start-dashboard <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          export HOME=/root
          export HERMES_HOME=/root/.hermes
          export PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
          [ -f /etc/hermes-lxc/info.env ] && source /etc/hermes-lxc/info.env
          WEB_PORT="${WEB_PORT:-9119}"

          cd /opt/hermes-agent

          ARGS=(dashboard --host 0.0.0.0 --port "$WEB_PORT" --insecure --no-open --skip-build)

          if hermes dashboard --help 2>&1 | grep -q -- '--insecure-chat'; then
            ARGS+=(--insecure-chat)
          fi

          exec hermes "${ARGS[@]}"
          EOF
          chmod +x /usr/local/bin/hermes-start-dashboard

          cat > /usr/local/bin/hermes-firstboot <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          mkdir -p /etc/hermes-lxc /root/.hermes /root/hermes-workspace
          chmod 700 /root/.hermes

          INFO=/etc/hermes-lxc/info.env
          DONE=/etc/hermes-lxc/firstboot.done

          [ -f "$INFO" ] && source "$INFO"

          if [ "${1:-}" = "--reset-web" ] || [ ! -f "$DONE" ]; then
            WEB_PORT="${HERMES_WEB_PORT:-$(shuf -i 20000-50000 -n 1)}"
            API_KEY="${API_KEY:-$(openssl rand -hex 32)}"

            cat > "$INFO" <<INFO
          WEB_PORT="$WEB_PORT"
          API_KEY="$API_KEY"
          INFO
            chmod 600 "$INFO"
          fi

          touch /root/.hermes/.env
          chmod 600 /root/.hermes/.env

          grep -q '^HERMES_API_KEY=' /root/.hermes/.env 2>/dev/null || echo "HERMES_API_KEY=${API_KEY:-$(openssl rand -hex 32)}" >> /root/.hermes/.env

          if [ ! -f /root/.hermes/config.yaml ]; then
            cat > /root/.hermes/config.yaml <<'CFG'
          terminal:
            backend: "local"
            cwd: "/root/hermes-workspace"
            timeout: 180
            lifetime_seconds: 300

          browser:
            inactivity_timeout: 120

          compression:
            enabled: true
            threshold: 0.50
            target_ratio: 0.20
          CFG
          fi

          if [ "${DISABLE_IPV6_DEFAULT:-false}" = "true" ] && [ ! -f "$DONE" ]; then
            /usr/local/bin/hermes-ipv6-off || true
          fi

          systemctl enable hermes-dashboard.service >/dev/null 2>&1 || true
          systemctl restart hermes-dashboard.service || true

          touch "$DONE"
          EOF
          chmod +x /usr/local/bin/hermes-firstboot

          cat > /usr/local/bin/hermes-info <<'EOF'
          #!/usr/bin/env bash
          set -e

          [ -f /etc/hermes-lxc/info.env ] && source /etc/hermes-lxc/info.env

          IPV4="$(hostname -I 2>/dev/null | tr ' ' '\n' | grep -E '^[0-9]+\.' | head -n1 || true)"
          IPV6="$(hostname -I 2>/dev/null | tr ' ' '\n' | grep ':' | head -n1 || true)"

          echo
          echo "=================================================="
          echo "Hermes Agent Root LXC No Nginx"
          echo "=================================================="
          echo "运行用户       : root"
          echo "Nginx          : 不安装 / 不使用"
          echo "Web 端口       : ${WEB_PORT:-未初始化}"
          echo "Web 模式       : 0.0.0.0 + --insecure"

          [ -n "${IPV4:-}" ] && [ -n "${WEB_PORT:-}" ] && echo "IPv4 访问      : http://${IPV4}:${WEB_PORT}"
          [ -n "${IPV6:-}" ] && [ -n "${WEB_PORT:-}" ] && echo "IPv6 访问      : http://[${IPV6}]:${WEB_PORT}"

          echo "Hermes 目录    : /opt/hermes-agent"
          echo "配置目录       : /root/.hermes"
          echo "工作目录       : /root/hermes-workspace"
          echo "随机 API Key   : ${API_KEY:-未初始化}"
          echo "=================================================="
          echo "命令: hermes-menu / hermes-status / hermes-set-model / hermes-logs"
          echo "提醒：无 Nginx 版没有 Basic Auth，请用 PVE 防火墙限制访问。"
          echo
          EOF
          chmod +x /usr/local/bin/hermes-info

          cat > /usr/local/bin/hermes-set-model <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          mkdir -p /root/.hermes /root/hermes-workspace
          touch /root/.hermes/.env
          chmod 600 /root/.hermes/.env

          echo "Provider 示例 custom / openrouter"

          read -rp "Provider [custom]: " PROVIDER
          PROVIDER="${PROVIDER:-custom}"

          read -rp "Base URL [https://api.deepseek.com/v1]: " BASE_URL
          BASE_URL="${BASE_URL:-https://api.deepseek.com/v1}"

          read -rp "Model [deepseek-chat]: " MODEL_NAME
          MODEL_NAME="${MODEL_NAME:-deepseek-chat}"

          read -rsp "API Key: " API_KEY
          echo

          [ -z "$API_KEY" ] && echo "API Key 不能为空" && exit 1

          python3 - <<PY
          from pathlib import Path
          import json

          provider=${PROVIDER@Q}
          base_url=${BASE_URL@Q}
          model=${MODEL_NAME@Q}
          api_key=${API_KEY@Q}

          home=Path('/root/.hermes')
          home.mkdir(parents=True, exist_ok=True)

          (home/'config.yaml').write_text(f'''model:
            default: {json.dumps(model)}
            provider: {json.dumps(provider)}
            base_url: {json.dumps(base_url)}
            api_key: {json.dumps(api_key)}

          terminal:
            backend: "local"
            cwd: "/root/hermes-workspace"
            timeout: 180
            lifetime_seconds: 300

          browser:
            inactivity_timeout: 120

          compression:
            enabled: true
            threshold: 0.50
            target_ratio: 0.20
          ''', encoding='utf-8')

          env=home/'.env'
          old=env.read_text(encoding='utf-8', errors='ignore').splitlines() if env.exists() else []
          drop=('OPENAI_API_KEY=','OPENAI_BASE_URL=','OPENROUTER_API_KEY=','HERMES_API_KEY=')
          kept=[x for x in old if not x.startswith(drop)]
          add=[
              f'OPENAI_API_KEY={api_key}',
              f'OPENAI_BASE_URL={base_url}',
              f'HERMES_API_KEY={api_key}',
          ]

          if provider == 'openrouter':
              add.append(f'OPENROUTER_API_KEY={api_key}')

          env.write_text('\n'.join(kept+add)+'\n', encoding='utf-8')
          PY

          chmod 600 /root/.hermes/.env
          systemctl restart hermes-dashboard.service || true

          echo "模型配置完成：$PROVIDER / $BASE_URL / $MODEL_NAME"
          EOF
          chmod +x /usr/local/bin/hermes-set-model

          cat > /usr/local/bin/hermes-ipv6-off <<'EOF'
          #!/usr/bin/env bash
          set -e

          cat > /etc/sysctl.d/99-disable-ipv6.conf <<'SYSCTL'
          net.ipv6.conf.all.disable_ipv6 = 1
          net.ipv6.conf.default.disable_ipv6 = 1
          net.ipv6.conf.lo.disable_ipv6 = 1
          SYSCTL

          sysctl --system >/dev/null 2>&1 || true

          for f in /proc/sys/net/ipv6/conf/*/disable_ipv6; do
            echo 1 > "$f" 2>/dev/null || true
          done

          echo "IPv6 关闭命令已执行。非特权 LXC 可能需要在 PVE 宿主机侧关闭。"
          EOF
          chmod +x /usr/local/bin/hermes-ipv6-off

          cat > /usr/local/bin/hermes-ipv6-on <<'EOF'
          #!/usr/bin/env bash
          set -e

          rm -f /etc/sysctl.d/99-disable-ipv6.conf

          for f in /proc/sys/net/ipv6/conf/*/disable_ipv6; do
            echo 0 > "$f" 2>/dev/null || true
          done

          sysctl --system >/dev/null 2>&1 || true
          echo "IPv6 开启命令已执行。"
          EOF
          chmod +x /usr/local/bin/hermes-ipv6-on

          cat > /usr/local/bin/hermes-reset-web <<'EOF'
          #!/usr/bin/env bash
          set -e

          unset HERMES_WEB_PORT
          /usr/local/bin/hermes-firstboot --reset-web
          hermes-info
          EOF
          chmod +x /usr/local/bin/hermes-reset-web

          cat > /usr/local/bin/hermes-status <<'EOF'
          #!/usr/bin/env bash
          set +e

          systemctl --no-pager --full status hermes-firstboot.service | sed -n '1,12p'
          echo
          systemctl --no-pager --full status hermes-dashboard.service | sed -n '1,20p'
          echo
          ss -tulnp | grep -E 'hermes|python|node' || true
          echo

          export HOME=/root
          export HERMES_HOME=/root/.hermes
          export PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

          hermes version 2>/dev/null || hermes --version 2>/dev/null || true
          hermes status 2>/dev/null || true
          echo
          hermes-info
          EOF
          chmod +x /usr/local/bin/hermes-status

          cat > /usr/local/bin/hermes-logs <<'EOF'
          #!/usr/bin/env bash
          journalctl -u hermes-dashboard.service -u hermes-firstboot.service -n 300 --no-pager
          EOF
          chmod +x /usr/local/bin/hermes-logs

          cat > /usr/local/bin/hermes-menu <<'EOF'
          #!/usr/bin/env bash
          set -e

          while true; do
            clear
            echo "========== Hermes Root LXC No Nginx =========="
            echo "1. 查看访问信息"
            echo "2. 查看状态"
            echo "3. 配置模型 API"
            echo "4. 重置随机 Web 端口"
            echo "5. 重启 Dashboard"
            echo "6. 查看日志"
            echo "7. 关闭 IPv6"
            echo "8. 开启 IPv6"
            echo "9. 进入 /opt/hermes-agent"
            echo "0. 退出"
            read -rp "请选择: " n

            case "$n" in
              1) hermes-info; read -rp "回车继续..." _ ;;
              2) hermes-status; read -rp "回车继续..." _ ;;
              3) hermes-set-model; read -rp "回车继续..." _ ;;
              4) hermes-reset-web; read -rp "回车继续..." _ ;;
              5) systemctl restart hermes-dashboard.service; echo OK; read -rp "回车继续..." _ ;;
              6) hermes-logs; read -rp "回车继续..." _ ;;
              7) hermes-ipv6-off; read -rp "回车继续..." _ ;;
              8) hermes-ipv6-on; read -rp "回车继续..." _ ;;
              9) cd /opt/hermes-agent && bash ;;
              0) exit 0 ;;
              *) echo "无效"; sleep 1 ;;
            esac
          done
          EOF
          chmod +x /usr/local/bin/hermes-menu

          cat > /etc/profile.d/hermes-info.sh <<'EOF'
          #!/usr/bin/env bash
          [ -t 1 ] && echo "Hermes 已安装。输入 hermes-info 查看地址，输入 hermes-menu 管理。"
          EOF
          chmod +x /etc/profile.d/hermes-info.sh

          echo "[inside 7/8] systemd services"

          cat > /etc/systemd/system/hermes-firstboot.service <<'EOF'
          [Unit]
          Description=Hermes Agent First Boot Root No Nginx
          DefaultDependencies=no
          After=local-fs.target
          Before=multi-user.target hermes-dashboard.service

          [Service]
          Type=oneshot
          Environment=DISABLE_IPV6_DEFAULT=false
          ExecStart=/usr/local/bin/hermes-firstboot
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          EOF

          if [ "$DISABLE_IPV6_DEFAULT" = "true" ]; then
            sed -i 's/Environment=DISABLE_IPV6_DEFAULT=false/Environment=DISABLE_IPV6_DEFAULT=true/' /etc/systemd/system/hermes-firstboot.service
          fi

          cat > /etc/systemd/system/hermes-dashboard.service <<'EOF'
          [Unit]
          Description=Hermes Agent Dashboard Root No Nginx
          Wants=network-online.target
          After=network-online.target hermes-firstboot.service
          Requires=hermes-firstboot.service

          [Service]
          Type=simple
          User=root
          Group=root
          WorkingDirectory=/opt/hermes-agent
          Environment=HOME=/root
          Environment=HERMES_HOME=/root/.hermes
          Environment=PATH=/opt/hermes-agent/venv/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
          ExecStart=/usr/local/bin/hermes-start-dashboard
          Restart=always
          RestartSec=5
          KillSignal=SIGTERM
          TimeoutStopSec=20

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl enable hermes-firstboot.service
          systemctl enable hermes-dashboard.service

          echo "[inside 8/8] switch apt source and clean"

          cat > /etc/apt/sources.list <<'EOF'
          deb https://mirrors.ustc.edu.cn/debian/ bookworm main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian/ bookworm-updates main contrib non-free non-free-firmware
          deb https://mirrors.ustc.edu.cn/debian-security/ bookworm-security main contrib non-free non-free-firmware
          EOF

          apt-get clean
          rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
          rm -f /etc/ssh/ssh_host_*
          truncate -s 0 /etc/machine-id || true
          rm -f /var/lib/dbus/machine-id || true
          find /var/log -type f -exec truncate -s 0 {} \; 2>/dev/null || true
          INSIDE

          sudo chmod +x "$ROOTFS/root/install-inside.sh"

          echo "[3/9] chroot install"
          sudo chroot "$ROOTFS" /usr/bin/env \
            HERMES_REF="$HERMES_REF" \
            DISABLE_IPV6_DEFAULT="$DISABLE_IPV6_DEFAULT" \
            DEBIAN_FRONTEND=noninteractive \
            HOME=/root \
            /bin/bash /root/install-inside.sh

          echo "[4/9] self check"
          sudo chroot "$ROOTFS" /bin/bash -lc '
            set -Eeuo pipefail

            test -x /opt/hermes-agent/venv/bin/hermes
            test -L /usr/local/bin/hermes
            test -f /opt/hermes-agent/hermes_cli/web_dist/index.html
            test -f /etc/systemd/system/hermes-firstboot.service
            test -f /etc/systemd/system/hermes-dashboard.service
            test -x /usr/local/bin/hermes-menu
            test -x /usr/local/bin/hermes-set-model
            test -x /usr/local/bin/hermes-start-dashboard
            test ! -e /etc/nginx
            ! id hermes >/dev/null 2>&1

            /opt/hermes-agent/venv/bin/hermes version || true
            echo "self check passed"
          '

          echo "[5/9] build info"

          sudo mkdir -p "$ROOTFS/etc/hermes-lxc"
          sudo tee "$ROOTFS/etc/hermes-lxc/build-info.txt" >/dev/null <<EOF
          Image: ${IMAGE_NAME}
          Build date UTC: $(date -u +'%Y-%m-%d %H:%M:%S')
          Debian: 12 bookworm
          Arch: amd64
          Hermes repo: ${HERMES_REPO}
          Hermes ref: ${HERMES_REF}
          GitHub repository: ${GITHUB_REPOSITORY}
          GitHub run id: ${GITHUB_RUN_ID}
          Run user: root
          Nginx: disabled / not installed
          Dashboard: 0.0.0.0 random port with --insecure
          IPv6 disabled by default: ${DISABLE_IPV6_DEFAULT}
          EOF

          sudo cp "$ROOTFS/etc/hermes-lxc/build-info.txt" "$DIST/build-info.txt"

          echo "[6/9] cleanup mounts"
          cleanup
          trap - EXIT

          echo "[7/9] package"
          sudo tar --numeric-owner --xattrs --acls -C "$ROOTFS" -czf "$IMAGE" .
          sudo chown -R "$USER:$USER" "$DIST"

          echo "[8/9] sha256 and file list"
          tar -tzf "$IMAGE" > "${IMAGE}.list"
          (cd "$DIST" && sha256sum "$IMAGE_NAME" > "${IMAGE_NAME}.sha256")

          echo "[9/9] verify list and README"

          grep -q './opt/hermes-agent/venv/bin/hermes' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-menu' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-set-model' "${IMAGE}.list"
          grep -q './usr/local/bin/hermes-start-dashboard' "${IMAGE}.list"
          grep -q './etc/systemd/system/hermes-dashboard.service' "${IMAGE}.list"
          grep -q './opt/hermes-agent/hermes_cli/web_dist/index.html' "${IMAGE}.list"

          if grep -q './etc/nginx' "${IMAGE}.list"; then
            echo 'nginx should not exist'
            exit 1
          fi

          if grep -q './home/hermes' "${IMAGE}.list"; then
            echo 'hermes user home should not exist'
            exit 1
          fi

          cat > "$DIST/README.md" <<EOF
          # Hermes Agent Root LXC No Nginx

          - 不使用 Docker
          - 不安装 Nginx
          - 不创建 hermes 用户
          - root 用户运行 Hermes Agent
          - Dashboard 直接监听随机端口
          - 支持自定义模型 API
          - 支持一键关闭 / 开启 IPv6
          - 自动生成 SHA256 和文件列表

          ## PVE 创建

          \`\`\`bash
          pct create 101 local:vztmpl/${IMAGE_NAME} \\
            --hostname hermes-agent \\
            --cores 2 \\
            --memory 2048 \\
            --swap 1024 \\
            --rootfs local-lvm:16 \\
            --net0 name=eth0,bridge=vmbr0,ip=dhcp \\
            --unprivileged 1 \\
            --features nesting=1 \\
            --start 1
          \`\`\`

          ## 登录后

          \`\`\`bash
          hermes-info
          hermes-menu
          hermes-set-model
          hermes-status
          hermes-logs
          hermes-reset-web
          hermes-ipv6-off
          hermes-ipv6-on
          \`\`\`

          ## 安全提醒

          这个版本不用 Nginx，也没有 Basic Auth。Dashboard 使用 --host 0.0.0.0 --insecure 直接监听随机端口，请用 PVE 防火墙限制访问来源。
          EOF

          ls -lh "$DIST"
          cat "${IMAGE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-root-no-nginx-lxc-template
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
            dist/README.md
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Hermes Agent Root No Nginx LXC ${{ env.RELEASE_TAG }}
          body_path: dist/README.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
            dist/README.md
