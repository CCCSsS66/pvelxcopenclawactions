name: Build OpenClaw KVM Cloud Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号，例如 v1.0.0；留空自动生成日期版本"
        required: false
        type: string

      openclaw_npm_spec:
        description: "OpenClaw npm 包，例如 openclaw 或 openclaw@1.2.3"
        required: false
        default: "openclaw"
        type: string

      openclaw_run_cmd:
        description: "OpenClaw 启动命令"
        required: false
        default: "openclaw onboard"
        type: string

      bind_host:
        description: "监听地址"
        required: true
        default: "0.0.0.0"
        type: choice
        options:
          - "0.0.0.0"
          - "::"

      ipv6_policy:
        description: "IPv6 策略：ask=首次登录询问，0=关闭，1=开启"
        required: true
        default: "ask"
        type: choice
        options:
          - "ask"
          - "0"
          - "1"

      disk_size:
        description: "KVM 镜像虚拟磁盘大小，例如 20G；也兼容 20GB"
        required: false
        default: "20G"
        type: string

      port_min:
        description: "随机端口最小值"
        required: false
        default: "20000"
        type: string

      port_max:
        description: "随机端口最大值"
        required: false
        default: "65000"
        type: string

      prerelease:
        description: "是否标记为预发布"
        required: true
        default: false
        type: boolean

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release OpenClaw KVM Image
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare version
        id: vars
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            INPUT_VERSION="${{ inputs.version }}"
            if [[ -n "${INPUT_VERSION}" ]]; then
              VERSION="${INPUT_VERSION}"
            else
              VERSION="v$(date -u +'%Y.%m.%d-%H%M')"
            fi
          fi

          SAFE_VERSION="${VERSION#v}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "safe_version=${SAFE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build KVM qcow2 image
        shell: bash
        env:
          VERSION: ${{ steps.vars.outputs.safe_version }}
          TEMPLATE_NAME: openclaw-kvm

          DEBIAN_CLOUD_IMAGE_URL: https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2

          OPENCLAW_NPM_SPEC: ${{ inputs.openclaw_npm_spec || 'openclaw' }}
          OPENCLAW_RUN_CMD: ${{ inputs.openclaw_run_cmd || 'openclaw onboard' }}

          BIND_HOST: ${{ inputs.bind_host || '0.0.0.0' }}
          IPV6_POLICY: ${{ inputs.ipv6_policy || 'ask' }}

          DISK_SIZE: ${{ inputs.disk_size || '20G' }}
          PORT_MIN: ${{ inputs.port_min || '20000' }}
          PORT_MAX: ${{ inputs.port_max || '65000' }}

          NPM_INSTALL_REGISTRY: https://registry.npmmirror.com
          NPM_FINAL_REGISTRY: https://registry.npmmirror.com

        run: |
          set -Eeuo pipefail

          cat > /tmp/build-openclaw-kvm.sh <<'BUILDER'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          trap 'on_error $LINENO' ERR

          export LIBGUESTFS_BACKEND=direct

          TEMPLATE_NAME="${TEMPLATE_NAME:-openclaw-kvm}"
          VERSION="${VERSION:-dev}"

          DEBIAN_CLOUD_IMAGE_URL="${DEBIAN_CLOUD_IMAGE_URL:-https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2}"

          OPENCLAW_NPM_SPEC="${OPENCLAW_NPM_SPEC:-openclaw}"
          OPENCLAW_RUN_CMD="${OPENCLAW_RUN_CMD:-openclaw onboard}"

          BIND_HOST="${BIND_HOST:-0.0.0.0}"
          IPV6_POLICY="${IPV6_POLICY:-ask}"

          DISK_SIZE="${DISK_SIZE:-20G}"
          PORT_MIN="${PORT_MIN:-20000}"
          PORT_MAX="${PORT_MAX:-65000}"

          NPM_INSTALL_REGISTRY="${NPM_INSTALL_REGISTRY:-https://registry.npmmirror.com}"
          NPM_FINAL_REGISTRY="${NPM_FINAL_REGISTRY:-https://registry.npmmirror.com}"

          BASE_DIR="$(pwd)"
          WORK_DIR="${BASE_DIR}/work"
          DIST_DIR="${BASE_DIR}/dist"
          PAYLOAD_DIR="${WORK_DIR}/payload"
          OFFLINE_DIR="${WORK_DIR}/offline"

          BASE_IMAGE="${WORK_DIR}/debian-12-genericcloud-amd64.qcow2"
          IMAGE="${WORK_DIR}/${TEMPLATE_NAME}-debian12-${VERSION}.qcow2"

          OUT_QCOW2="${DIST_DIR}/${TEMPLATE_NAME}-debian12-${VERSION}.qcow2"
          OUT_XZ="${OUT_QCOW2}.xz"
          OUT_SHA="${OUT_XZ}.sha256"
          OUT_LIST="${OUT_XZ}.list"
          BUILD_INFO="${DIST_DIR}/build-info.txt"

          log() {
            echo "[$(date '+%F %T')] $*"
          }

          die() {
            echo "错误：$*" >&2
            exit 1
          }

          q() {
            printf '%q' "$1"
          }

          need_root() {
            if [ "$(id -u)" != "0" ]; then
              die "本构建脚本需要 root，请使用 sudo -E bash 运行"
            fi
          }

          on_error() {
            local line="$1"
            echo
            echo "=================================================="
            echo "构建失败，出错行：${line}"
            echo "=================================================="
            exit 1
          }

          normalize_disk_size() {
            local raw="${DISK_SIZE:-20G}"

            raw="$(echo "$raw" | tr -d ' ')"
            raw="$(echo "$raw" | tr '[:lower:]' '[:upper:]')"

            if [[ "$raw" =~ ^[0-9]+$ ]]; then
              raw="${raw}G"
            fi

            raw="${raw/KB/K}"
            raw="${raw/MB/M}"
            raw="${raw/GB/G}"
            raw="${raw/TB/T}"
            raw="${raw/PB/P}"
            raw="${raw/EB/E}"

            if [[ ! "$raw" =~ ^[0-9]+[KMGTPE]$ ]]; then
              echo "错误：disk_size 格式不正确：${DISK_SIZE}"
              echo "正确示例：20G、30G、10240M"
              exit 1
            fi

            DISK_SIZE="$raw"
          }

          install_deps() {
            log "[1/12] 安装构建依赖"

            apt-get update
            apt-get install -y \
              curl \
              xz-utils \
              ca-certificates \
              qemu-utils \
              libguestfs-tools \
              guestfs-tools \
              file \
              coreutils \
              findutils \
              tar \
              gzip
          }

          download_cloud_image() {
            log "[2/12] 下载 Debian 12 Cloud-Init qcow2 镜像"

            rm -rf "$WORK_DIR"
            mkdir -p "$WORK_DIR" "$DIST_DIR" "$PAYLOAD_DIR" "$OFFLINE_DIR"

            curl -L --fail --retry 5 --retry-delay 5 \
              -o "$BASE_IMAGE" \
              "$DEBIAN_CLOUD_IMAGE_URL"

            file "$BASE_IMAGE"
            qemu-img info "$BASE_IMAGE"
          }

          resize_image() {
            log "[3/12] 扩容 qcow2 镜像"

            normalize_disk_size

            log "规范化后的磁盘大小：${DISK_SIZE}"

            ROOT_PART="$(virt-filesystems -a "$BASE_IMAGE" --partitions | head -1)"

            if [ -z "$ROOT_PART" ]; then
              die "无法检测 Debian cloud image 根分区"
            fi

            log "检测到根分区：$ROOT_PART"

            qemu-img create -f qcow2 "$IMAGE" "$DISK_SIZE"

            virt-resize \
              --expand "$ROOT_PART" \
              "$BASE_IMAGE" \
              "$IMAGE"

            qemu-img info "$IMAGE"
          }

          prepare_offline_openclaw() {
            log "[4/12] 准备 Node.js + OpenClaw 离线包"

            NODE_TMP="${WORK_DIR}/node-tmp"
            NODE_TAR_DIR="${WORK_DIR}/node-official"
            RUNTIME_ROOT="${OFFLINE_DIR}/opt/openclaw-runtime"
            NODE_ROOT="${OFFLINE_DIR}/opt/node"

            mkdir -p "$NODE_TMP" "$NODE_TAR_DIR" "$RUNTIME_ROOT" "$NODE_ROOT"
            mkdir -p "$OFFLINE_DIR/usr/bin"
            mkdir -p "$OFFLINE_DIR/usr/local/bin"
            mkdir -p "$OFFLINE_DIR/etc/openclaw"
            mkdir -p "$OFFLINE_DIR/var/lib/openclaw"
            mkdir -p "$OFFLINE_DIR/home/openclaw/.openclaw"

            log "获取 Node.js 24 官方 Linux x64 包名"

            NODE_FILE="$(curl -fsSL https://nodejs.org/dist/latest-v24.x/SHASUMS256.txt | awk '/linux-x64.tar.xz/ {print $2; exit}')"

            if [ -z "$NODE_FILE" ]; then
              die "无法获取 Node.js 24 linux-x64.tar.xz 文件名"
            fi

            log "Node.js 文件：$NODE_FILE"

            curl -fsSL "https://nodejs.org/dist/latest-v24.x/${NODE_FILE}" -o "${NODE_TMP}/${NODE_FILE}"

            tar -xJf "${NODE_TMP}/${NODE_FILE}" -C "$NODE_TAR_DIR" --strip-components=1

            cp -a "$NODE_TAR_DIR/." "$NODE_ROOT/"

            log "使用官方 Node.js 安装 pnpm 和 OpenClaw 到离线目录"

            "$NODE_TAR_DIR/bin/npm" config set registry "$NPM_INSTALL_REGISTRY"
            "$NODE_TAR_DIR/bin/npm" config set fund false
            "$NODE_TAR_DIR/bin/npm" config set audit false

            "$NODE_TAR_DIR/bin/npm" install -g \
              --prefix "$RUNTIME_ROOT" \
              pnpm \
              "$OPENCLAW_NPM_SPEC"

            if [ ! -d "$RUNTIME_ROOT/lib/node_modules/openclaw" ]; then
              die "离线目录中没有 OpenClaw node_modules"
            fi

            cat > "$OFFLINE_DIR/usr/bin/node" <<'EOF'
          #!/usr/bin/env bash
          exec /opt/node/bin/node "$@"
          EOF

            cat > "$OFFLINE_DIR/usr/bin/npm" <<'EOF'
          #!/usr/bin/env bash
          exec /opt/node/bin/npm "$@"
          EOF

            cat > "$OFFLINE_DIR/usr/bin/npx" <<'EOF'
          #!/usr/bin/env bash
          exec /opt/node/bin/npx "$@"
          EOF

            cat > "$OFFLINE_DIR/usr/bin/pnpm" <<'EOF'
          #!/usr/bin/env bash
          exec /opt/openclaw-runtime/bin/pnpm "$@"
          EOF

            cat > "$OFFLINE_DIR/usr/bin/openclaw" <<'EOF'
          #!/usr/bin/env bash
          exec /opt/openclaw-runtime/bin/openclaw "$@"
          EOF

            chmod +x "$OFFLINE_DIR/usr/bin/node" \
              "$OFFLINE_DIR/usr/bin/npm" \
              "$OFFLINE_DIR/usr/bin/npx" \
              "$OFFLINE_DIR/usr/bin/pnpm" \
              "$OFFLINE_DIR/usr/bin/openclaw"

            cat > "$OFFLINE_DIR/usr/local/bin/openclaw-offline-fix" <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          useradd -m -s /bin/bash openclaw || true

          mkdir -p /var/lib/openclaw
          mkdir -p /home/openclaw/.openclaw
          mkdir -p /etc/openclaw

          chown -R openclaw:openclaw /var/lib/openclaw
          chown -R openclaw:openclaw /home/openclaw

          chmod +x /usr/bin/node /usr/bin/npm /usr/bin/npx /usr/bin/pnpm /usr/bin/openclaw || true

          npm config set registry "https://registry.npmmirror.com" || true
          pnpm config set registry "https://registry.npmmirror.com" || true

          command -v node
          command -v npm
          command -v pnpm
          command -v openclaw

          node -v
          npm -v
          pnpm -v || true
          openclaw --version || true
          EOF

            chmod +x "$OFFLINE_DIR/usr/local/bin/openclaw-offline-fix"

            tar -czf "$WORK_DIR/openclaw-offline.tar.gz" -C "$OFFLINE_DIR" .

            log "离线包大小：$(du -h "$WORK_DIR/openclaw-offline.tar.gz" | awk '{print $1}')"
          }

          write_payload_files() {
            log "[5/12] 生成 firstboot / API / IPv6 / systemd 脚本"

            mkdir -p "$PAYLOAD_DIR/usr/local/bin"
            mkdir -p "$PAYLOAD_DIR/etc/openclaw"
            mkdir -p "$PAYLOAD_DIR/etc/systemd/system"
            mkdir -p "$PAYLOAD_DIR/etc/profile.d"

            cat > "$PAYLOAD_DIR/etc/openclaw/template.conf" <<EOF
          PORT_MIN=$(q "$PORT_MIN")
          PORT_MAX=$(q "$PORT_MAX")
          OPENCLAW_RUN_CMD=$(q "$OPENCLAW_RUN_CMD")
          ENABLE_IPV6_DEFAULT=$(q "$IPV6_POLICY")
          OPENCLAW_BIND_HOST=$(q "$BIND_HOST")
          EOF

            cat > "$PAYLOAD_DIR/usr/local/bin/openclaw-get-addresses" <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          PORT="${1:-}"

          get_ipv4_list() {
            ip -o -4 addr show scope global | awk '{print $4}' | cut -d/ -f1 | grep -v '^127\.' || true
          }

          get_ipv6_list() {
            ip -o -6 addr show scope global | awk '{print $4}' | cut -d/ -f1 | grep -v '^fe80' || true
          }

          echo "网卡 IPv4 访问地址："
          found4=0

          while read -r ip4; do
            [ -z "$ip4" ] && continue
            found4=1
            if [ -n "$PORT" ]; then
              echo "http://${ip4}:${PORT}"
            else
              echo "$ip4"
            fi
          done < <(get_ipv4_list)

          if [ "$found4" = "0" ]; then
            echo "未检测到 IPv4 地址"
          fi

          echo
          echo "网卡 IPv6 访问地址："
          found6=0

          while read -r ip6; do
            [ -z "$ip6" ] && continue
            found6=1
            if [ -n "$PORT" ]; then
              echo "http://[${ip6}]:${PORT}"
            else
              echo "$ip6"
            fi
          done < <(get_ipv6_list)

          if [ "$found6" = "0" ]; then
            echo "未检测到 IPv6 地址"
          fi
          EOF

            cat > "$PAYLOAD_DIR/usr/local/bin/openclaw-wait-network" <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          for _ in $(seq 1 30); do
            if ip -o -4 addr show scope global | grep -q .; then
              exit 0
            fi

            if ip -o -6 addr show scope global | grep -q .; then
              exit 0
            fi

            sleep 1
          done

          exit 0
          EOF

            cat > "$PAYLOAD_DIR/usr/local/bin/openclaw-ipv6-control" <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          ACTION="${1:-status}"

          get_main_ifaces() {
            ip -o link show \
              | awk -F': ' '{print $2}' \
              | cut -d'@' -f1 \
              | grep -vE '^(lo|docker|veth|br-|virbr|tun|tap)' \
              || true
          }

          disable_ipv6() {
            echo "[IPv6] 正在强制关闭 IPv6..."

            cat > /etc/sysctl.d/99-openclaw-disable-ipv6.conf <<'EOT'
          net.ipv6.conf.all.disable_ipv6 = 1
          net.ipv6.conf.default.disable_ipv6 = 1
          net.ipv6.conf.lo.disable_ipv6 = 1
          net.ipv6.conf.all.accept_ra = 0
          net.ipv6.conf.default.accept_ra = 0
          net.ipv6.conf.all.autoconf = 0
          net.ipv6.conf.default.autoconf = 0
          net.ipv6.conf.all.use_tempaddr = 0
          net.ipv6.conf.default.use_tempaddr = 0
          EOT

            rm -f /etc/sysctl.d/99-openclaw-enable-ipv6.conf

            sysctl --system >/dev/null 2>&1 || true

            for dev in $(get_main_ifaces); do
              ip -6 addr flush dev "$dev" || true
              ip -6 route flush dev "$dev" || true
              sysctl -w "net.ipv6.conf.${dev}.disable_ipv6=1" >/dev/null 2>&1 || true
              sysctl -w "net.ipv6.conf.${dev}.accept_ra=0" >/dev/null 2>&1 || true
              sysctl -w "net.ipv6.conf.${dev}.autoconf=0" >/dev/null 2>&1 || true
            done

            echo "[IPv6] 已关闭。"
          }

          enable_ipv6() {
            echo "[IPv6] 正在开启 IPv6..."

            rm -f /etc/sysctl.d/99-openclaw-disable-ipv6.conf

            cat > /etc/sysctl.d/99-openclaw-enable-ipv6.conf <<'EOT'
          net.ipv6.conf.all.disable_ipv6 = 0
          net.ipv6.conf.default.disable_ipv6 = 0
          net.ipv6.conf.lo.disable_ipv6 = 0
          net.ipv6.conf.all.accept_ra = 1
          net.ipv6.conf.default.accept_ra = 1
          net.ipv6.conf.all.autoconf = 1
          net.ipv6.conf.default.autoconf = 1
          EOT

            sysctl --system >/dev/null 2>&1 || true

            for dev in $(get_main_ifaces); do
              sysctl -w "net.ipv6.conf.${dev}.disable_ipv6=0" >/dev/null 2>&1 || true
              sysctl -w "net.ipv6.conf.${dev}.accept_ra=1" >/dev/null 2>&1 || true
              sysctl -w "net.ipv6.conf.${dev}.autoconf=1" >/dev/null 2>&1 || true
            done

            echo "[IPv6] 已开启。"
          }

          status_ipv6() {
            echo "IPv6 全局地址："
            ip -6 addr show scope global || true
            echo
            echo "IPv6 路由："
            ip -6 route show || true
          }

          case "$ACTION" in
            enable) enable_ipv6 ;;
            disable) disable_ipv6 ;;
            status) status_ipv6 ;;
            *)
              echo "用法：openclaw-ipv6-control enable|disable|status"
              exit 1
              ;;
          esac
          EOF

            cat > "$PAYLOAD_DIR/usr/local/bin/openclaw-firstboot" <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          FLAG="/etc/openclaw/firstboot.done"
          RUNTIME="/etc/openclaw/runtime.env"
          INFO="/root/openclaw-info.txt"

          source /etc/openclaw/template.conf

          if [ -f "$FLAG" ]; then
            exit 0
          fi

          echo "[OpenClaw] 首次启动初始化..."

          openclaw-wait-network || true

          ENABLE_IPV6="${ENABLE_IPV6_DEFAULT}"

          if [ "$ENABLE_IPV6" = "ask" ]; then
            ENABLE_IPV6="0"
            touch /etc/openclaw/ipv6_need_ask
          fi

          if [ "$ENABLE_IPV6" = "1" ]; then
            openclaw-ipv6-control enable || true
          else
            openclaw-ipv6-control disable || true
          fi

          PORT="$(shuf -i "${PORT_MIN}-${PORT_MAX}" -n 1)"
          ADMIN_PASS="$(openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | head -c 18)"

          cat > "$RUNTIME" <<EOT
          OPENCLAW_PORT=${PORT}
          OPENCLAW_ADMIN_PASSWORD=${ADMIN_PASS}
          ENABLE_IPV6=${ENABLE_IPV6}
          EOT

          chown root:openclaw "$RUNTIME"
          chmod 640 "$RUNTIME"

          cat > /etc/openclaw/openclaw.env <<EOT
          HOST=${OPENCLAW_BIND_HOST}
          OPENCLAW_HOST=${OPENCLAW_BIND_HOST}
          PORT=${PORT}
          OPENCLAW_PORT=${PORT}
          OPENCLAW_ADMIN_USER=admin
          OPENCLAW_ADMIN_PASSWORD=${ADMIN_PASS}
          EOT

          chown root:openclaw /etc/openclaw/openclaw.env
          chmod 640 /etc/openclaw/openclaw.env

          systemctl daemon-reload
          systemctl enable openclaw >/dev/null 2>&1 || true

          {
            echo
            echo "=================================================="
            echo " OpenClaw KVM 已初始化"
            echo "=================================================="
            echo
            openclaw-get-addresses "${PORT}"
            echo
            echo "端口：${PORT}"
            echo "用户名：admin"
            echo "密码：${ADMIN_PASS}"
            echo "监听地址：${OPENCLAW_BIND_HOST}"
            echo
            if [ "$ENABLE_IPV6" = "1" ]; then
              echo "IPv6 状态：已开启"
            else
              echo "IPv6 状态：已关闭"
            fi
            echo
            echo "下一步：执行 openclaw-set-api 配置模型 API"
            echo "查看服务：systemctl status openclaw --no-pager -l"
            echo
            echo "=================================================="
          } > "$INFO"

          chmod 600 "$INFO"
          touch "$FLAG"
          cat "$INFO"
          EOF

            cat > "$PAYLOAD_DIR/usr/local/bin/openclaw-set-api" <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          CONF="/etc/openclaw/openclaw.env"
          RUNTIME="/etc/openclaw/runtime.env"
          INFO="/root/openclaw-info.txt"

          if [ ! -f "$RUNTIME" ]; then
            echo "运行时配置不存在，请先执行：openclaw-firstboot"
            exit 1
          fi

          source /etc/openclaw/template.conf
          source "$RUNTIME"

          echo
          echo "=================================================="
          echo " OpenClaw 自定义 API 配置"
          echo "=================================================="
          echo

          read -rp "API base_url，例如 https://api.openai.com/v1 或 https://api.deepseek.com/v1: " BASE_URL
          BASE_URL="${BASE_URL:-https://api.openai.com/v1}"

          read -rp "默认模型，例如 gpt-4.1 / deepseek-chat / deepseek-v4-flash: " MODEL
          MODEL="${MODEL:-gpt-4.1}"

          read -rsp "请输入 API Key: " API_KEY
          echo

          if [ -z "$API_KEY" ]; then
            echo "API Key 不能为空"
            exit 1
          fi

          cat > "$CONF" <<EOT
          HOST=${OPENCLAW_BIND_HOST}
          OPENCLAW_HOST=${OPENCLAW_BIND_HOST}
          PORT=${OPENCLAW_PORT}
          OPENCLAW_PORT=${OPENCLAW_PORT}
          OPENCLAW_ADMIN_USER=admin
          OPENCLAW_ADMIN_PASSWORD=${OPENCLAW_ADMIN_PASSWORD}

          OPENAI_BASE_URL=${BASE_URL}
          OPENAI_API_KEY=${API_KEY}
          OPENAI_MODEL=${MODEL}

          ANTHROPIC_BASE_URL=${BASE_URL}
          ANTHROPIC_API_KEY=${API_KEY}

          DEEPSEEK_BASE_URL=${BASE_URL}
          DEEPSEEK_API_KEY=${API_KEY}
          DEEPSEEK_MODEL=${MODEL}
          EOT

          chown root:openclaw "$CONF"
          chmod 640 "$CONF"

          touch /etc/openclaw/api_configured

          systemctl restart openclaw || true

          {
            echo
            echo "=================================================="
            echo " OpenClaw KVM 信息"
            echo "=================================================="
            echo
            openclaw-get-addresses "${OPENCLAW_PORT}"
            echo
            echo "端口：${OPENCLAW_PORT}"
            echo "用户名：admin"
            echo "密码：${OPENCLAW_ADMIN_PASSWORD}"
            echo "监听地址：${OPENCLAW_BIND_HOST}"
            echo
            echo "模型接口：${BASE_URL}"
            echo "默认模型：${MODEL}"
            echo
            echo "重新配置 API：openclaw-set-api"
            echo "查看服务：systemctl status openclaw --no-pager -l"
            echo
            echo "=================================================="
          } > "$INFO"

          chmod 600 "$INFO"
          cat "$INFO"
          EOF

            cat > "$PAYLOAD_DIR/usr/local/bin/openclaw-ipv6-ask" <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          ASK_FLAG="/etc/openclaw/ipv6_need_ask"
          RUNTIME="/etc/openclaw/runtime.env"

          if [ ! -f "$ASK_FLAG" ]; then
            exit 0
          fi

          echo
          echo "=================================================="
          echo " IPv6 配置"
          echo "=================================================="
          echo
          echo "1) 关闭 IPv6，推荐国内 NAT / 路由器疯狂下发 IPv6 的环境"
          echo "2) 开启 IPv6"
          echo
          read -rp "请选择 [1]: " ip6_choice
          ip6_choice="${ip6_choice:-1}"

          if [ "$ip6_choice" = "2" ]; then
            openclaw-ipv6-control enable || true
            NEW_IPV6="1"
          else
            openclaw-ipv6-control disable || true
            NEW_IPV6="0"
          fi

          if [ -f "$RUNTIME" ]; then
            sed -i '/^ENABLE_IPV6=/d' "$RUNTIME"
            echo "ENABLE_IPV6=${NEW_IPV6}" >> "$RUNTIME"
            chown root:openclaw "$RUNTIME" || true
            chmod 640 "$RUNTIME" || true
          fi

          rm -f "$ASK_FLAG"
          EOF

            cat > "$PAYLOAD_DIR/usr/local/bin/openclaw-launcher" <<'EOF'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          source /etc/openclaw/template.conf
          source /etc/openclaw/openclaw.env 2>/dev/null || true

          export HOME=/home/openclaw
          export HOST="${OPENCLAW_BIND_HOST:-0.0.0.0}"
          export OPENCLAW_HOST="${OPENCLAW_BIND_HOST:-0.0.0.0}"
          export PORT="${OPENCLAW_PORT:-${PORT:-18789}}"
          export OPENCLAW_PORT="${OPENCLAW_PORT:-${PORT:-18789}}"

          cd /var/lib/openclaw
          exec bash -lc "$OPENCLAW_RUN_CMD"
          EOF

            cat > "$PAYLOAD_DIR/etc/systemd/system/openclaw-firstboot.service" <<'EOF'
          [Unit]
          Description=OpenClaw First Boot Init
          After=network-online.target
          Wants=network-online.target
          ConditionPathExists=!/etc/openclaw/firstboot.done

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/openclaw-firstboot
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          EOF

            cat > "$PAYLOAD_DIR/etc/systemd/system/openclaw.service" <<'EOF'
          [Unit]
          Description=OpenClaw Service
          After=network-online.target openclaw-firstboot.service
          Wants=network-online.target openclaw-firstboot.service

          [Service]
          Type=simple
          User=openclaw
          Group=openclaw
          EnvironmentFile=-/etc/openclaw/openclaw.env
          WorkingDirectory=/var/lib/openclaw
          ExecStartPre=/usr/local/bin/openclaw-firstboot
          ExecStart=/usr/local/bin/openclaw-launcher
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

            cat > "$PAYLOAD_DIR/etc/profile.d/openclaw-info.sh" <<'EOF'
          #!/usr/bin/env bash

          if [ "$(id -u)" = "0" ]; then
            echo

            if [ -f /etc/openclaw/ipv6_need_ask ]; then
              openclaw-ipv6-ask
            fi

            if [ -f /root/openclaw-info.txt ]; then
              cat /root/openclaw-info.txt
            else
              echo "OpenClaw 信息文件不存在。"
              echo "如果首次启动没有完成，可以执行：openclaw-firstboot"
            fi

            if [ -f /etc/openclaw/firstboot.done ] && [ ! -f /etc/openclaw/api_configured ]; then
              echo
              echo "检测到还没有配置自定义 API。"
              read -rp "是否现在配置？[Y/n]: " answer
              answer="${answer:-Y}"
              if [[ "$answer" =~ ^[Yy]$ ]]; then
                openclaw-set-api
              fi
            fi
          fi
          EOF

            chmod +x "$PAYLOAD_DIR/usr/local/bin/"*
            chmod +x "$PAYLOAD_DIR/etc/profile.d/openclaw-info.sh"
          }

          inject_offline_openclaw() {
            log "[6/12] 注入 OpenClaw 离线包到 qcow2"

            virt-copy-in -a "$IMAGE" "$WORK_DIR/openclaw-offline.tar.gz" /root/

            virt-customize -a "$IMAGE" --no-network \
              --run-command 'tar -xzf /root/openclaw-offline.tar.gz -C /' \
              --run-command 'rm -f /root/openclaw-offline.tar.gz' \
              --run-command '/usr/local/bin/openclaw-offline-fix'
          }

          inject_payload() {
            log "[7/12] 注入 systemd / firstboot / API / IPv6 脚本"

            virt-copy-in -a "$IMAGE" "$PAYLOAD_DIR/usr" /
            virt-copy-in -a "$IMAGE" "$PAYLOAD_DIR/etc" /

            virt-customize -a "$IMAGE" --no-network \
              --run-command 'chmod 755 /usr/local/bin/openclaw-* || true' \
              --run-command 'chmod 644 /etc/openclaw/template.conf' \
              --run-command 'chown -R openclaw:openclaw /var/lib/openclaw /home/openclaw || true' \
              --run-command 'systemctl enable openclaw-firstboot.service || true' \
              --run-command 'systemctl enable openclaw.service || true'
          }

          smoke_test() {
            log "[8/12] 离线运行级检查"

            virt-customize -a "$IMAGE" --no-network \
              --run-command 'command -v node' \
              --run-command 'command -v npm' \
              --run-command 'command -v pnpm' \
              --run-command 'command -v openclaw' \
              --run-command 'openclaw --version || true' \
              --run-command 'bash -n /usr/local/bin/openclaw-firstboot' \
              --run-command 'bash -n /usr/local/bin/openclaw-set-api' \
              --run-command 'bash -n /usr/local/bin/openclaw-ipv6-control' \
              --run-command 'bash -n /usr/local/bin/openclaw-launcher' \
              --run-command 'id openclaw' \
              --run-command 'su -s /bin/bash openclaw -c "test -r /etc/openclaw/template.conf"'
          }

          cleanup_image() {
            log "[9/12] 清理镜像缓存和唯一标识"

            virt-customize -a "$IMAGE" --no-network \
              --run-command 'rm -rf /tmp/* /var/tmp/* || true' \
              --run-command 'rm -f /root/.bash_history /home/openclaw/.bash_history || true' \
              --run-command 'truncate -s 0 /etc/machine-id || true' \
              --run-command 'rm -f /var/lib/dbus/machine-id || true' \
              --run-command 'rm -f /etc/ssh/ssh_host_* || true' \
              --run-command 'cloud-init clean --logs --seed || true'
          }

          export_and_compress() {
            log "[10/12] 导出并压缩 qcow2"

            rm -f "$OUT_QCOW2" "$OUT_XZ" "$OUT_SHA" "$OUT_LIST"

            qemu-img convert -O qcow2 -c "$IMAGE" "$OUT_QCOW2"

            xz -T0 -9e "$OUT_QCOW2"

            sha256sum "$OUT_XZ" > "$OUT_SHA"
          }

          generate_file_list() {
            log "[11/12] 生成镜像文件列表"

            virt-ls -a "$IMAGE" -R / > "$OUT_LIST"

            log "检查 /usr/bin/openclaw"
            if ! virt-ls -a "$IMAGE" /usr/bin | grep -qx 'openclaw'; then
              echo "调试：/usr/bin 中的相关文件："
              virt-ls -a "$IMAGE" /usr/bin | grep -Ei 'openclaw|node|npm|pnpm' || true
              die "镜像中没有 /usr/bin/openclaw"
            fi

            log "检查 /opt/openclaw-runtime/lib/node_modules/openclaw"
            if ! virt-ls -a "$IMAGE" /opt/openclaw-runtime/lib/node_modules | grep -qx 'openclaw'; then
              echo "调试：/opt/openclaw-runtime/lib/node_modules 内容："
              virt-ls -a "$IMAGE" /opt/openclaw-runtime/lib/node_modules || true
              die "镜像中没有 OpenClaw node_modules"
            fi

            log "检查 openclaw.service"
            if ! virt-ls -a "$IMAGE" /etc/systemd/system | grep -qx 'openclaw.service'; then
              echo "调试：/etc/systemd/system 中的 openclaw 文件："
              virt-ls -a "$IMAGE" /etc/systemd/system | grep -i openclaw || true
              die "镜像中没有 openclaw.service"
            fi

            log "检查 openclaw-firstboot"
            if ! virt-ls -a "$IMAGE" /usr/local/bin | grep -qx 'openclaw-firstboot'; then
              echo "调试：/usr/local/bin 中的 openclaw 文件："
              virt-ls -a "$IMAGE" /usr/local/bin | grep -i openclaw || true
              die "镜像中没有 openclaw-firstboot"
            fi

            {
              echo
              echo "# Verified important files"
              echo "/usr/bin/openclaw"
              echo "/opt/openclaw-runtime/lib/node_modules/openclaw"
              echo "/etc/systemd/system/openclaw.service"
              echo "/usr/local/bin/openclaw-firstboot"
            } >> "$OUT_LIST"

            log "文件列表验证通过"
          }

          write_build_info() {
            log "[12/12] 写入构建信息"

            {
              echo "OpenClaw KVM Cloud-Init Image"
              echo
              echo "Version: ${VERSION}"
              echo "Template: ${TEMPLATE_NAME}"
              echo "Debian cloud image: ${DEBIAN_CLOUD_IMAGE_URL}"
              echo "Disk size: ${DISK_SIZE}"
              echo "OpenClaw npm spec: ${OPENCLAW_NPM_SPEC}"
              echo "OpenClaw run command: ${OPENCLAW_RUN_CMD}"
              echo "Bind host: ${BIND_HOST}"
              echo "IPv6 policy: ${IPV6_POLICY}"
              echo "Port range: ${PORT_MIN}-${PORT_MAX}"
              echo "Image: $(basename "$OUT_XZ")"
              echo
              echo "SHA256:"
              cat "$OUT_SHA"
              echo
              echo "Created at: $(date -u '+%F %T UTC')"
            } > "$BUILD_INFO"

            rm -rf "$WORK_DIR"
          }

          main() {
            need_root

            log "=================================================="
            log "OpenClaw KVM Cloud Image 构建开始"
            log "=================================================="

            install_deps
            download_cloud_image
            resize_image
            prepare_offline_openclaw
            write_payload_files
            inject_offline_openclaw
            inject_payload
            smoke_test
            cleanup_image
            export_and_compress
            generate_file_list
            write_build_info

            log "=================================================="
            log "构建完成"
            log "=================================================="

            ls -lh "$DIST_DIR"
            cat "$BUILD_INFO"
          }

          main "$@"
          BUILDER

          chmod +x /tmp/build-openclaw-kvm.sh
          sudo -E bash /tmp/build-openclaw-kvm.sh
          sudo chown -R "$USER:$USER" dist

      - name: Verify dist
        shell: bash
        run: |
          set -Eeuo pipefail

          ls -lah dist

          IMAGE="$(ls -t dist/*.qcow2.xz | head -1)"
          echo "IMAGE=$IMAGE"

          xz -t "$IMAGE"

          LIST_FILE="$(ls -t dist/*.list | head -1)"
          echo "LIST_FILE=$LIST_FILE"

          grep -Eq '(^|/)usr/bin/openclaw$|^/usr/bin/openclaw$' "$LIST_FILE"
          grep -Eq '(^|/)opt/openclaw-runtime/lib/node_modules/openclaw' "$LIST_FILE"
          grep -Eq '(^|/)etc/systemd/system/openclaw.service$|^/etc/systemd/system/openclaw.service$' "$LIST_FILE"
          grep -Eq '(^|/)usr/local/bin/openclaw-firstboot$|^/usr/local/bin/openclaw-firstboot$' "$LIST_FILE"

          echo "验证通过。"
          echo
          cat dist/build-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-kvm-cloud-image-${{ steps.vars.outputs.safe_version }}
          path: |
            dist/*.qcow2.xz
            dist/*.sha256
            dist/*.list
            dist/build-info.txt
          retention-days: 30

      - name: Create release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          # OpenClaw KVM Cloud-Init Image ${{ steps.vars.outputs.version }}

          ## 文件说明

          - \`openclaw-kvm-debian12-${{ steps.vars.outputs.safe_version }}.qcow2.xz\`：KVM / PVE Cloud-Init 镜像
          - \`.sha256\`：SHA256 校验文件
          - \`.list\`：镜像内文件列表
          - \`build-info.txt\`：构建信息

          ## 解压镜像

          \`\`\`bash
          xz -dk openclaw-kvm-debian12-${{ steps.vars.outputs.safe_version }}.qcow2.xz
          \`\`\`

          ## PVE 创建 VM 模板示例

          \`\`\`bash
          qm create 9000 \\
            --name openclaw-kvm \\
            --memory 4096 \\
            --cores 2 \\
            --net0 virtio,bridge=vmbr0 \\
            --agent enabled=1

          qm importdisk 9000 openclaw-kvm-debian12-${{ steps.vars.outputs.safe_version }}.qcow2 local-lvm

          qm set 9000 \\
            --scsihw virtio-scsi-pci \\
            --scsi0 local-lvm:vm-9000-disk-0 \\
            --ide2 local-lvm:cloudinit \\
            --boot c \\
            --bootdisk scsi0 \\
            --serial0 socket \\
            --vga serial0

          qm template 9000
          \`\`\`

          ## 克隆使用示例

          \`\`\`bash
          qm clone 9000 101 --name openclaw-101
          qm set 101 --ciuser root --cipassword '你的密码'
          qm set 101 --ipconfig0 ip=dhcp
          qm start 101
          \`\`\`

          ## 进入系统后

          \`\`\`bash
          cat /root/openclaw-info.txt
          openclaw-set-api
          systemctl status openclaw --no-pager -l
          \`\`\`

          EOF

          echo "" >> release-notes.md
          echo "## 构建信息" >> release-notes.md
          echo '```text' >> release-notes.md
          cat dist/build-info.txt >> release-notes.md
          echo '```' >> release-notes.md

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.vars.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease || false }}
        run: |
          set -Eeuo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "OpenClaw KVM Cloud Image $TAG_NAME" \
              --notes-file release-notes.md
          else
            if [[ "$PRERELEASE" == "true" ]]; then
              gh release create "$TAG_NAME" \
                --title "OpenClaw KVM Cloud Image $TAG_NAME" \
                --notes-file release-notes.md \
                --prerelease
            else
              gh release create "$TAG_NAME" \
                --title "OpenClaw KVM Cloud Image $TAG_NAME" \
                --notes-file release-notes.md
            fi
          fi

          gh release upload "$TAG_NAME" \
            dist/*.qcow2.xz \
            dist/*.sha256 \
            dist/*.list \
            dist/build-info.txt \
            --clobber
